<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useMemo, useEffect } = React;



// ─── Issue Catalog ───
// Curated, specific themes grouped by product. Each theme has regex patterns
// that match real customer language. Quotes are pulled from sentences that
// match the same patterns — guaranteeing quote-to-theme accuracy.

const ISSUE_CATALOG = [
  // ─── MARKETPLACE ───
  { id: "mp-order-denied", product: "Marketplace",
    theme: "Order Denied / Approval Blocked Without Explanation",
    summary: "Customers attempt to place marketplace orders and are denied with no clear explanation. They receive a generic 'not approved' message with no detail on why or what to do next. Top sub-tags: Order Approval, Spending Limit, Account Eligibility. A significant portion of these conversations escalate to human agents because the AI cannot override approvals.",
    whyItMatters: "Order denials with no explanation erode trust and directly reduce GMV. Customers who experience opaque denials are unlikely to retry and may leave negative reviews. This is the highest-friction point in the marketplace purchase funnel.",
    rootCause: "Approval logic considers multiple risk signals (payment history, account age, order value, outstanding balance) but the denial screen shows a single generic message. The approval engine returns a reason code internally but this is not surfaced to the customer or support agent.",
    patterns: [/\border\s+(?:was\s+)?(?:denied|rejected|not\s+approved)\b/i, /\bwhy\s+(?:was|did|is)\s+my\s+order\s+(?:denied|rejected)\b/i, /\bcan'?t\s+(?:place|make|submit)\s+(?:an?\s+)?order\b/i, /\bapproval\s+(?:denied|rejected)\b/i, /\border\s+(?:didn'?t|did\s+not)\s+go\s+through\b/i],
    recommendation: "Immediate: Map internal reason codes to customer-facing denial messages with specific next steps. Medium-term: Build an approval status page showing eligibility factors (payment history, balance, tenure) with a clear path to approval. Add a 'Check Eligibility' pre-check before order submission.",
    severity: 4 },
  { id: "mp-item-damaged-wrong", product: "Marketplace",
    theme: "Item Arrived Damaged, Wrong, or Defective",
    summary: "Customers receive items that are damaged on arrival, a different size/color than ordered, or defective out of the box. No self-service resolution exists — they must contact support for every fulfillment issue. Top sub-tags: Wrong Item, Damaged Package, Size/Color Mismatch.",
    whyItMatters: "Fulfillment quality issues directly damage brand trust and drive returns that cost margin. Customers who receive wrong items and face a difficult resolution process are among the highest churn risk in marketplace.",
    rootCause: "Third-party vendor quality control is not systematically enforced. No photo-based claim flow exists — every damaged item requires a full support conversation. Return label generation is manual.",
    patterns: [/\bitem\s+(?:is\s+|was\s+|arrived?\s+|came\s+)?(?:damaged|broken|defective|wrong)\b/i, /\breceived?\s+(?:the\s+)?wrong\s+(?:item|product|size|color)\b/i, /\bwrong\s+(?:item|product|size|color)\s+(?:was\s+)?(?:sent|delivered|received)\b/i, /\b(?:item|product)\s+(?:is\s+)?(?:not\s+what\s+I\s+ordered|different\s+from)\b/i, /\b(?:damaged|broken)\s+(?:when|on)\s+(?:arrival|delivery)\b/i],
    recommendation: "Immediate: Add photo-based claim flow with auto-generated return labels. Medium-term: Build vendor quality scorecards and enforce fulfillment SLAs. Add self-service resolution (replacement vs. refund) without requiring support contact.",
    severity: 3 },
  { id: "mp-return-refund", product: "Marketplace",
    theme: "Refund Not Processed or Return Blocked",
    summary: "Customers are waiting on refunds that haven't posted days or weeks after being promised, or can't initiate returns at all. They have no visibility into refund status or timeline. Top sub-tags: Refund Timing, Return Process, Refund Not Received.",
    whyItMatters: "Refund delays are a top driver of chargebacks and BBB complaints. Customers who can't get timely refunds lose confidence and are unlikely to make future purchases. Each delayed refund is a potential dispute.",
    rootCause: "Refund processing is manual with no SLA enforcement. The UI shows 'refund initiated' but the actual refund may not process for 5-10 business days. No real-time status tracking exists — customers must contact support repeatedly to check.",
    patterns: [/\bhow\s+(?:do\s+I|can\s+I|to)\s+(?:return|get\s+a?\s*refund)\b/i, /\breturn\s+(?:my|this|the)\s+(?:item|order|product)\b/i, /\bwant\s+(?:a\s+|my\s+)?refund\b/i, /\brefund\s+(?:hasn'?t|has\s+not|didn'?t|not)\s+(?:been\s+)?(?:processed|received|posted|issued)\b/i, /\bwhere'?s?\s+my\s+refund\b/i, /\bstill\s+(?:waiting|no)\s+(?:for\s+)?(?:my\s+)?refund\b/i],
    recommendation: "Immediate: Add refund status tracker (Requested \u2192 Processing \u2192 Completed) with estimated date. Medium-term: Enforce 3-business-day refund SLA. Auto-send refund confirmation email with transaction details when funds are released.",
    severity: 3 },
  { id: "mp-shipping-delay", product: "Marketplace",
    theme: "Shipping Delays or Missing Tracking",
    summary: "Customers are waiting on orders that haven't shipped or arrived, and tracking information is missing, outdated, or not updating. Some report tracking numbers that never activate or show no movement for days. Top sub-tags: Order Status, Tracking Update, Delivery ETA.",
    whyItMatters: "Shipping uncertainty is the #1 driver of 'where is my order' support volume. Customers without tracking visibility assume the worst, consider disputes, and are unlikely to reorder. Prolonged uncertainty also increases chargeback risk as customers assume non-delivery.",
    rootCause: "Vendor shipping SLAs are inconsistently enforced — some vendors don't upload tracking within 48 hours. Tracking data integration has gaps where carrier handoffs (e.g., USPS to local post) don't trigger status updates. The app shows 'shipped' as soon as a label is created, even before the carrier has the package.",
    patterns: [/\border\s+(?:hasn'?t|has\s+not)\s+(?:arrived|shipped|been\s+(?:delivered|shipped))\b/i, /\bwhere'?s?\s+my\s+(?:order|package|item|shipment)\b/i, /\btracking\s+(?:not\s+)?(?:updating|working|showing|available)\b/i, /\b(?:still|been)\s+(?:waiting|pending)\s+(?:for\s+)?(?:my\s+)?(?:order|delivery|shipment)\b/i, /\bshipping\s+(?:is\s+)?(?:taking|took)\s+(?:too\s+)?long\b/i],
    recommendation: "Immediate: Send proactive delay notifications with revised ETAs when tracking stalls for 48+ hours. Distinguish 'label created' from 'in transit' in the UI. Medium-term: Enforce vendor shipping SLAs (ship within 3 business days or auto-cancel with refund). Surface real-time carrier tracking with map view in the app.",
    severity: 2 },
  { id: "mp-cancel-order", product: "Marketplace",
    theme: "Order Cancellation Blocked / Not Confirmed",
    summary: "Customers attempting to cancel orders are either unable to complete cancellation through the app, receive no confirmation the cancellation processed, or continue to be charged after believing they cancelled. 'Cancelled' status in the UI does not reliably match backend state. Top sub-tags: Order Cancellation, Order Inquiries.",
    whyItMatters: "Unconfirmed cancellations drive chargebacks, BBB complaints, and 'fraud/theft' accusations on public review platforms. This is the highest direct reputational and retention risk in the product.",
    rootCause: "The cancellation flow lacks a definitive confirmed state \u2014 customers complete the action but receive no timestamped confirmation. Backend cancellation processing lags behind the UI response, causing charges to still process.",
    patterns: [/\bcancel\s+(?:my|this|the)\s+order\b/i, /\bwant\s+to\s+cancel\b/i, /\bcan'?t\s+cancel\b/i, /\bhow\s+(?:do\s+I|can\s+I|to)\s+cancel\s+(?:my|an?)\s+order\b/i, /\bchange\s+(?:my|the)\s+order\b/i, /\bmodify\s+(?:my|the)\s+order\b/i],
    recommendation: "Immediate: Add explicit cancellation confirmation screen with order ID + timestamp. Auto-send cancellation email/push. Medium-term: Build a cancellation status tracker (Requested \u2192 Processing \u2192 Confirmed). Audit backend cancel-to-billing cutoff timing.",
    severity: 2 },
  { id: "mp-spending-limit-low", product: "Marketplace",
    theme: "Spending Limit Too Low or Unexpectedly Decreased",
    summary: "Customers find their marketplace spending limit is too low to make desired purchases, or their limit was reduced without notice or explanation. Many report limits dropping after consistent on-time payments, which feels contradictory. Top sub-tags: Spending Limit, Limit Decrease, Approval Eligibility.",
    whyItMatters: "Spending limits directly gate GMV — every customer blocked from a purchase is lost revenue. Unexplained decreases feel punitive to customers who believe they've been responsible, creating immediate churn risk. This is one of the most emotionally charged themes: customers feel 'punished for doing nothing wrong.'",
    rootCause: "Limit adjustments are driven by risk models that run periodically (not in real-time) and factor in external credit data, payment history, and employer stability. The models can decrease limits even when Perpay-specific behavior is good. No in-app explanation or advance notice is provided when a limit changes.",
    patterns: [/\bspending\s+limit\s+(?:is\s+)?(?:too\s+)?(?:low|small|not\s+enough)\b/i, /\bwhy\s+(?:did|is|was)\s+my\s+spending\s+limit\s+(?:so\s+)?(?:low|decrease|drop|go\s+down|reduced)\b/i, /\bspending\s+limit\s+(?:was\s+|got\s+|has\s+been\s+)?(?:decreased|reduced|lowered|cut)\b/i, /\bincrease\s+(?:my\s+)?spending\s+limit\b/i, /\bhow\s+(?:do\s+I|can\s+I|to)\s+(?:get\s+|raise\s+)?(?:a\s+)?(?:higher\s+)?spending\s+limit\b/i],
    recommendation: "Immediate: Add pre-decrease notification with clear reasoning (e.g., 'Your limit was adjusted based on updated payment data'). Show current limit factors in-app. Medium-term: Build a transparent limit-increase flow showing specific behaviors (on-time payments, tenure milestones, direct deposit consistency) that trigger increases, with a progress tracker toward the next increase.",
    severity: 4 },
  { id: "mp-pricing-overcharge", product: "Marketplace",
    theme: "Unexpected Pricing or Overcharges on Orders",
    summary: "Customers feel they were charged more than expected, see hidden fees, or don't understand the total at checkout versus what they anticipated. Some report being charged a different amount than what was displayed on the product page. Top sub-tags: Price Discrepancy, Hidden Fees, Double Charge.",
    whyItMatters: "Pricing surprises destroy purchase confidence and are a leading driver of chargebacks and BBB complaints. Customers who feel overcharged are unlikely to make repeat purchases and frequently use language like 'scam' and 'rip-off' in conversations, creating reputational risk.",
    rootCause: "Checkout flow does not clearly itemize the Perpay markup, installment cost breakdown, and any fees before final confirmation. Product page price shows the base price, but the final payroll-deduction total (including Perpay's margin) can be significantly higher. No side-by-side comparison of retail price vs. Perpay total is provided.",
    patterns: [/\bprice\s+(?:is\s+)?(?:too\s+)?(?:high|expensive|much)\b/i, /\bovercharged?\b/i, /\bcharged\s+(?:more|extra|twice|double)\b/i, /\bwhy\s+(?:am\s+I|was\s+I)\s+charged\s+(?:so\s+much|more|extra)\b/i, /\bhidden\s+(?:fees?|charges?|costs?)\b/i],
    recommendation: "Immediate: Break down pricing transparently at checkout — base retail price, Perpay cost, per-paycheck deduction amount, and total cost over time. Medium-term: Add a total-cost-of-ownership comparison on product pages showing Perpay price vs. retail price. Consider a price transparency badge for items within 10% of retail.",
    severity: 3 },

  // ─── CORE ───
  { id: "core-direct-deposit-issue", product: "Core",
    theme: "Direct Deposit Not Showing or Delayed",
    summary: "Customers' direct deposits haven't posted when expected. They are checking their account repeatedly and don't know when to expect funds or why there's a delay.",
    whyItMatters: "Direct deposit is a core trust signal — when pay doesn't arrive on time, customers question the entire platform's reliability and may switch to a competitor.",
    rootCause: "Payroll processing schedules vary by employer. Perpay receives ACH files at different times but doesn't surface estimated arrival times to customers.",
    patterns: [/\bdirect\s+deposit\s+(?:hasn'?t|has\s+not|didn'?t|not)\s+(?:been\s+)?(?:posted|deposited|showing|arrived|hit|come|appeared)\b/i, /\bwhere'?s?\s+my\s+(?:direct\s+)?deposit\b/i, /\bdirect\s+deposit\s+(?:is\s+)?(?:late|delayed|missing|pending)\b/i, /\bwhen\s+(?:will|does)\s+(?:my\s+)?direct\s+deposit\s+(?:post|arrive|hit|show)\b/i, /\bmy\s+(?:direct\s+)?deposit\s+(?:is\s+)?not\s+(?:on|in|showing)\b/i, /\bmy\s+(?:paycheck|pay)\s+(?:hasn'?t|didn'?t|not)\s+(?:been\s+)?(?:deposited|posted)\b/i],
    recommendation: "Add a deposit tracker: Expected \u2192 Processing \u2192 Posted. Show employer-specific estimated deposit times and send push notification when deposit lands.",
    severity: 4 },
  { id: "core-payment-issue", product: "Core",
    theme: "Payment Not Processing or Posting",
    summary: "Customers made a payment but it hasn't been reflected in their balance. Some report double charges, payments stuck in 'pending' for days, or payments that appear to fail silently. They have no way to confirm whether a payment actually went through. Top sub-tags: Payment Status, Double Charge, Payment Failed.",
    whyItMatters: "Payment processing issues create acute financial anxiety — customers don't know if their money was taken or if they still owe. This drives repeat contact (customers calling back to check status), increases dispute volume, and can cause customers to stop making payments entirely out of confusion.",
    rootCause: "ACH payment processing takes 1-3 business days but the UI shows no intermediate status between 'submitted' and 'posted.' When payments fail, the failure notification is often delayed or absent. The balance view doesn't distinguish between cleared and pending amounts, so customers can't reconcile what they paid vs. what the system shows.",
    patterns: [/\bpayment\s+(?:didn'?t|did\s+not|hasn'?t|not)\s+(?:go\s+through|process|post|work)\b/i, /\bpayment\s+(?:is\s+)?(?:stuck|pending|failed|declined)\b/i, /\bmade\s+a\s+payment\s+(?:but|and)\s+(?:it\s+)?(?:still|not)\b/i, /\bwhy\s+(?:hasn'?t|didn'?t)\s+my\s+payment\s+(?:posted|processed|gone\s+through)\b/i, /\bdouble\s+(?:charged|payment|deducted)\b/i],
    recommendation: "Immediate: Show real-time payment status tracker: Submitted \u2192 Processing \u2192 Posted with estimated posting date. Send push/email confirmation at each stage. Medium-term: Add a payment history timeline with clear cleared vs. pending indicators. Auto-detect and flag potential double payments before processing.",
    severity: 3 },
  { id: "core-account-locked", product: "Core",
    theme: "Account Locked or Access Restricted",
    summary: "Customers are locked out of their accounts or find their accounts frozen/suspended. They don't understand why or how to regain access.",
    whyItMatters: "Account lockouts block all product engagement. Without access, customers can't make payments, check balances, or use any Perpay service — creating immediate churn risk.",
    rootCause: "Security triggers (failed login attempts, suspicious activity, identity verification gaps) lock accounts but don't communicate the specific reason or unlock path to the customer.",
    patterns: [/\baccount\s+(?:is\s+|was\s+|got\s+|has\s+been\s+)?(?:locked|frozen|suspended|disabled|closed|restricted)\b/i, /\bcan'?t\s+(?:access|log\s*in|sign\s*in|get\s+into)\s+(?:my\s+)?account\b/i, /\blocked\s+out\s+(?:of\s+)?(?:my\s+)?account\b/i, /\bwhy\s+(?:is|was)\s+my\s+account\s+(?:locked|frozen|closed|suspended)\b/i, /\bunlock\s+(?:my\s+)?account\b/i],
    recommendation: "Display specific lock reasons with a self-service unlock flow (identity re-verification, password reset). Add proactive notification when an account is about to be locked.",
    severity: 4 },
  { id: "core-autopay-issue", product: "Core",
    theme: "Autopay Not Working or Unexpected Deductions",
    summary: "Customers report autopay not processing as expected, deducting the wrong amount, or being unable to set up or cancel autopay. Some discover autopay was still active after they believed it was turned off. Others report overdrafts caused by unexpected deduction timing. Top sub-tags: Autopay Setup, Autopay Cancellation, Wrong Deduction Amount.",
    whyItMatters: "Autopay issues directly impact customer financial stability — unexpected deductions can trigger bank overdraft fees, creating real financial harm and severe trust damage. Customers who experience autopay problems are likely to disconnect their bank entirely, eliminating Perpay's most reliable payment channel.",
    rootCause: "Autopay configuration changes don't take effect immediately due to processing windows — a cancellation submitted after the cutoff date still triggers the next deduction. The UI shows 'autopay off' immediately even if the next payment is already queued. No clear display of the next scheduled deduction date, amount, and cutoff deadline for changes.",
    patterns: [/\bautopay\s+(?:isn'?t|is\s+not|not)\s+(?:working|processing|deducting)\b/i, /\bturn\s+off\s+autopay\b/i, /\bcancel\s+autopay\b/i, /\bstop\s+(?:auto|automatic)\s*(?:pay|payment|deduction)\b/i, /\bautopay\s+(?:took|deducted|charged)\s+(?:too\s+much|more|wrong|extra|twice)\b/i, /\bset\s+up\s+autopay\b/i, /\b(?:auto|automatic)\s*(?:pay|payment)\s+(?:didn'?t|did\s+not)\b/i],
    recommendation: "Immediate: Show upcoming autopay details prominently — next deduction date, amount, and change cutoff deadline. Send confirmation when autopay is toggled on/off with effective date. Medium-term: Allow instant on/off toggle with real-time queue cancellation (not next-cycle). Add a pre-deduction reminder notification 2 days before each scheduled payment.",
    severity: 3 },
  { id: "core-verification", product: "Core",
    theme: "Identity or Account Verification Difficulties",
    summary: "Customers struggle to complete identity or account verification. The process fails repeatedly, gets stuck with no progress indicator, or requires documents they don't have or don't understand. Some report submitting documents multiple times with no feedback on what was wrong. Top sub-tags: Identity Verification, Document Upload, Verification Failed.",
    whyItMatters: "Verification friction blocks onboarding and feature access — every customer who can't verify is a customer who never experiences the product's value. This is a critical top-of-funnel leak. Customers who fail verification multiple times rarely retry, resulting in permanent acquisition loss.",
    rootCause: "Verification flow has unclear document requirements upfront (customers don't know which IDs are accepted). Failures show generic error messages ('verification failed') without specifying what was wrong (blurry image, expired ID, name mismatch). No progress indicator exists — customers submit and wait with no ETA or status updates.",
    patterns: [/\bverif(?:y|ication)\s+(?:my\s+)?(?:identity|account|income|employment)\b/i, /\bcan'?t\s+(?:verify|complete\s+verification)\b/i, /\bverification\s+(?:failed|not\s+working|keeps?\s+failing|stuck)\b/i, /\bwhy\s+(?:do\s+I|am\s+I)\s+(?:need|required)\s+to\s+verify\b/i, /\bunable\s+to\s+verify\b/i],
    recommendation: "Immediate: Show clear document requirements upfront (accepted ID types, photo quality guidelines) with real-time validation feedback ('image too blurry — retake'). Add specific failure reasons instead of generic errors. Medium-term: Build a verification progress tracker: Submitted \u2192 Under Review \u2192 Verified with estimated review time. Add fallback verification methods (phone, manual review) for edge cases.",
    severity: 2 },

  // ─── PERPAY+ ───
  { id: "pp-cancel-subscription", product: "Perpay+",
    theme: "Wants to Cancel Perpay+ Subscription",
    summary: "Customers want to cancel their Perpay+ subscription but can't find how to do it in the app, or feel the process is unnecessarily difficult. Many are frustrated that cancellation requires contacting support rather than a simple toggle. Some report being talked out of cancelling without their consent. Top sub-tags: Subscription Cancellation, Perpay+ Billing, Cancellation Request.",
    whyItMatters: "Cancellation friction creates outsized negative brand sentiment — customers who feel trapped will leave negative reviews, file BBB complaints, and actively discourage referrals even after they eventually cancel. 'Dark pattern' accusations around cancellation difficulty create regulatory and reputational risk.",
    rootCause: "No self-service cancellation option exists — customers must contact support, creating a mandatory retention conversation. The cancellation flow was designed for retention but frustrates customers who've already decided to leave. The subscription value proposition isn't reinforced proactively during the subscription period, only at the point of cancellation intent.",
    patterns: [/\bcancel\s+(?:my\s+)?(?:perpay\s*\+|perpay\s+plus|subscription|membership)\b/i, /\bunsubscribe\s+(?:from\s+)?(?:perpay\s*\+|perpay\s+plus)\b/i, /\bdon'?t\s+want\s+(?:perpay\s*\+|perpay\s+plus|the\s+subscription)\b/i, /\bstop\s+(?:my\s+)?(?:perpay\s*\+|perpay\s+plus|subscription)\s+(?:charge|payment|fee)\b/i, /\bhow\s+(?:do\s+I|can\s+I|to)\s+cancel\s+(?:perpay\s*\+|perpay\s+plus|my\s+subscription)\b/i],
    recommendation: "Immediate: Add one-click self-service cancellation in the app with a confirmation screen (no mandatory retention call). Show personalized value summary at cancellation — credit score change since enrollment, total payments reported. Medium-term: Offer a 'pause subscription' option as an alternative to full cancellation. Add proactive monthly value recap emails showing credit bureau reporting activity.",
    severity: 4 },
  { id: "pp-credit-not-reporting", product: "Perpay+",
    theme: "Credit Not Reporting to Bureaus / Missing from Report",
    summary: "Customers subscribed to Perpay+ specifically for credit building but their payments aren't appearing on credit reports from Experian, TransUnion, or Equifax. Some have been subscribed for months with no bureau activity. They question whether the service is legitimate. Top sub-tags: Credit Reporting, Bureau Inquiry, Credit Building.",
    whyItMatters: "Credit reporting is the single core value proposition of Perpay+. When it doesn't show up, customers feel scammed and will cancel immediately \u2014 this is the #1 retention risk for the product. These conversations frequently include language like 'waste of money' and 'scam.'",
    rootCause: "Bureau reporting cycles are monthly with variable timing per bureau. The first report may take 30-60 days after enrollment. No in-app status shows when data was last submitted, which bureaus received it, or when the next report is due. Customers have no way to verify the service is active.",
    patterns: [/\b(?:not|isn'?t|hasn'?t|didn'?t|never)\s+(?:been\s+)?(?:reported?|reporting|show(?:ing|n)?)\s+(?:on|to)\s+(?:my\s+)?(?:credit|bureau|experian|transunion|equifax)\b/i, /\bcredit\s+(?:report|score|bureau)\s+(?:not|isn'?t|hasn'?t|doesn'?t)\s+(?:show|reflect|update)\b/i, /\bwhen\s+(?:will|does)\s+(?:it|perpay)\s+(?:report|show)\s+(?:on|to)\s+(?:my\s+)?credit\b/i, /\bnot\s+(?:seeing|showing)\s+(?:on\s+)?(?:my\s+)?credit\s+report\b/i],
    recommendation: "Immediate: Add bureau reporting status dashboard showing per-bureau: Last Reported Date \u2192 Next Scheduled Report \u2192 Bureau Confirmation. Medium-term: Push notification when each bureau report is submitted. Add 'proof of reporting' downloadable statement for customers to verify independently.",
    severity: 4 },
  { id: "pp-credit-score-drop", product: "Perpay+",
    theme: "Credit Score Dropped or Not Improving",
    summary: "Customers paying for Perpay+ see their credit score drop or stagnate despite consistent payments. They blame Perpay directly and question whether the subscription is a 'scam.' Some report scores dropping immediately after Perpay+ started reporting. Top sub-tags: Credit Score, Score Drop, Credit Building.",
    whyItMatters: "Score disappointment is the #1 cancellation trigger for Perpay+. Customers who joined specifically for credit building feel actively harmed — not just disappointed — when scores drop. This creates intense negative word-of-mouth and social media complaints that undermine the product's core marketing promise.",
    rootCause: "Credit scores are affected by many factors beyond Perpay+ reporting (utilization changes, hard inquiries, other account activity). When Perpay+ opens a new tradeline, it can temporarily lower scores due to reduced average account age. Customers lack education on these dynamics and have unrealistic timeline expectations (expecting improvement in weeks, not months).",
    patterns: [/\bcredit\s+score\s+(?:went|dropped?|decreased?|fell|go(?:ne|ing)?\s+down|lower|hasn'?t\s+(?:gone\s+up|improved|changed|increased))\b/i, /\bscore\s+(?:went|dropped?|decreased?|fell)\b/i, /\bwhy\s+(?:did|has|is)\s+my\s+(?:credit\s+)?score\s+(?:drop|decrease|go\s+down|lower)\b/i, /\bperpay\s+(?:hurt|lower|drop|damage)(?:ed|ing|s)?\s+(?:my\s+)?(?:credit|score)\b/i],
    recommendation: "Immediate: Add a 'Credit Score Factors' explainer in the Perpay+ dashboard showing what affects scores (account age, utilization, payment history) and why a temporary dip is normal for new tradelines. Medium-term: Build a score trend chart tied to Perpay+ payment history with projected improvement timeline (3-6 month view). Send monthly 'credit health' summary showing Perpay+ contribution vs. other factors.",
    severity: 3 },
  { id: "pp-charged-after-cancel", product: "Perpay+",
    theme: "Still Charged After Cancellation",
    summary: "Customers who cancelled Perpay+ are still seeing charges on subsequent paychecks. They believe they were told it was cancelled but deductions continue for one or more additional cycles. Some report having to contact support multiple times to fully stop charges. Top sub-tags: Post-Cancellation Charge, Billing Dispute, Subscription Billing.",
    whyItMatters: "Post-cancellation charges are a trust emergency and potential regulatory issue. These customers are the most likely to file chargebacks, leave 1-star reviews, report to BBB/CFPB, and actively warn others against Perpay. This is among the highest severity issues for brand damage.",
    rootCause: "Cancellation processing has a lag — requests submitted mid-billing cycle may not take effect until the next cycle because payroll deduction files are submitted in advance. The confirmation message says 'cancelled' but doesn't specify the effective date or whether one more charge will process. No proactive refund is issued for charges after the cancellation request date.",
    patterns: [/\bstill\s+(?:being\s+)?charged?\s+(?:after|even\s+though)\s+(?:I\s+)?cancel/i, /\bcharged?\s+(?:for\s+)?(?:perpay\s*\+|subscription)\s+(?:after|even\s+though)\s+(?:I\s+)?cancel/i, /\bcancel(?:led|ed)?\s+(?:but|and)\s+(?:still|keep)\s+(?:being\s+)?charged?\b/i, /\bwhy\s+(?:am\s+I|was\s+I)\s+(?:still\s+)?(?:being\s+)?charged?\s+(?:for\s+)?(?:perpay\s*\+|the\s+subscription)\b/i],
    recommendation: "Immediate: Process cancellations with a clear confirmation showing the exact last charge date and whether one more deduction is already queued. Auto-refund any charges processed after the cancellation request date. Medium-term: Build real-time payroll deduction cancellation (cancel the next queued deduction file, not just the subscription record). Add post-cancellation confirmation email with refund details if applicable.",
    severity: 4 },

  // ─── CARD ───

// ─── Customer text extractor ───
// Decagon CSV exports often store the conversation as a stringified list of
// {role, text} events. We extract ONLY the customer (USER) text so quotes
// are real customer words — not AI replies or JSON metadata.
function extractUserText(raw) {
  if (!raw || typeof raw !== "string") return "";

  // Detect structured event data (Python/JSON-style with role + text fields)
  if (/['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/i.test(raw) || /['"]text['"]\s*:\s*['"]/.test(raw)) {
    const userTexts = [];

    // Match role:USER followed by text:... within ~600 chars (text first or role first)
    const re1 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'/gi;
    const re2 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"/gi;
    const re3 = /['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    const re4 = /['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    let m;
    [re1, re2, re3, re4].forEach(re => { while ((m = re.exec(raw)) !== null) userTexts.push(m[1]); });

    if (userTexts.length > 0) {
      return userTexts
        .map(t => t
          .replace(/\\n/g, " ")
          .replace(/\\r/g, " ")
          .replace(/\\t/g, " ")
          .replace(/\\u200b|\\ufeff/gi, "")
          .replace(/\\'/g, "'")
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, "\\")
          // Strip email subject lines, signatures, addresses
          // Keep Subject lines — they provide context for email-based conversations
          .replace(/\b\d{1,5}\s+\w+\s+(?:Street|St|Avenue|Ave|Suite|Ste|Road|Rd)\b[^.]*\.?/gi, "")
          .replace(/\bUnsubscribe\b[^.]*$/i, "")
          .replace(/\s+/g, " ")
          .trim())
        .filter(t => t.length > 5)
        .join(" ");
    }
  }

  // Plain text fallback — strip obvious metadata
  return raw
    .replace(/\\n/g, " ")
    .replace(/\\u200b|\\ufeff/gi, "")
    .replace(/\s+/g, " ")
    .trim();
}

// ─── Analysis Engine ───

// Filter out AI agent sentences and system/fluff text from quotes
function isCustomerSentence(s) {
  // AI agent patterns (Franklin, generic AI)
  if (/\b(?:I'?m|I am)\s+(?:Franklin|the AI|an AI|a virtual|your virtual|your AI|here to help|happy to help|glad to help)/i.test(s)) return false;
  if (/\bAI assistant\b/i.test(s)) return false;
  if (/\b(?:I'?d recommend|I recommend|I suggest|I can help|I can assist|Let me help|Let me look|Let me check|I understand your|I apologize|I'?m sorry to hear)/i.test(s)) return false;
  if (/\b(?:Thank you for (?:contacting|reaching|calling|your patience)|Is there anything else|Can I help you with anything)/i.test(s)) return false;
  // Agent closings and transitions
  if (/\b(?:Please let me know|Don'?t hesitate|Feel free to|For (?:more|further) (?:help|assistance)|Have a (?:great|good|wonderful|nice) day|Glad I could|Happy to assist|We appreciate|Thank you for your patience|We value your|Your (?:patience|understanding) is)/i.test(s)) return false;
  // System messages, metadata, and boilerplate
  if (/\b(?:This (?:conversation|chat|ticket) (?:has been|was)|transferred to|escalated to|assigned to|routing to|queue|department|agent will|representative will|team will)/i.test(s)) return false;
  if (/\b(?:reference number|ticket number|case number|confirmation number)\s*(?:is|:)/i.test(s)) return false;
  // Email signatures and auto-replies
  if (/\b(?:Sent from my|Get Outlook|Unsubscribe|Privacy Policy|Terms of Service|Do not reply|This email|This message)\b/i.test(s)) return false;
  // Greetings and pleasantries (standalone)
  if (/^(?:Hi|Hello|Hey|Good (?:morning|afternoon|evening)|Thanks|Thank you|Ok|Okay|Sure|Yes|No|Alright)\s*[.!,]?\s*$/i.test(s)) return false;
  // Very short non-substantive replies
  if (s.length < 15 && /^(?:ok|yes|no|sure|thanks|thank you|got it|alright|okay|fine|yep|nope|right)\b/i.test(s)) return false;
  return true;
}

// Clean up a raw quote to only the customer's own words
function cleanQuote(q) {
  return q
    // Strip URLs, UUIDs, emails, addresses
    .replace(/https?:\/\/[^\s"')]+/gi, "")
    .replace(/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/gi, "")
    .replace(/[a-f0-9]{24,}/gi, "")
    .replace(/\S+@\S+\.\S+/g, "")
    // Strip phone numbers
    .replace(/\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/g, "")
    // Strip order/ticket/reference numbers
    .replace(/(?:order|ticket|ref(?:erence)?|case|confirmation)\s*#?\s*:?\s*[A-Z0-9-]{5,}/gi, "")
    // Strip dates in common formats
    .replace(/\b\d{1,2}\/\d{1,2}\/\d{2,4}\b/g, "")
    // Strip account numbers / long digit sequences
    .replace(/\b\d{6,}\b/g, "")
    // Strip addresses
    .replace(/\b\d{1,5}\s+\w+\s+(?:Street|St|Avenue|Ave|Suite|Ste|Road|Rd|Blvd|Boulevard|Drive|Dr|Lane|Ln)\b[^.]*\.?/gi, "")
    // Clean up extra whitespace
    .replace(/\s+/g, " ")
    .trim();
}

function analyzeConversations(rows, headerMap) {
  const msgField = headerMap.message;
  const idField = headerMap.id;
  const dateField = headerMap.date;

  if (!msgField) return { error: "Could not find a message/conversation column. Please ensure your CSV has a column named 'message', 'conversation', 'text', 'content', 'body', or 'transcript'." };

  const themeMap = {};
  let totalRelevant = 0;

  rows.forEach((row, idx) => {
    const raw = row[msgField] || "";
    const userText = extractUserText(raw);
    if (!userText || userText.length < 15) return;

    const id = idField ? row[idField] : `conv-${idx + 1}`;
    const date = dateField ? row[dateField] : null;

    // Split into clean sentences for quote extraction — filter out AI agent text
    const sentences = userText
      .split(/(?<=[.!?])\s+|(?:\.\s)|(?:\?\s)|(?:!\s)/)
      .map(s => s.trim())
      .filter(s => s.length > 10 && s.length < 400 && /[a-zA-Z]/.test(s) && isCustomerSentence(s));

    // Detect which product the conversation is explicitly about
    const textLower = userText.toLowerCase();
    const mentionsCard = /\b(?:credit\s+card|perpay\s+card|my\s+card|the\s+card|card\s+(?:was|got|keeps?|didn|won|isn))\b/i.test(userText);
    const mentionsMarketplace = /\b(?:marketplace|my\s+order|item|shipping|tracking|delivery|checkout|cart)\b/i.test(userText);
    const mentionsPerpayPlus = /\b(?:perpay\s*\+|perpay\s+plus|subscription|membership|credit\s+(?:building|report|bureau|score)|experian|transunion|equifax)\b/i.test(userText);
    const mentionsCore = /\b(?:direct\s+deposit|autopay|auto\s*pay|paycheck|payroll|deduction|log\s*in|password|verify\s+(?:my\s+)?(?:identity|account))\b/i.test(userText);

    // Test each issue in the catalog
    let matched = false;
    for (const issue of ISSUE_CATALOG) {
      const isMatch = issue.patterns.some(p => p.test(userText));
      if (!isMatch) continue;

      // Product disambiguation: skip if conversation explicitly mentions a DIFFERENT product
      // than what this theme is categorized under
      const issueProduct = issue.product;
      let productMismatch = false;
      if (issueProduct === "Marketplace" && !mentionsMarketplace && (mentionsCard || mentionsPerpayPlus)) productMismatch = true;
      if (issueProduct === "Card" && !mentionsCard && mentionsMarketplace) productMismatch = true;
      if (issueProduct === "Perpay+" && !mentionsPerpayPlus && (mentionsCard || mentionsMarketplace)) productMismatch = true;
      if (issueProduct === "Core" && !mentionsCore && (mentionsCard || mentionsMarketplace || mentionsPerpayPlus)) productMismatch = true;
      if (productMismatch) continue;

      matched = true;

      // Quotes: sentences from THIS conversation that match THIS issue's patterns
      const matchingQuotes = sentences.filter(s => issue.patterns.some(p => p.test(s)));

      if (!themeMap[issue.id]) {
        themeMap[issue.id] = { ...issue, conversations: [], quotes: new Set() };
      }
      themeMap[issue.id].conversations.push({ id, date, text: userText, excerpt: userText.slice(0, 280) });
      matchingQuotes.forEach(q => {
        const cleaned = cleanQuote(q);
        if (cleaned.length > 20 && isCustomerSentence(cleaned)) themeMap[issue.id].quotes.add(cleaned);
      });
    }
    if (matched) totalRelevant++;
  });

  // Convert sets to arrays, rank quotes, compute frequency
  const themes = Object.values(themeMap).map(t => {
    const count = t.conversations.length;
    const frequency = count >= 8 ? "High" : count >= 3 ? "Medium" : "Low";

    const rankedQuotes = Array.from(t.quotes)
      .filter(isCustomerSentence)
      .map(q => {
        let score = 0;
        const len = q.length;

        // ── HARD REJECT: transaction details, order info, product descriptions ──
        // Quotes like "I want to cancel my #P011993419 Repayment • $187.85 • Apr 13"
        if (/[#P]\d{5,}/i.test(q)) score -= 20; // Order/repayment IDs
        if (/\$\d+\.\d{2}/.test(q)) score -= 10; // Dollar amounts
        if (/\b(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2},?\s*\d{0,4}/i.test(q)) score -= 5; // Dates
        if (/\b(?:Repayment|Payment)\s*[\u2022\u00b7•·\-]\s*\$/i.test(q)) score -= 20; // "Repayment • $XX" pattern
        if (/\b\d+P\s+(?:Full\s+)?HD\b/i.test(q)) score -= 20; // Product specs like "1080P Full HD"
        if (/\b(?:Minolta|Samsung|Apple|Sony|LG|Nike|Adidas|Dyson)\b/i.test(q)) score -= 10; // Brand/product names
        if (/^\s*I\s+want\s+to\s+cancel\s+my\s+#/i.test(q)) score -= 15; // "I want to cancel my #ORDER"

        // ── IDEAL LENGTH: 40-200 chars ──
        if (len >= 40 && len <= 200) score += 6;
        else if (len >= 25 && len <= 280) score += 3;
        else if (len < 25) score -= 4;
        else score -= Math.floor((len - 280) / 40);

        // ── MUST HAVE: first-person experience ──
        if (/\b(I|my|me|I'?m|I'?ve|I'?d|I'?ll)\b/.test(q)) score += 4;

        // ── HIGH VALUE: frustration with Perpay's PROCESS ──
        // These are the quotes PMs actually act on
        if (/\b(frustrated|frustrating|ridiculous|unacceptable|terrible|horrible|awful|pathetic|joke|scam|rip\s*off|waste\s+of|useless|pointless|makes?\s+no\s+sense|doesn'?t\s+make\s+sense)\b/i.test(q)) score += 10;
        if (/\b(angry|furious|upset|disappointed|annoyed|disgusted|fed\s+up|sick\s+of|tired\s+of|done\s+with|over\s+it|had\s+enough|last\s+straw|worst\s+experience)\b/i.test(q)) score += 8;

        // ── HIGH VALUE: describing broken process / repeated failures ──
        if (/\b(can'?t\s+believe|don'?t\s+understand|no\s+one\s+(?:can|will|helps?)|been\s+trying|keeps?\s+happening|every\s+time|again\s+and\s+again|multiple\s+times|called?\s+(?:\d+|several|multiple)\s+times|still\s+(?:not|no|haven'?t|waiting)|nobody\s+(?:can|will|helps?))\b/i.test(q)) score += 7;
        if (/\b(no\s+(?:explanation|reason|answer|response|update|help)|without\s+(?:explanation|reason|warning|notice)|never\s+(?:told|informed|notified|explained))\b/i.test(q)) score += 7;

        // ── HIGH VALUE: retention risk ──
        if (/\b(cancel(?:ling)?\s+(?:my|the|this)|clos(?:e|ing)\s+(?:my|the)\s+account|switch(?:ing)?\s+to|leav(?:e|ing)\s+perpay|never\s+(?:again|using|ordering)|done\s+with\s+(?:perpay|this)|going\s+(?:to|with)\s+(?:another|different))\b/i.test(q)) score += 9;
        if (/\b(report(?:ing)?\s+(?:to|with)\s+(?:BBB|CFPB|attorney\s+general|better\s+business)|file?\s+(?:a\s+)?complaint|legal\s+action|lawyer|sue)\b/i.test(q)) score += 10;

        // ── MEDIUM VALUE: specific product/process complaints ──
        if (/\b(won'?t\s+(?:let|allow)\s+me|denied\s+(?:with\s+)?no\s+(?:reason|explanation)|declined\s+(?:for|with)\s+no|blocked\s+(?:from|without)|locked\s+(?:out|me\s+out)|frozen\s+(?:my|the))\b/i.test(q)) score += 6;
        if (/\b(still\s+(?:being\s+)?charged?|charged?\s+(?:after|even\s+(?:though|after))|double\s+charged?|overcharged?|wrong\s+amount|not\s+(?:showing|reporting|reflecting|updating|posting|working))\b/i.test(q)) score += 6;

        // ── MEDIUM VALUE: financial harm ──
        if (/\b(overdraft|overdrew|bounced?|nsf|late\s+fee|can'?t\s+pay\s+(?:my\s+)?(?:rent|bills?|mortgage)|behind\s+on|need\s+(?:my|that|the)\s+money|paycheck\s+to\s+paycheck)\b/i.test(q)) score += 8;

        // ── LOW VALUE: generic questions (only good if long + substantive) ──
        if (/\?\s*$/.test(q) && len >= 50) score += 2;

        // ── PENALIZE: metadata, noise, non-substantive ──
        if (/['"][a-z_]+['"]\s*:/i.test(q)) score -= 20;
        if (/external_id|created_at|conversation_id|\bid':|event_type/i.test(q)) score -= 20;
        if (/^Subject:/i.test(q)) score -= 8;
        if (/\b(?:click here|visit|log in to|go to|navigate to)\s+(?:https?|www\.)/i.test(q)) score -= 8;
        if (/^(how|what|when|where|why|can|do|does|is|are)\s/i.test(q) && len < 50) score -= 5;
        if (/^(?:hi|hello|hey|thanks|thank you|ok|okay|yes|no|sure|got it|alright)\b/i.test(q) && len < 35) score -= 15;
        // Just stating what they want to do without a complaint
        if (/^I\s+(?:want|need|would\s+like)\s+to\s+(?:cancel|return|refund|pay|check|see|know|find|get)\b/i.test(q) && len < 60 && !/\b(but|because|since|however|still|yet|already|keep|can'?t)\b/i.test(q)) score -= 6;

        return { q, score };
      })
      .filter(x => x.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 3)
      .map(x => x.q);

    return { ...t, quotes: rankedQuotes, count, frequency };
  });

  const freqScore = { High: 3, Medium: 2, Low: 1 };
  themes.sort((a, b) => (b.severity * freqScore[b.frequency] * b.count) - (a.severity * freqScore[a.frequency] * a.count));

  const top5 = themes.slice(0, 5);

  const byProduct = {};
  PRODUCT_ORDER.forEach(p => byProduct[p] = []);
  themes.forEach(t => { if (byProduct[t.product]) byProduct[t.product].push(t); });

  return {
    total: rows.length,
    relevant: totalRelevant,
    filtered: rows.length - totalRelevant,
    themes, byProduct, top5,
    analysisDate: new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
  };
}

// ─── Upload Tab ───
function UploadTab({ onAnalyze, isAnalyzing }) {
  const fileRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState(null);
  const [error, setError] = useState(null);
  const [weekLabel, setWeekLabel] = useState(() => {
    const d = new Date();
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    return `Week of ${weekStart.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
  });

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a CSV file."); return; }
    setFileName(file.name);
    setError(null);

    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (results) => {
        if (results.errors.length > 0 && results.data.length === 0) { setError("Failed to parse CSV."); return; }
        const headers = results.meta.fields || [];
        const headerMap = {};
        headers.forEach(h => {
          const lower = h.toLowerCase().replace(/[^a-z0-9]/g, "_");
          if (["message", "conversation", "text", "content", "body", "transcript", "messages", "conversation_text"].includes(lower)) headerMap.message = h;
          if (["id", "conversation_id", "ticket_id", "case_id", "case_number"].includes(lower)) headerMap.id = h;
          if (["date", "created_at", "timestamp", "created", "date_created", "created_date"].includes(lower)) headerMap.date = h;
        });
        onAnalyze(results.data, headerMap, weekLabel, file.name);
      },
      error: () => setError("Failed to read file. Please try again.")
    });
  }, [onAnalyze, weekLabel]);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  }, [handleFile]);

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#111827", margin: 0 }}>Upload Conversations</h2>
        <p style={{ color: "#6B7280", fontSize: 14, marginTop: 8 }}>Upload your Decagon AI support conversation CSV to generate product-specific insights.</p>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 6 }}>Week Label</label>
        <input type="text" value={weekLabel} onChange={(e) => setWeekLabel(e.target.value)}
          style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 14, color: "#111827", boxSizing: "border-box", outline: "none" }} />
      </div>

      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
        onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragOver ? "#6366F1" : "#D1D5DB"}`, borderRadius: 12, padding: "48px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? "#EEF2FF" : "#FAFAFA", transition: "all 0.2s" }}>
        <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files[0])} />
        <div style={{ fontSize: 40, marginBottom: 12 }}>{fileName ? "\u2705" : "\uD83D\uDCC1"}</div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "#374151" }}>{fileName || "Drop your CSV here or click to browse"}</div>
        <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 6 }}>Supports .csv exported from Decagon</div>
      </div>

      {error && <div style={{ marginTop: 16, padding: "12px 16px", background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 8, color: "#DC2626", fontSize: 13 }}>{error}</div>}

      {isAnalyzing && (
        <div style={{ marginTop: 24, textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 24, height: 24, border: "3px solid #E5E7EB", borderTop: "3px solid #6366F1", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ marginTop: 8, fontSize: 14, color: "#6366F1", fontWeight: 500 }}>Analyzing conversations...</div>
        </div>
      )}

      <div style={{ marginTop: 32, padding: "20px 24px", background: "#F9FAFB", borderRadius: 10, border: "1px solid #E5E7EB" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 8 }}>How matching works</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.6 }}>
          Each conversation is matched against a catalog of specific product issues (e.g., "card declined unexpectedly", "credit score not reporting"). A theme only appears if the conversation contains language evidencing that specific problem. Quotes shown under a theme come from sentences that directly match its patterns.
        </div>
      </div>
    </div>
  );
}

    const top5HTML = archive.analysis.top5.map((t, i) => themeCardHTML(t, i + 1)).join("");
    const productSectionsHTML = PRODUCT_ORDER.map(product => {
      const themes = archive.analysis.byProduct[product] || [];
      if (themes.length === 0) return "";
      const c = productColors[product];
      const totalCount = themes.reduce((s, t) => s + t.count, 0);
      return `
      <section style="margin-top:36px;">
        <div style="display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid ${c.border};margin-bottom:16px;">
          <div style="font-size:22px;">${c.icon}</div>
          <h2 style="margin:0;font-size:20px;font-weight:700;color:${c.text};">${esc(product)}</h2>
          <span style="background:${c.badge};color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;">${themes.length} theme${themes.length === 1 ? "" : "s"} · ${totalCount} convs</span>
        </div>
        ${themes.map(t => themeCardHTML(t)).join("")}
      </section>`;
    }).join("");

    const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Perpay Product Insights — ${esc(archive.weekLabel)}</title>
<style>
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#F9FAFB; color:#111827; }
  @media print { body { background:#fff; } .no-print { display:none; } }
</style></head>
<body>
<div style="max-width:960px;margin:0 auto;padding:32px 24px;">
  <header style="background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;border-radius:14px;padding:28px 32px;margin-bottom:28px;">
    <div style="font-size:12px;font-weight:600;opacity:0.85;letter-spacing:0.1em;text-transform:uppercase;">Perpay Product Insights Report</div>
    <h1 style="margin:6px 0 0;font-size:28px;font-weight:700;">${esc(archive.weekLabel)}</h1>
    <div style="margin-top:8px;font-size:13px;opacity:0.9;">Generated ${esc(archive.analysis.analysisDate)}</div>
    <div style="display:flex;gap:24px;margin-top:20px;flex-wrap:wrap;">
      <div><div style="font-size:24px;font-weight:700;">${archive.analysis.total}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.05em;">Total conversations</div></div>
      <div><div style="font-size:24px;font-weight:700;">${archive.analysis.relevant}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.05em;">Actionable</div></div>
      <div><div style="font-size:24px;font-weight:700;">${archive.analysis.themes.length}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.05em;">Themes surfaced</div></div>
    </div>
  </header>

  <section>
    <h2 style="margin:0 0 14px;font-size:20px;font-weight:700;color:#111827;">Top 5 Most Critical Insights</h2>
    ${top5HTML || '<div style="color:#6B7280;font-size:14px;">No critical insights this period.</div>'}
  </section>

  ${productSectionsHTML}

  <footer style="margin-top:40px;padding-top:20px;border-top:1px solid #E5E7EB;color:#9CA3AF;font-size:11px;text-align:center;">
    Generated by Decagon Insights · Perpay Product Team
  </footer>
</div>
</body></html>`;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g, "-").toLowerCase()}.html`;
    a.click(); URL.revokeObjectURL(url);
  };

  const downloadCSV = (archive) => {
    const rows = archive.analysis.themes.map(t => ({
      "Product": t.product, "Theme": t.theme, "Frequency": t.frequency, "Conversations": t.count,
      "Quote 1": t.quotes[0] || "", "Quote 2": t.quotes[1] || "",
      "Recommendation": t.recommendation
    }));
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g, "-").toLowerCase()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  if (archives.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>{"\uD83D\uDDC3\uFE0F"}</div>
        <div style={{ fontSize: 16, fontWeight: 500 }}>Archive is empty</div>
        <div style={{ fontSize: 14, marginTop: 4 }}>Save an analysis from the Insights tab to start the archive.</div>
      </div>
    );
  }

  // Get the currently selected week tab for a given archive index (defaults to "top5")
  const getWeekTab = (idx) => selectedWeekTab[idx] || "top5";

  const renderArchiveInsights = (archive, idx) => {
    const currentTab = getWeekTab(idx);
    const analysis = archive.analysis;
    const tabOptions = [
      { id: "top5", label: "Top 5 Critical" },
      ...PRODUCT_ORDER.filter(p => (analysis.byProduct[p] || []).length > 0).map(p => ({ id: p, label: p }))
    ];

    return (
      <div style={{ padding: "16px 20px", borderTop: "1px solid #F3F4F6" }}>
        {/* Week tab row */}
        <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
          {tabOptions.map(t => (
            <button key={t.id} onClick={(e) => { e.stopPropagation(); setSelectedWeekTab(prev => ({ ...prev, [idx]: t.id })); }}
              style={{ padding: "5px 14px", borderRadius: 16, border: currentTab === t.id ? "none" : "1px solid #D1D5DB",
                background: currentTab === t.id ? (productColors[t.id]?.badge || "#DC2626") : "#fff",
                color: currentTab === t.id ? "#fff" : "#374151", fontSize: 12, fontWeight: currentTab === t.id ? 600 : 400, cursor: "pointer" }}>
              {t.label}
              {t.id === "top5" ? ` (${analysis.top5.length})` : ` (${(analysis.byProduct[t.id] || []).length})`}
            </button>
          ))}
        </div>

        {/* Content based on selected tab */}
        {currentTab === "top5" && (
          <div style={{ background: "#FEF2F2", borderRadius: 12, padding: "18px 22px", border: "1px solid #FECACA" }}>
            <h3 style={{ margin: "0 0 14px", fontSize: 16, fontWeight: 800, color: "#991B1B" }}>{"\uD83D\uDEA8"} Top 5 Most Critical Insights</h3>
            {analysis.top5.map((theme, i) => <ThemeCard key={theme.id} theme={theme} rank={i + 1} totalConvs={analysis.total} />)}
          </div>
        )}
        {currentTab !== "top5" && (
          <ProductSection product={currentTab} themes={analysis.byProduct[currentTab] || []} totalConvs={analysis.total} />
        )}
      </div>
    );
  };

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Insights Archive</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{archives.length} saved report{archives.length !== 1 ? "s" : ""} for week-over-week review</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <button onClick={onExportSite}
            style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
            {"\u2B07\uFE0F"} Export Site for Sharing
          </button>
          {!confirmClear ? (
            <button onClick={() => setConfirmClear(true)}
              style={{ background: "#FEF2F2", color: "#DC2626", border: "1px solid #FECACA", borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              Clear All Data
            </button>
          ) : (
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#DC2626", fontWeight: 600 }}>Are you sure?</span>
              <button onClick={() => { onClearAll(); setConfirmClear(false); }}
                style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                Yes, clear all
              </button>
              <button onClick={() => setConfirmClear(false)}
                style={{ background: "#fff", color: "#374151", border: "1px solid #D1D5DB", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>
                Cancel
              </button>
            </div>
          )}
        </div>
      </div>

      {archives.length >= 2 && (
        <div style={{ background: "#EEF2FF", borderRadius: 12, padding: "18px 22px", marginBottom: 24, border: "1px solid #C7D2FE" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: "#4338CA" }}>Week-over-Week Trend</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
            {archives.slice(0, 4).map((a, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 8, padding: "12px 14px", border: "1px solid #E5E7EB" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#6366F1", marginBottom: 6 }}>{a.weekLabel}</div>
                {PRODUCT_ORDER.map(p => {
                  const count = (a.analysis.byProduct[p] || []).reduce((s, t) => s + t.count, 0);
                  return <div key={p} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#374151", marginBottom: 2 }}><span>{p}</span><strong>{count}</strong></div>;
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      {archives.map((archive, idx) => (
        <div key={idx} style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", marginBottom: 10, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", flexWrap: "wrap", gap: 8 }} onClick={() => setExpandedIdx(expandedIdx === idx ? null : idx)}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#111827" }}>{archive.weekLabel}</div>
              <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{archive.fileName} &middot; {archive.analysis.total} conversations &middot; {archive.analysis.themes.length} themes &middot; Saved {archive.savedDate}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={(e) => { e.stopPropagation(); downloadReport(archive); }} style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download Report</button>
              <button onClick={(e) => { e.stopPropagation(); downloadCSV(archive); }} style={{ background: "#10B981", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download CSV</button>
              <button onClick={(e) => { e.stopPropagation(); onDelete(idx); }} style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
          {expandedIdx === idx && renderArchiveInsights(archive, idx)}
        </div>
      ))}
    </div>
  );
}

// ─── Main App ───
function DecagonInsights() {
  const [tab, setTab] = useState("upload");
  const [analysis, setAnalysis] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [archives, setArchives] = useState(function() {
    try {
      // First check for embedded data (baked into the HTML for sharing)
      if (window.__DECAGON_EMBEDDED_ARCHIVES__ && window.__DECAGON_EMBEDDED_ARCHIVES__.length > 0) {
        return window.__DECAGON_EMBEDDED_ARCHIVES__;
      }
      // Then check localStorage for local persistence
      var saved = localStorage.getItem("decagon-archives");
      return saved ? JSON.parse(saved) : [];
    } catch (e) { return []; }
  });
  const [currentWeekLabel, setCurrentWeekLabel] = useState("");
  const [currentFileName, setCurrentFileName] = useState("");

  // Persist archives to localStorage whenever they change
  useEffect(function() {
    try {
      localStorage.setItem("decagon-archives", JSON.stringify(archives));
    } catch (e) { console.warn("Could not save to localStorage:", e); }
  }, [archives]);

  const handleAnalyze = useCallback((data, headerMap, weekLabel, fileName) => {
    setIsAnalyzing(true);
    setCurrentWeekLabel(weekLabel);
    setCurrentFileName(fileName);
    setTimeout(() => {
      const result = analyzeConversations(data, headerMap);
      if (result.error) { alert(result.error); setIsAnalyzing(false); return; }
      setAnalysis(result);
      setIsAnalyzing(false);
      setTab("insights");
    }, 600);
  }, []);

  const handleSaveToArchive = useCallback(function() {
    if (!analysis) return;
    // Strip non-serializable data (RegExp patterns) and trim conversation text
    // so JSON.stringify works reliably and localStorage doesn't overflow
    var cleanThemes = analysis.themes.map(function(t) {
      return {
        id: t.id, product: t.product, theme: t.theme, summary: t.summary,
        whyItMatters: t.whyItMatters, rootCause: t.rootCause,
        recommendation: t.recommendation, severity: t.severity,
        quotes: t.quotes || [], count: t.count, frequency: t.frequency,
        conversations: (t.conversations || []).map(function(c) {
          return { id: c.id, date: c.date, excerpt: c.excerpt };
        })
      };
    });
    var cleanByProduct = {};
    PRODUCT_ORDER.forEach(function(p) {
      cleanByProduct[p] = cleanThemes.filter(function(t) { return t.product === p; });
    });
    var cleanTop5 = cleanThemes.slice(0, 5);
    var cleanAnalysis = {
      total: analysis.total, relevant: analysis.relevant, filtered: analysis.filtered,
      analysisDate: analysis.analysisDate, themes: cleanThemes,
      byProduct: cleanByProduct, top5: cleanTop5
    };
    setArchives(function(prev) { return [{
      weekLabel: currentWeekLabel, fileName: currentFileName, analysis: cleanAnalysis,
      savedDate: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" })
    }].concat(prev); });
  }, [analysis, currentWeekLabel, currentFileName]);

  const handleDeleteArchive = useCallback((idx) => {
    setArchives(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const handleClearAll = useCallback(() => {
    setArchives([]);
    try { localStorage.removeItem("decagon-archives"); } catch (e) { /* ignore */ }
  }, []);

  const handleExportSite = useCallback(function() {
    // Fetch the original page source (before Babel compilation) and inject archive data
    fetch(window.location.href.split('?')[0])
      .then(function(res) { return res.text(); })
      .then(function(originalHTML) {
        var embedScript = '<script>window.__DECAGON_EMBEDDED_ARCHIVES__ = ' + JSON.stringify(archives) + ';<\/script>';
        var injected = originalHTML.replace('<div id="root"></div>', '<div id="root"></div>\n' + embedScript);

        var blob = new Blob([injected], { type: "text/html" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "index.html";
        a.click();
        URL.revokeObjectURL(url);
      })
      .catch(function(err) {
        alert("Export failed: " + err.message);
      });
  }, [archives]);

  const tabs = [
    { id: "upload", label: "Upload", icon: "\uD83D\uDCC1" },
    { id: "insights", label: "Insights", icon: "\uD83D\uDCCA", badge: analysis ? analysis.themes.length : null },
    { id: "archive", label: "Archive", icon: "\uD83D\uDDC3\uFE0F", badge: archives.length > 0 ? archives.length : null }
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#F9FAFB", fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB", padding: "0 24px" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366F1, #8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 700 }}>P</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#111827", lineHeight: 1.2 }}>Decagon Insights</div>
              <div style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1 }}>Perpay Product Intelligence</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: tab === t.id ? "#EEF2FF" : "transparent",
                  color: tab === t.id ? "#6366F1" : "#6B7280", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6 }}>
                <span>{t.icon}</span>{t.label}
                {t.badge && <span style={{ background: tab === t.id ? "#6366F1" : "#D1D5DB", color: "#fff", borderRadius: 10, padding: "0 6px", fontSize: 11, fontWeight: 700, minWidth: 18, textAlign: "center" }}>{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        {tab === "upload" && <UploadTab onAnalyze={handleAnalyze} isAnalyzing={isAnalyzing} />}
        {tab === "insights" && <InsightsTab analysis={analysis} onSaveToArchive={handleSaveToArchive} />}
        {tab === "archive" && <ArchiveTab archives={archives} onDelete={handleDeleteArchive} onClearAll={handleClearAll} onExportSite={handleExportSite} />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DecagonInsights));
</script>
</body>
</html>
