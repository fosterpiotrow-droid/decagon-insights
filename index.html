ent.","recommendation":"Immediate: Add one-click self-service cancellation in the app with a confirmation screen (no mandatory retention call). Show personalized value summary at cancellation — credit score change since enrollment, total payments reported. Medium-term: Offer a 'pause subscription' option as an alternative to full cancellation. Add proactive monthly value recap emails showing credit bureau reporting activity.","severity":4,"quotes":["Yahoo Mail: Search, Organize, Conquer Oh nevermind cancel my subscription or account thank you Sent from Yahoo Mail for iPhone What help just cancel it Sent from Yahoo Mail for iPhone YES Sent from Yahoo Mail for iPhone","I finally found the cancel subscription button","Subject: Perpay plus I would like to cancel my Perpay plus"],"count":3,"frequency":"Medium","conversations":[{"id":"5ded47a7-ed95-4c0d-b4c5-12f96c9c2a1f","date":"2026-04-20T08:43:58.410052+00:00","excerpt":"Uploaded file: https://decagon.ai/file/70016cce-eb89-4145-946d-75976b560545 Thank you for your time. I finally found the cancel subscription button. Bunch of cyber pirates out there. Yikes. I really REALLY APPRECIATE PERPAY! THANK YOU, BRIDGET ROGERS Can you block this merchant f"},{"id":"intercom-perpay_email-pffa6bga-215473992926336","date":"2026-04-20T17:00:11.928480+00:00","excerpt":"Subject: Re: Congrats on your approval, Robert. Hi I am not understanding you process for this cc please help me Sent from Yahoo Mail for iPhone What do you mean direct deposit like from my work payroll? Yahoo Mail: Search, Organize, Conquer Oh nevermind cancel my subscription or"},{"id":"intercom-perpay_email-pffa6bga-215473995432408","date":"2026-04-20T19:30:12.711787+00:00","excerpt":"Subject: Perpay plus I would like to cancel my Perpay plus . Yes cancel On Mon, Apr 20, 2026 at 14:55 Darlina from Perpay <[hello@perpay.com](mailto:hello@perpay.com)> wrote: ![Darlina](https://perpay-8ca660bb1cea.intercom-mail.com/avatars/10160071/square_128/ba8f9b70-6c38-47d7-b"}]},{"id":"mp-shipping-delay","product":"Marketplace","theme":"Shipping Delays or Missing Tracking","summary":"Customers are waiting on orders that haven't shipped or arrived, and tracking information is missing, outdated, or not updating. Some report tracking numbers that never activate or show no movement for days. Top sub-tags: Order Status, Tracking Update, Delivery ETA.","whyItMatters":"Shipping uncertainty is the #1 driver of 'where is my order' support volume. Customers without tracking visibility assume the worst, consider disputes, and are unlikely to reorder. Prolonged uncertainty also increases chargeback risk as customers assume non-delivery.","rootCause":"Vendor shipping SLAs are inconsistently enforced — some vendors don't upload tracking within 48 hours. Tracking data integration has gaps where carrier handoffs (e.g., USPS to local post) don't trigger status updates. The app shows 'shipped' as soon as a label is created, even before the carrier has the package.","recommendation":"Immediate: Send proactive delay notifications with revised ETAs when tracking stalls for 48+ hours. Distinguish 'label created' from 'in transit' in the UI. Medium-term: Enforce vendor shipping SLAs (ship within 3 business days or auto-cancel with refund). Surface real-time carrier tracking with map view in the app.","severity":2,"quotes":["The person the said signed for it wasn't here at that time so I'm not sure where my package is but I won't be paying on a product I've never received",") Where is my order Where's my order"],"count":4,"frequency":"Medium","conversations":[{"id":"a2b34719-84be-4498-b7e1-5c1629b73633","date":"2026-04-20T10:30:03.438838+00:00","excerpt":"Where is my order Order #P011935041 Repayment • $265.34 • Apr 04, 2026 • (Hisense - 40\" A4 Series 1080P Smart TV ... ) Where is my order Where's my order"},{"id":"intercom-perpay_email-pffa6bga-215473988607669","date":"2026-04-20T11:40:03.880290+00:00","excerpt":"Hello Franklin, Thank you for following up and for ines are opaque — customers who request via support don't know when to expect a decision. CLI offers that require actions (like increasing direct deposit) don't clearly communicate the activation trigger or timeline.","recommendation":"Immediate: Add self-service CLI request button in the app with clear eligibility criteria displayed (minimum tenure, payment history, utilization). Show estimated review timeline upon submission. Medium-term: Build a CLI progress tracker: Eligible → Request Submitted → Under Review → Decision with push notification at each stage. Add proactive CLI offers to qualified customers with one-tap acceptance and instant activation.","severity":2,"quotes":["Well, I only have a 500 limit, so no large amounts can I request a credit limit increase?","Am I able to apply for the platinum card with a higher credit limit The master credit card With a limit of 1500 Increase my limit Ok could I apply for another card?","I already have a card but I want the metal higher credit limit trying to apply for a new card it stills send me to the dashboard it directs me to the dash board how can I apply from the website can I apply for a different card even tho I already have a prepay card with a balance"],"count":3,"frequency":"Medium","conversations":[{"id":"71fa9609-abe6-493f-a2ee-ded9f6908b92","date":"2026-04-20T16:34:16.952297+00:00","excerpt":"Hi, I am going to Mexico on 4/22 for 15 days and wanted to see if my card will work there Do I need to do anything else, I do not want it to get blocked how do I know what transactions are going to be blocked, so I can use a different card? Well, I only have a 500 limit, so no la"},{"id":"1f7c1c39-65ad-42c6-8ed7-de66eca62820","date":"2026-04-20T16:40:46.724023+00:00","excerpt":"I want to apply for the prepay metal card I want to apply but it takes me to the home dashboard it takes me to the home dashboard it just gives me information on how to apply but not an application just shows info and send me back to the app d on to call me 90089155 Wrong size was sent to me Uploaded file: Not good enough"],"count":2,"frequency":"Low","conversations":[{"id":"intercom-perpay_email-pffa6bga-215473990257940","date":"2026-04-20T13:50:06.017669+00:00","excerpt":"Subject: Request for Replacement Good morning I am reaching out today because, I recently ordered a 32 in television and it came damaged. I would like to request a replacement. I recently submitted a replacement form in the app, however no solution was given. Could you please ass"},{"id":"8d3e9298-2e34-408a-b3e9-09043d40450b","date":"2026-04-20T14:16:10.026811+00:00","excerpt":"Problem with your company Returning of the wrong product sent to me March 21st I think. I want a actual person to call me 90089155 Wrong size was sent to me Uploaded file: https://decagon.ai/file/9a9c91a0-c32c-4f3f-86bf-7ddff7cd2249 Not good enough. I sent you everything through "}]},{"id":"core-payment-issue","product":"Core","theme":"Payment Not Processing or Posting","summary":"Customers made a payment but it hasn't been reflected in their balance. Some report double charges, payments stuck in 'pending' for days, or payments that appear to fail silently. They have no way to confirm whether a payment actually went through. Top sub-tags: Payment Status, Double Charge, Payment Failed.","whyItMatters":"Payment processing issues create acute financial anxiety — customers don't know if their money was taken or if they still owe. This drives repeat contact (customers calling back to check status), increases dispute volume, and can cause customers to stop making payments entirely out of confusion.","rootCause":"ACH payment processing takes 1-3 business days but the UI shows no intermediate status between 'submitted' and 'posted.' When payments fail, the failure notification is often delayed or absent. The balance view doesn't distinguish between cleared and pending amounts, so customers can't reconcile what they paid vs. what the system shows.","recommendation":"Imme o increases chargeback risk as customers assume non-delivery.","rootCause":"Vendor shipping SLAs are inconsistently enforced — some vendors don't upload tracking within 48 hours. Tracking data integration has gaps where carrier handoffs (e.g., USPS to local post) don't trigger status updates. The app shows 'shipped' as soon as a label is created, even before the carrier has the package.","recommendation":"Immediate: Send proactive delay notifications with revised ETAs when tracking stalls for 48+ hours. Distinguish 'label created' from 'in transit' in the UI. Medium-term: Enforce vendor shipping SLAs (ship within 3 business days or auto-cancel with refund). Surface real-time carrier tracking with map view in the app.","severity":2,"quotes":["The person the said signed for it wasn't here at that time so I'm not sure where my package is but I won't be paying on a product I've never received",") Where is my order Where's my order"],"count":4,"frequency":"Medium","conversations":[{"id":"a2b34719-84be-4498-b7e1-5c1629b73633","date":"2026-04-20T10:30:03.438838+00:00","excerpt":"Where is my order Order #P011935041 Repayment • $265.34 • Apr 04, 2026 • (Hisense - 40\" A4 Series 1080P Smart TV ... ) Where is my order Where's my order"},{"id":"intercom-perpay_email-pffa6bga-215473988607669","date":"2026-04-20T11:40:03.880290+00:00","excerpt":"Hello Franklin, Thank you for following up and for confirming the repayment details on my account. Yes, I am aware of the payment amounts and the orders listed. However, I specifically requested that a portion of the funds should be sent to my other account, but I still haven’t r"},{"id":"intercom-perpay_email-pffa6bga-215473989199941","date":"2026-04-20T12:41:18.256678+00:00","excerpt":"Subject: Package Fedx is author there was no content in the box when they received it I would like my package please Sent from Gmail Mobile The Joe molone Sent from Gmail Mobile Tracking 511157252278 Sent from Gmail Mobile PO11790044 Sent from Gmail Mobil mp;signature=097c9ee46ff7be1aebb2cc57e0cc677791b285c4f15fb24d72a56cae0122895a&amp;req=diMnFsh8lYZZWvMU3Xa7hwq3FObFAsU4iM6Xtp%2Fr4AftUZY7SAk%3D%0A\"] 3206 [Image \"Image_260420_144519.jpeg?expires=1813320000&amp;signature=0f7b03cd"}]},{"id":"core-payment-issue","product":"Core","theme":"Payment Not Processing or Posting","summary":"Customers made a payment but it hasn't been reflected in their balance. Some report double charges, payments stuck in 'pending' for days, or payments that appear to fail silently. They have no way to confirm whether a payment actually went through. Top sub-tags: Payment Status, Double Charge, Payment Failed.","whyItMatters":"Payment processing issues create acute financial anxiety — customers don't know if their money was taken or if they still owe. This drives repeat contact (customers calling back to check status), increases dispute volume, and can cause customers to stop making payments entirely out of confusion.","rootCause":"ACH payment processing takes 1-3 business days but the UI shows no intermediate status between 'submitted' and 'posted.' When payments fail, the failure notification is often delayed or absent. The balance view doesn't distinguish between cleared and pending amounts, so customers can't reconcile what they paid vs. what the system shows.","recommendation":"Immediate: Show real-time payment status tracker: Submitted → Processing → Posted with estimated posting date. Send push/email confirmation at each stage. Medium-term: Add a payment history timeline with clear cleared vs. pending indicators. Auto-detect and flag potential double payments before processing.","severity":3,"quotes":["When will this be applied to my account It was a debit card payment Perhaps it was a transfer payment I don’t have that information, but I see a $20 payment pending on my account activity There is no label on any of my transactions, including my direct deposit","Subject: Re: Re: Joshua, your scheduled payment failed"],"count":2,"frequen ion intent.","recommendation":"Immediate: Add one-click self-service cancellation in the app with a confirmation screen (no mandatory retention call). Show personalized value summary at cancellation — credit score change since enrollment, total payments reported. Medium-term: Offer a 'pause subscription' option as an alternative to full cancellation. Add proactive monthly value recap emails showing credit bureau reporting activity.","severity":4,"quotes":["Yahoo Mail: Search, Organize, Conquer Oh nevermind cancel my subscription or account thank you Sent from Yahoo Mail for iPhone What help just cancel it Sent from Yahoo Mail for iPhone YES Sent from Yahoo Mail for iPhone","I finally found the cancel subscription button","Subject: Perpay plus I would like to cancel my Perpay plus"],"count":3,"frequency":"Medium","conversations":[{"id":"5ded47a7-ed95-4c0d-b4c5-12f96c9c2a1f","date":"2026-04-20T08:43:58.410052+00:00","excerpt":"Uploaded file: https://decagon.ai/file/70016cce-eb89-4145-946d-75976b560545 Thank you for your time. I finally found the cancel subscription button. Bunch of cyber pirates out there. Yikes. I really REALLY APPRECIATE PERPAY! THANK YOU, BRIDGET ROGERS Can you block this merchant f"},{"id":"intercom-perpay_email-pffa6bga-215473992926336","date":"2026-04-20T17:00:11.928480+00:00","excerpt":"Subject: Re: Congrats on your approval, Robert. Hi I am not understanding you process for this cc please help me Sent from Yahoo Mail for iPhone What do you mean direct deposit like from my work payroll? Yahoo Mail: Search, Organize, Conquer Oh nevermind cancel my subscription or"},{"id":"intercom-perpay_email-pffa6bga-215473995432408","date":"2026-04-20T19:30:12.711787+00:00","excerpt":"Subject: Perpay plus I would like to cancel my Perpay plus . Yes cancel On Mon, Apr 20, 2026 at 14:55 Darlina from Perpay <[hello@perpay.com](mailto:hello@perpay.com)> wrote: ![Darlina](https://perpay-8ca660bb1cea.intercom-mail.com/avatars/10160071/square_128/ba8f9b70-6c38-47d7- aque — customers who request via support don't know when to expect a decision. CLI offers that require actions (like increasing direct deposit) don't clearly communicate the activation trigger or timeline.","recommendation":"Immediate: Add self-service CLI request button in the app with clear eligibility criteria displayed (minimum tenure, payment history, utilization). Show estimated review timeline upon submission. Medium-term: Build a CLI progress tracker: Eligible → Request Submitted → Under Review → Decision with push notification at each stage. Add proactive CLI offers to qualified customers with one-tap acceptance and instant activation.","severity":2,"quotes":["Well, I only have a 500 limit, so no large amounts can I request a credit limit increase?","Am I able to apply for the platinum card with a higher credit limit The master credit card With a limit of 1500 Increase my limit Ok could I apply for another card?","I already have a card but I want the metal higher credit limit trying to apply for a new card it stills send me to the dashboard it directs me to the dash board how can I apply from the website can I apply for a different card even tho I already have a prepay card with a balance"],"count":3,"frequency":"Medium","conversations":[{"id":"71fa9609-abe6-493f-a2ee-ded9f6908b92","date":"2026-04-20T16:34:16.952297+00:00","excerpt":"Hi, I am going to Mexico on 4/22 for 15 days and wanted to see if my card will work there Do I need to do anything else, I do not want it to get blocked how do I know what transactions are going to be blocked, so I can use a different card? Well, I only have a 500 limit, so no la"},{"id":"1f7c1c39-65ad-42c6-8ed7-de66eca62820","date":"2026-04-20T16:40:46.724023+00:00","excerpt":"I want to apply for the prepay metal card I want to apply but it takes me to the home dashboard it takes me to the home dashboard it just gives me information on how to apply but not an application just shows info and send me back to the app dashboard it ":"Immediate: Add refund status tracker (Requested → Processing → Completed) with estimated date. Medium-term: Enforce 3-business-day refund SLA. Auto-send refund confirmation email with transaction details when funds are released.","severity":3,"quotes":["How do I cancel this order or if it has shipped how do I return it","If it is not able to be cancelled, how do I return the item?","I received an order that was not what I ordered how do I return this item and get what I ordered Order #P011977389 Repayment • $83.24 • Apr 11, 2026 • (Convenience Concepts - Xtra Storage 1 .."],"count":7,"frequency":"Medium","conversations":[{"id":"intercom-perpay_email-pffa6bga-215473937716015","date":"2026-04-20T11:11:11.209182+00:00","excerpt":"Conversation History: [Agent] Hi, Jamonte welcome to Perpay. How can I help today? [Jamonte Duggins] Didn’t Receive My Order [Agent] What order are you referring to? Please select a recent order: - Order #P011993014 - Order #P011869505 - Order #P011858952 - Order #P011828405 - Or"},{"id":"intercom-perpay_email-pffa6bga-215473988598192","date":"2026-04-20T11:38:33.432518+00:00","excerpt":"Subject: Sam Carter Yes my name is Sam Carter. I recently ordered an electric lawnmower from you! After the package arrived the mower is not going to be sufficient for my needs ! I realized this as soon as opened the box ! It is just not big enough or going to be strong enough! W"},{"id":"d6979b46-06fb-4d48-b955-72ec42f4b79b","date":"2026-04-20T14:02:39.689362+00:00","excerpt":"I received an order that was not what I ordered how do I return this item and get what I ordered Order #P011977389 Repayment • $83.24 • Apr 11, 2026 • (Convenience Concepts - Xtra Storage 1 ... ) I want what I originally ordered Im not able to open the claim form I am unable to s"},{"id":"intercom-perpay_email-pffa6bga-215473992360892","date":"2026-04-20T16:13:33.545347+00:00","excerpt":"Hello I never received my package Sent from my iPhone Order P011918495 It said delivered but I never received it and I canceled the other one Sent from my iPhone And it say delivered but it’s not here Sent from my iPhone Okay I have done that they told me that I have to contact y"},{"id":"intercom-perpay_email-pffa6bga-215473992456991","date":"2026-04-20T16:22:37.592104+00:00","excerpt":"Subject: Need information to cancel an order An order I didn't place was shipped; I just received the shipping notification. The last order I placed was for the Ninja Slush Machine. I did not order the blender set. How do I cancel this order or if it has shipped how do I return i"},{"id":"intercom-perpay_email-pffa6bga-215473993124103","date":"2026-04-20T17:09:31.277075+00:00","excerpt":"Subject: Why are you guys taking payment again when my order has been paid off for months? My name is Brittany Anderson. My contact number is 619-802-8901. I’m reaching out because I paid my order off months ago and now you guys are taking money off. There’s no active orders and "},{"id":"intercom-perpay_email-pffa6bga-215473993874288","date":"2026-04-20T18:04:13.965452+00:00","excerpt":"Subject: Order # P011923242 Hello, I would like to return this order. Hello, I having an issue with advancing after I upload the photos. I want to have this sent back. Please advise how to proceed It just stay in that page and will not allow me to submit the photos. I’ll try agai"}]}]},"savedDate":"Apr 28, 2026, 02:15 PM"}];</script>
<script type="text/babel">
const { useState, useCallback, useRef, useMemo, useEffect } = React;



// ─── Issue Catalog ───
// Curated, specific themes grouped by product. Each theme has regex patterns
// that match real customer language. Quotes are pulled from sentences that
// match the same patterns — guaranteeing quote-to-theme accuracy.

const ISSUE_CATALOG = [
  // ─── MARKETPLACE ───
  { id: "mp-order-denied", product: "Marketplace",
    theme: "Order Denied / Approval Blocked Without Explanation",
    summary: "Customers attempt to place marketplace orders and are denied with no clear explanation. They receive a generic 'not approved' message with no detail on why or what to do next. Top sub-tags: Order Approval, Spending Limit, Account Eligibility. A significant portion of these conversations escalate to human agents because the AI cannot override approvals.",
    whyItMatters: "Order denials with no explanation erode trust and directly reduce GMV. Customers who experience opaque denials are unlikely to retry and may leave negative reviews. This is the highest-friction point in the marketplace purchase funnel.",
    rootCause: "Approval logic considers multiple risk signals (payment history, account age, order value, outstanding balance) but the denial screen shows a single generic message. The approval engine returns a reason code internally but this is not surfaced to the customer or support agent.",
    patterns: [/\border\s+(?:was\s+)?(?:denied|rejected|not\s+approved)\b/i, /\bwhy\s+(?:was|did|is)\s+my\s+order\s+(?:denied|rejected)\b/i, /\bcan'?t\s+(?:place|make|submit)\s+(?:an?\s+)?order\b/i, /\bapproval\s+(?:denied|rejected)\b/i, /\border\s+(?:didn'?t|did\s+not)\s+go\s+through\b/i],
    recommendation: "Immediate: Map internal reason codes to customer-facing denial messages with specific next steps. Medium-term: Build an approval status page showing eligibility factors (payment history, balance, tenure) with a clear path to approval. Add a 'Check Eligibility' pre-check before order submission.",
    severity: 4 },
  { id: "mp-item-damaged-wrong", product: "Marketplace",
    theme: "Item Arrived Damaged, Wrong, or Defective",
    summary: "Customers receive items that are damaged on arrival, a different size/color than ordered, or defective out of the box. No self-service resolution exists — they must contact support for every fulfillment issue. Top sub-tags: Wrong Item, Damaged Package, Size/Color Mismatch.",
    whyItMatters: "Fulfillment quality issues directly damage brand trust and drive returns that cost margin. Customers who receive wrong items and face a difficult resolution process are among the highest churn risk in marketplace.",
    rootCause: "Third-party vendor quality control is not systematically enforced. No photo-based claim flow exists — every damaged item requires a full support conversation. Return label generation is manual.",
    patterns: [/\bitem\s+(?:is\s+|was\s+|arrived?\s+|came\s+)?(?:damaged|broken|defective|wrong)\b/i, /\breceived?\s+(?:the\s+)?wrong\s+(?:item|product|size|color)\b/i, /\bwrong\s+(?:item|product|size|color)\s+(?:was\s+)?(?:sent|delivered|received)\b/i, /\b(?:item|product)\s+(?:is\s+)?(?:not\s+what\s+I\s+ordered|different\s+from)\b/i, /\b(?:damaged|broken)\s+(?:when|on)\s+(?:arrival|delivery)\b/i],
    recommendation: "Immediate: Add photo-based claim flow with auto-generated return labels. Medium-term: Build vendor quality scorecards and enforce fulfillment SLAs. Add self-service resolution (replacement vs. refund) without requiring support contact.",
    severity: 3 },
  { id: "mp-return-refund", product: "Marketplace",
    theme: "Refund Not Processed or Return Blocked",
    summary: "Customers are waiting on refunds that haven't posted days or weeks after being promised, or can't initiate returns at all. They have no visibility into refund status or timeline. Top sub-tags: Refund Timing, Return Process, Refund Not Received.",
    whyItMatters: "Refund delays are a top driver of chargebacks and BBB complaints. Customers who can't get timely refunds lose confidence and are unlikely to make future purchases. Each delayed refund is a potential dispute.",
    rootCause: "Refund processing is manual with no SLA enforcement. The UI shows 'refund initiated' but the actual refund may not process for 5-10 business days. No real-time status tracking exists — customers must contact support repeatedly to check.",
    patterns: [/\bhow\s+(?:do\s+I|can\s+I|to)\s+(?:return|get\s+a?\s*refund)\b/i, /\breturn\s+(?:my|this|the)\s+(?:item|order|product)\b/i, /\bwant\s+(?:a\s+|my\s+)?refund\b/i, /\brefund\s+(?:hasn'?t|has\s+not|didn'?t|not)\s+(?:been\s+)?(?:processed|received|posted|issued)\b/i, /\bwhere'?s?\s+my\s+refund\b/i, /\bstill\s+(?:waiting|no)\s+(?:for\s+)?(?:my\s+)?refund\b/i],
    recommendation: "Immediate: Add refund status tracker (Requested \u2192 Processing \u2192 Completed) with estimated date. Medium-term: Enforce 3-business-day refund SLA. Auto-send refund confirmation email with transaction details when funds are released.",
    severity: 3 },
  { id: "mp-shipping-delay", product: "Marketplace",
    theme: "Shipping Delays or Missing Tracking",
    summary: "Customers are waiting on orders that haven't shipped or arrived, and tracking information is missing, outdated, or not updating. Some report tracking numbers that never activate or show no movement for days. Top sub-tags: Order Status, Tracking Update, Delivery ETA.",
    whyItMatters: "Shipping uncertainty is the #1 driver of 'where is my order' support volume. Customers without tracking visibility assume the worst, consider disputes, and are unlikely to reorder. Prolonged uncertainty also increases chargeback risk as customers assume non-delivery.",
    rootCause: "Vendor shipping SLAs are inconsistently enforced — some vendors don't upload tracking within 48 hours. Tracking data integration has gaps where carrier handoffs (e.g., USPS to local post) don't trigger status updates. The app shows 'shipped' as soon as a label is created, even before the carrier has the package.",
    patterns: [/\border\s+(?:hasn'?t|has\s+not)\s+(?:arrived|shipped|been\s+(?:delivered|shipped))\b/i, /\bwhere'?s?\s+my\s+(?:order|package|item|shipment)\b/i, /\btracking\s+(?:not\s+)?(?:updating|working|showing|available)\b/i, /\b(?:still|been)\s+(?:waiting|pending)\s+(?:for\s+)?(?:my\s+)?(?:order|delivery|shipment)\b/i, /\bshipping\s+(?:is\s+)?(?:taking|took)\s+(?:too\s+)?long\b/i],
    recommendation: "Immediate: Send proactive delay notifications with revised ETAs when tracking stalls for 48+ hours. Distinguish 'label created' from 'in transit' in the UI. Medium-term: Enforce vendor shipping SLAs (ship within 3 business days or auto-cancel with refund). Surface real-time carrier tracking with map view in the app.",
    severity: 2 },
  { id: "mp-cancel-order", product: "Marketplace",
    theme: "Order Cancellation Blocked / Not Confirmed",
    summary: "Customers attempting to cancel orders are either unable to complete cancellation through the app, receive no confirmation the cancellation processed, or continue to be charged after believing they cancelled. 'Cancelled' status in the UI does not reliably match backend state. Top sub-tags: Order Cancellation, Order Inquiries.",
    whyItMatters: "Unconfirmed cancellations drive chargebacks, BBB complaints, and 'fraud/theft' accusations on public review platforms. This is the highest direct reputational and retention risk in the product.",
    rootCause: "The cancellation flow lacks a definitive confirmed state \u2014 customers complete the action but receive no timestamped confirmation. Backend cancellation processing lags behind the UI response, causing charges to still process.",
    patterns: [/\bcancel\s+(?:my|this|the)\s+order\b/i, /\bwant\s+to\s+cancel\b/i, /\bcan'?t\s+cancel\b/i, /\bhow\s+(?:do\s+I|can\s+I|to)\s+cancel\s+(?:my|an?)\s+order\b/i, /\bchange\s+(?:my|the)\s+order\b/i, /\bmodify\s+(?:my|the)\s+order\b/i],
    recommendation: "Immediate: Add explicit cancellation confirmation screen with order ID + timestamp. Auto-send cancellation email/push. Medium-term: Build a cancellation status tracker (Requested \u2192 Processing \u2192 Confirmed). Audit backend cancel-to-billing cutoff timing.",
    severity: 2 },
  { id: "mp-spending-limit-low", product: "Marketplace",
    theme: "Spending Limit Too Low or Unexpectedly Decreased",
    summary: "Customers find their marketplace spending limit is too low to make desired purchases, or their limit was reduced without notice or explanation. Many report limits dropping after consistent on-time payments, which feels contradictory. Top sub-tags: Spending Limit, Limit Decrease, Approval Eligibility.",
    whyItMatters: "Spending limits directly gate GMV — every customer blocked from a purchase is lost revenue. Unexplained decreases feel punitive to customers who believe they've been responsible, creating immediate churn risk. This is one of the most emotionally charged themes: customers feel 'punished for doing nothing wrong.'",
    rootCause: "Limit adjustments are driven by risk models that run periodically (not in real-time) and factor in external credit data, payment history, and employer stability. The models can decrease limits even when Perpay-specific behavior is good. No in-app explanation or advance notice is provided when a limit changes.",
    patterns: [/\bspending\s+limit\s+(?:is\s+)?(?:too\s+)?(?:low|small|not\s+enough)\b/i, /\bwhy\s+(?:did|is|was)\s+my\s+spending\s+limit\s+(?:so\s+)?(?:low|decrease|drop|go\s+down|reduced)\b/i, /\bspending\s+limit\s+(?:was\s+|got\s+|has\s+been\s+)?(?:decreased|reduced|lowered|cut)\b/i, /\bincrease\s+(?:my\s+)?spending\s+limit\b/i, /\bhow\s+(?:do\s+I|can\s+I|to)\s+(?:get\s+|raise\s+)?(?:a\s+)?(?:higher\s+)?spending\s+limit\b/i],
    recommendation: "Immediate: Add pre-decrease notification with clear reasoning (e.g., 'Your limit was adjusted based on updated payment data'). Show current limit factors in-app. Medium-term: Build a transparent limit-increase flow showing specific behaviors (on-time payments, tenure milestones, direct deposit consistency) that trigger increases, with a progress tracker toward the next increase.",
    severity: 4 },
  { id: "mp-pricing-overcharge", product: "Marketplace",
    theme: "Unexpected Pricing or Overcharges on Orders",
    summary: "Customers feel they were charged more than expected, see hidden fees, or don't understand the total at checkout versus what they anticipated. Some report being charged a different amount than what was displayed on the product page. Top sub-tags: Price Discrepancy, Hidden Fees, Double Charge.",
    whyItMatters: "Pricing surprises destroy purchase confidence and are a leading driver of chargebacks and BBB complaints. Customers who feel overcharged are unlikely to make repeat purchases and frequently use language like 'scam' and 'rip-off' in conversations, creating reputational risk.",
    rootCause: "Checkout flow does not clearly itemize the Perpay markup, installment cost breakdown, and any fees before final confirmation. Product page price shows the base price, but the final payroll-deduction total (including Perpay's margin) can be significantly higher. No side-by-side comparison of retail price vs. Perpay total is provided.",
    patterns: [/\bprice\s+(?:is\s+)?(?:too\s+)?(?:high|expensive|much)\b/i, /\bovercharged?\b/i, /\bcharged\s+(?:more|extra|twice|double)\b/i, /\bwhy\s+(?:am\s+I|was\s+I)\s+charged\s+(?:so\s+much|more|extra)\b/i, /\bhidden\s+(?:fees?|charges?|costs?)\b/i],
    recommendation: "Immediate: Break down pricing transparently at checkout — base retail price, Perpay cost, per-paycheck deduction amount, and total cost over time. Medium-term: Add a total-cost-of-ownership comparison on product pages showing Perpay price vs. retail price. Consider a price transparency badge for items within 10% of retail.",
    severity: 3 },

  // ─── CORE ───
  { id: "core-direct-deposit-issue", product: "Core",
    theme: "Direct Deposit Not Showing or Delayed",
    summary: "Customers' direct deposits haven't posted when expected. They are checking their account repeatedly and don't know when to expect funds or why there's a delay.",
    whyItMatters: "Direct deposit is a core trust signal — when pay doesn't arrive on time, customers question the entire platform's reliability and may switch to a competitor.",
    rootCause: "Payroll processing schedules vary by employer. Perpay receives ACH files at different times but doesn't surface estimated arrival times to customers.",
    patterns: [/\bdirect\s+deposit\s+(?:hasn'?t|has\s+not|didn'?t|not)\s+(?:been\s+)?(?:posted|deposited|showing|arrived|hit|come|appeared)\b/i, /\bwhere'?s?\s+my\s+(?:direct\s+)?deposit\b/i, /\bdirect\s+deposit\s+(?:is\s+)?(?:late|delayed|missing|pending)\b/i, /\bwhen\s+(?:will|does)\s+(?:my\s+)?direct\s+deposit\s+(?:post|arrive|hit|show)\b/i, /\bmy\s+(?:direct\s+)?deposit\s+(?:is\s+)?not\s+(?:on|in|showing)\b/i, /\bmy\s+(?:paycheck|pay)\s+(?:hasn'?t|didn'?t|not)\s+(?:been\s+)?(?:deposited|posted)\b/i],
    recommendation: "Add a deposit tracker: Expected \u2192 Processing \u2192 Posted. Show employer-specific estimated deposit times and send push notification when deposit lands.",
    severity: 4 },
  { id: "core-payment-issue", product: "Core",
    theme: "Payment Not Processing or Posting",
    summary: "Customers made a payment but it hasn't been reflected in their balance. Some report double charges, payments stuck in 'pending' for days, or payments that appear to fail silently. They have no way to confirm whether a payment actually went through. Top sub-tags: Payment Status, Double Charge, Payment Failed.",
    whyItMatters: "Payment processing issues create acute financial anxiety — customers don't know if their money was taken or if they still owe. This drives repeat contact (customers calling back to check status), increases dispute volume, and can cause customers to stop making payments entirely out of confusion.",
    rootCause: "ACH payment processing takes 1-3 business days but the UI shows no intermediate status between 'submitted' and 'posted.' When payments fail, the failure notification is often delayed or absent. The balance view doesn't distinguish between cleared and pending amounts, so customers can't reconcile what they paid vs. what the system shows.",
    patterns: [/\bpayment\s+(?:didn'?t|did\s+not|hasn'?t|not)\s+(?:go\s+through|process|post|work)\b/i, /\bpayment\s+(?:is\s+)?(?:stuck|pending|failed|declined)\b/i, /\bmade\s+a\s+payment\s+(?:but|and)\s+(?:it\s+)?(?:still|not)\b/i, /\bwhy\s+(?:hasn'?t|didn'?t)\s+my\s+payment\s+(?:posted|processed|gone\s+through)\b/i, /\bdouble\s+(?:charged|payment|deducted)\b/i],
    recommendation: "Immediate: Show real-time payment status tracker: Submitted \u2192 Processing \u2192 Posted with estimated posting date. Send push/email confirmation at each stage. Medium-term: Add a payment history timeline with clear cleared vs. pending indicators. Auto-detect and flag potential double payments before processing.",
    severity: 3 },
  { id: "core-account-locked", product: "Core",
    theme: "Account Locked or Access Restricted",
    summary: "Customers are locked out of their accounts or find their accounts frozen/suspended. They don't understand why or how to regain access.",

// ─── Customer text extractor ───
// Decagon CSV exports often store the conversation as a stringified list of
// {role, text} events. We extract ONLY the customer (USER) text so quotes
// are real customer words — not AI replies or JSON metadata.
function extractUserText(raw) {
  if (!raw || typeof raw !== "string") return "";

  // Detect structured event data (Python/JSON-style with role + text fields)
  if (/['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/i.test(raw) || /['"]text['"]\s*:\s*['"]/.test(raw)) {
    const userTexts = [];

    // Match role:USER followed by text:... within ~600 chars (text first or role first)
    const re1 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'/gi;
    const re2 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"/gi;
    const re3 = /['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    const re4 = /['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    let m;
    [re1, re2, re3, re4].forEach(re => { while ((m = re.exec(raw)) !== null) userTexts.push(m[1]); });

    if (userTexts.length > 0) {
      return userTexts
        .map(t => t
          .replace(/\\n/g, " ")
          .replace(/\\r/g, " ")
          .replace(/\\t/g, " ")
          .replace(/\\u200b|\\ufeff/gi, "")
          .replace(/\\'/g, "'")
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, "\\")
          // Strip email subject lines, signatures, addresses
          // Keep Subject lines — they provide context for email-based conversations
          .replace(/\b\d{1,5}\s+\w+\s+(?:Street|St|Avenue|Ave|Suite|Ste|Road|Rd)\b[^.]*\.?/gi, "")
          .replace(/\bUnsubscribe\b[^.]*$/i, "")
          .replace(/\s+/g, " ")
          .trim())
        .filter(t => t.length > 5)
        .join(" ");
    }
  }

  // Plain text fallback — strip obvious metadata
  return raw
    .replace(/\\n/g, " ")
    .replace(/\\u200b|\\ufeff/gi, "")
    .replace(/\s+/g, " ")
    .trim();
}

// Filter out AI agent sentences from quotes
function isCustomerSentence(s) {
  if (/\b(?:I'?m|I am)\s+(?:Franklin|the AI|an AI|a virtual|your virtual|your AI|here to help|happy to help|glad to help)/i.test(s)) return false;
  if (/\bAI assistant\b/i.test(s)) return false;
  if (/\b(?:I'?d recommend|I recommend|I suggest|I can help|I can assist|Let me help|Let me look|Let me check|I understand your|I apologize|I'?m sorry to hear)/i.test(s)) return false;
  if (/\b(?:Thank you for (?:contacting|reaching|calling|your patience)|Is there anything else|Can I help you with anything)/i.test(s)) return false;
  return true;
}

function analyzeConversations(rows, headerMap) {
  const msgField = headerMap.message;
  const idField = headerMap.id;
  const dateField = headerMap.date;

  if (!msgField) return { error: "Could not find a message/conversation column. Please ensure your CSV has a column named 'message', 'conversation', 'text', 'content', 'body', or 'transcript'." };

  const themeMap = {};
  let totalRelevant = 0;

  rows.forEach((row, idx) => {
    const raw = row[msgField] || "";
    const userText = extractUserText(raw);
    if (!userText || userText.length < 15) return;

    const id = idField ? row[idField] : `conv-${idx + 1}`;
    const date = dateField ? row[dateField] : null;

    // Split into clean sentences for quote extraction — filter out AI agent text
    const sentences = userText
      .split(/(?<=[.!?])\s+|(?:\.\s)|(?:\?\s)|(?:!\s)/)
      .map(s => s.trim())
      .filter(s => s.length > 10 && s.length < 400 && /[a-zA-Z]/.test(s) && isCustomerSentence(s));

    // Detect which product the conversation is explicitly about
    const textLower = userText.toLowerCase();
    const mentionsCard = /\b(?:credit\s+card|perpay\s+card|my\s+card|the\s+card|card\s+(?:was|got|keeps?|didn|won|isn))\b/i.test(userText);
    const mentionsMarketplace = /\b(?:marketplace|my\s+order|item|shipping|tracking|delivery|checkout|cart)\b/i.test(userText);
    const mentionsPerpayPlus = /\b(?:perpay\s*\+|perpay\s+plus|subscription|membership|credit\s+(?:building|report|bureau|score)|experian|transunion|equifax)\b/i.test(userText);
    const mentionsCore = /\b(?:direct\s+deposit|autopay|auto\s*pay|paycheck|payroll|deduction|log\s*in|password|verify\s+(?:my\s+)?(?:identity|account))\b/i.test(userText);

    // Test each issue in the catalog
    let matched = false;
    for (const issue of ISSUE_CATALOG) {
      const isMatch = issue.patterns.some(p => p.test(userText));
      if (!isMatch) continue;

      // Product disambiguation: skip if conversation explicitly mentions a DIFFERENT product
      // than what this theme is categorized under
      const issueProduct = issue.product;
      let productMismatch = false;
      if (issueProduct === "Marketplace" && !mentionsMarketplace && (mentionsCard || mentionsPerpayPlus)) productMismatch = true;
      if (issueProduct === "Card" && !mentionsCard && mentionsMarketplace) productMismatch = true;
      if (issueProduct === "Perpay+" && !mentionsPerpayPlus && (mentionsCard || mentionsMarketplace)) productMismatch = true;
      if (issueProduct === "Core" && !mentionsCore && (mentionsCard || mentionsMarketplace || mentionsPerpayPlus)) productMismatch = true;
      if (productMismatch) continue;

      matched = true;

      // Quotes: sentences from THIS conversation that match THIS issue's patterns
      const matchingQuotes = sentences.filter(s => issue.patterns.some(p => p.test(s)));

      if (!themeMap[issue.id]) {
        themeMap[issue.id] = { ...issue, conversations: [], quotes: new Set() };
      }
      themeMap[issue.id].conversations.push({ id, date, text: userText, excerpt: userText.slice(0, 280) });
      matchingQuotes.forEach(q => {
        // Clean quote: strip URLs, UUIDs, and email addresses
        const cleaned = q.replace(/https?:\/\/[^\s"')]+/gi, "").replace(/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/gi, "").replace(/[a-f0-9]{24,}/gi, "").replace(/\S+@\S+\.\S+/g, "").replace(/\s+/g, " ").trim();
        if (cleaned.length > 15) themeMap[issue.id].quotes.add(cleaned);
      });
    }
    if (matched) totalRelevant++;
  });

  // Convert sets to arrays, rank quotes, compute frequency
  const themes = Object.values(themeMap).map(t => {
    const count = t.conversations.length;
    const frequency = count >= 8 ? "High" : count >= 3 ? "Medium" : "Low";

    const rankedQuotes = Array.from(t.quotes)
      .filter(isCustomerSentence)
      .map(q => {
        let score = 0;
        const len = q.length;
        // Ideal length: 50-250 chars
        if (len >= 50 && len <= 250) score += 6;
        else if (len >= 30 && len <= 300) score += 3;
        else if (len < 30) score -= 2;
        else score -= Math.floor((len - 300) / 50);

        // Strong first-person experience statements
        if (/\b(I|my|me|i'?m|i'?ve|i'?d)\b/i.test(q)) score += 3;

        // Frustration / emotional signals — these make the best quotes for PMs
        if (/\b(frustrated|frustrating|ridiculous|unacceptable|terrible|horrible|awful|disgusting|pathetic|joke|scam|rip\s*off|waste|useless|pointless|makes?\s+no\s+sense)\b/i.test(q)) score += 8;
        if (/\b(angry|furious|upset|disappointed|annoyed|fed\s+up|sick\s+of|tired\s+of|done\s+with|over\s+it|had\s+enough|last\s+straw)\b/i.test(q)) score += 6;
        if (/\b(can'?t\s+believe|don'?t\s+understand|no\s+one\s+(?:can|will)|been\s+trying|keeps?\s+happening|every\s+time|again\s+and\s+again|multiple\s+times|called?\s+(?:\d+|several|multiple)\s+times)\b/i.test(q)) score += 5;

        // Retention risk signals
        if (/\b(cancel|closing?\s+(?:my|the)\s+account|switch|leave|go\s+(?:to|with)\s+(?:another|different)|never\s+(?:again|using)|done\s+with|leaving)\b/i.test(q)) score += 7;

        // Specific product impact statements
        if (/\b(charged|deducted|took\s+(?:my|the)|lost|missing|won'?t\s+(?:let|allow)|denied|declined|rejected|blocked|frozen|locked)\b/i.test(q)) score += 4;

        // Financial harm signals
        if (/\b(overdraft|overdrew|bounced?|nsf|late\s+fee|can'?t\s+pay|rent|bills?|groceries|gas|behind\s+on)\b/i.test(q)) score += 6;

        // Questions show confusion/pain points
        if (/\?\s*$/.test(q)) score += 2;

        // Penalize metadata/noise
        if (/['"][a-z_]+['"]\s*:/i.test(q)) score -= 10;
        if (/external_id|created_at|conversation_id|\bid':/i.test(q)) score -= 10;
        if (/^Subject:/i.test(q)) score -= 3;
        // Penalize generic/short questions
        if (/^(how|what|when|where|why|can|do|does|is|are)\s/i.test(q) && len < 40) score -= 3;

        return { q, score };
      })
      .filter(x => x.score > -3)
      .sort((a, b) => b.score - a.score)
      .slice(0, 3)
      .map(x => x.q);

    return { ...t, quotes: rankedQuotes, count, frequency };
  });

  const freqScore = { High: 3, Medium: 2, Low: 1 };
  themes.sort((a, b) => (b.severity * freqScore[b.frequency] * b.count) - (a.severity * freqScore[a.frequency] * a.count));

  const top5 = themes.slice(0, 5);

  const byProduct = {};
  PRODUCT_ORDER.forEach(p => byProduct[p] = []);
  themes.forEach(t => { if (byProduct[t.product]) byProduct[t.product].push(t); });

  return {
    total: rows.length,
    relevant: totalRelevant,
    filtered: rows.length - totalRelevant,
    themes, byProduct, top5,
    analysisDate: new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
  };
}

// ─── UI components ───
const freqColors = { High: "#DC2626", Medium: "#F59E0B", Low: "#6B7280" };

function Badge({ label, color, bg }) {
  return <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, color, background: bg, whiteSpace: "nowrap" }}>{label}</span>;
}

function ThemeCard({ theme, rank, totalConvs }) {
  const [expanded, setExpanded] = useState(false);
  const c = productColors[theme.product];
  const pct = totalConvs > 0 ? ((theme.count / totalConvs) * 100).toFixed(1) : "0";

  return (
    <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", borderLeft: `4px solid ${c.border}`, marginBottom: 16, padding: "20px 24px", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>

      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 12 }}>

          <h4 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: "#111827", lineHeight: 1.35 }}>{theme.theme}</h4>
        </div>
        <div style={{ textAlign: "right", minWidth: 100 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: freqColors[theme.frequency] }}>{theme.count} convos &middot; {pct}%</div>
          <div style={{ fontSize: 10, color: "#9CA3AF" }}>of week's volume</div>
        </div>
      </div>

      {/* Summary */}
      {theme.summary && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#6B7280", textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 4 }}>Summary</div>
          <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{theme.summary}</div>
        </div>
      )}

      {/* Customer Signals */}
      {theme.quotes.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#6B7280", textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6 }}>Customer Signals</div>
          {theme.quotes.map((q, i) => (

              &ldquo;{q}&rdquo;
            </div>
          ))}
        </div>
      )}

      {/* Why This Matters + Root Cause */}
      {(theme.whyItMatters || theme.rootCause) && (
        <div style={{ display: "grid", gridTemplateColumns: theme.whyItMatters && theme.rootCause ? "1fr 1fr" : "1fr", gap: 12, marginBottom: 14 }}>

              <div style={{ fontSize: 10, fontWeight: 700, color: "#92400E", textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 4 }}>Why This Matters</div>
              <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.55 }}>{theme.whyItMatters}</div>
            </div>
          )}
          {theme.rootCause && (
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#4338CA", textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 4 }}>Root Cause Hypothesis</div>
              <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.55 }}>{theme.rootCause}</div>

        <div style={{ fontSize: 13, color: "#1E3A5F", lineHeight: 1.55 }}>{theme.recommendation}</div>
      </div>

        {expanded ? "Hide" : "View"} {theme.count} source conversation{theme.count !== 1 ? "s" : ""}
      </button>

      {expanded && (
        <div style={{ marginTop: 10, maxHeight: 280, overflowY: "auto", border: "1px solid #E5E7EB", borderRadius: 6 }}>
          {theme.conversations.map((conv, i) => (
            <div key={i} style={{ padding: "8px 12px", borderBottom: i < theme.conversations.length - 1 ? "1px solid #F3F4F6" : "none", fontSize: 12, color: "#374151", lineHeight: 1.5 }}>
