<script type="text/babel" data-presets="react">
const { useState, useCallback, useRef, useMemo } = React;



// ─── Theme discovery (dynamic) ───
// Themes are NOT hardcoded. They are discovered from the actual customer text
// in the uploaded CSV by extracting recurring noun/verb phrases (bigrams +
// trigrams) and clustering conversations around them. Product is inferred
// per-theme from the language used in matching conversations.

const STOPWORDS = new Set("a an the and or but if then else of to in on at for with by from is are was were be been being have has had do does did doesn don doesnt didnt didn won wont wasn werent isnt arent havent hasnt hadnt cant couldnt shouldnt wouldnt i im ive id youre youve youll were theyre theyve youd hed shed wed theyd ill well theyll he she we they them him her his hers theirs you your yours mine my me our ours us its this that these those it as not no yes please thanks thank hi hello hey ok okay so can could would should may might just get got getting give giving received receive about there here when what where which who why how whose very too also still even much more less than into out off up down over under again only own same other some any all each few most ll ve re d s t m o been will am had has having need needs needed want wants wanted go going went come came say said tell told make made take took use used see saw try tried let lets like zero one two three four five six seven eight nine ten eleven twelve thirteen fourteen fifteen sixteen seventeen eighteen nineteen twenty thirty forty fifty sixty seventy eighty ninety hundred thousand million file files uploaded image images attachment attachments http https www com org net perpay per pay franklin january february march april may june july august september october november december jan feb mar apr jun jul aug sep oct nov dec date birth".split(/\s+/));

// Generic customer-service noise — common in nearly every conversation, low product signal
const NOISE_TERMS = new Set([
  "customer service","customer support","let know","need help","please help","thank you","thanks much","good morning","good afternoon","good evening","best regards","kind regards","my account","my order","ai agent","live agent","real person","real human","speak someone","talk someone","get back","follow up","sent email","send email","phone number","reference number","case number","reach back","reach out","look forward","appreciate help","need assistance","please assist","please advise","let me","you know","uploaded file","upload file","file uploaded","uploaded image","two zero","zero zero","one zero","zero one","zero two","zero three","zero four","zero five","zero six","zero seven","zero eight","zero nine","actual person","call back","call me","want talk","want speak","reach out","business days","business day","working days","perpay com","decagon file","per pay","perpay","nineteen ninety","date birth","social security","last four","first last","first name","last name","mailing address","billing address","linked account","checking account","savings account"
]);

// Per-theme product attribution rules
const PRODUCT_KEYWORDS = {
  "Card": ["credit card","perpay card","apr","interest charge","interest rate","statement balance","minimum payment","card declined","card was declined","credit limit","spending limit","card payment","card transaction","swipe","merchant","charged interest","late fee","cardholder","cash advance"],
  "Marketplace": ["marketplace","place order","placed order","item","shipping","tracking","delivery","delivered","checkout","cart","return","refund","vendor","warehouse","shipped","arrived","damaged","wrong item","missing item","order approval","order denied","order canceled","order cancelled","price","discount","product"],
  "Perpay+": ["perpay+","perpay plus","subscription","membership","credit building","credit score","credit report","credit bureau","monthly fee","cancel subscription","unsubscribe","reporting","experian","transunion","equifax"],
  "Core": ["login","log in","password","reset password","autopay","direct deposit","paycheck","payroll","deduction","employer","verification","verify identity","two factor","update email","change phone","update address","payment method","bank account","ach"]
};

const PRODUCT_ORDER = ["Marketplace", "Core", "Perpay+", "Card"];

const productColors = {
  "Marketplace": { bg: "#ECFDF5", border: "#10B981", text: "#065F46", badge: "#10B981", icon: "\uD83D\uDED2" },
  "Core":        { bg: "#EFF6FF", border: "#3B82F6", text: "#1E40AF", badge: "#3B82F6", icon: "\uD83D\uDCB3" },
  "Perpay+":     { bg: "#EEF2FF", border: "#6366F1", text: "#4338CA", badge: "#6366F1", icon: "\uD83D\uDCC8" },
  "Card":        { bg: "#FFF7ED", border: "#F59E0B", text: "#92400E", badge: "#F59E0B", icon: "\uD83D\uDCB3" }
};


// ─── Customer text extractor ───
// Decagon CSV exports often store the conversation as a stringified list of
// {role, text} events. We extract ONLY the customer (USER) text so quotes
// are real customer words — not AI replies or JSON metadata.
function extractUserText(raw) {
  if (!raw || typeof raw !== "string") return "";

  // Detect structured event data (Python/JSON-style with role + text fields)
  if (/['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/i.test(raw) || /['"]text['"]\s*:\s*['"]/.test(raw)) {
    const userTexts = [];

    // Match role:USER followed by text:... within ~600 chars (text first or role first)
    const re1 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'/gi;
    const re2 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"/gi;
    const re3 = /['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    const re4 = /['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    let m;
    [re1, re2, re3, re4].forEach(re => { while ((m = re.exec(raw)) !== null) userTexts.push(m[1]); });

    if (userTexts.length > 0) {
      return userTexts
        .map(t => t
          .replace(/\\n/g, " ")
          .replace(/\\r/g, " ")
          .replace(/\\t/g, " ")
          .replace(/\\u200b|\\ufeff/gi, "")
          .replace(/\\'/g, "'")
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, "\\")
          // Strip email subject lines, signatures, addresses
          .replace(/^Subject:\s*[^\n.]*[\n.]?/i, "")
          .replace(/\b\d{1,5}\s+\w+\s+(?:Street|St|Avenue|Ave|Suite|Ste|Road|Rd)\b[^.]*\.?/gi, "")
          .replace(/\bUnsubscribe\b[^.]*$/i, "")
          .replace(/\s+/g, " ")
          .trim())
        .filter(t => t.length > 5)
        .join(" ");
    }
  }

  // Plain text fallback — strip obvious metadata
  return raw
    .replace(/\\n/g, " ")
    .replace(/\\u200b|\\ufeff/gi, "")
    .replace(/\s+/g, " ")
    .trim();
}

// ─── Analysis Engine ───
// Tokenize lower-cased customer text into content words (drops stopwords + numbers + short tokens)
function tokenize(text) {
  return text.toLowerCase()
    // Strip URLs, file paths, UUIDs, long hex strings, and email addresses before tokenizing
    .replace(/https?:\/\/[^\s"')]+/gi, " ")
    .replace(/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/gi, " ")
    .replace(/[a-f0-9]{24,}/gi, " ")
    .replace(/\S+@\S+\.\S+/g, " ")
    // Strip spelled-out phone numbers (sequences of number-words)
    .replace(/\b(?:zero|one|two|three|four|five|six|seven|eight|nine)(?:\s+(?:zero|one|two|three|four|five|six|seven|eight|nine)){2,}\b/gi, " ")
    .replace(/['']/g, "'")
    .replace(/[^a-z0-9'\s-]/g, " ")
    .split(/\s+/)
    .filter(w => w && w.length >= 3 && !STOPWORDS.has(w) && !/^\d+$/.test(w));
}

function ngramsOf(tokens, n) {
  const out = [];
  for (let i = 0; i <= tokens.length - n; i++) out.push(tokens.slice(i, i + n).join(" "));
  return out;
}

// Heuristic: is this n-gram a meaningful topic phrase? (not pure boilerplate)
function isMeaningfulPhrase(p) {
  if (NOISE_TERMS.has(p)) return false;
  const words = p.split(" ");
  // Reject if every word is a generic high-frequency filler or metadata
  const fillers = new Set(["account","customer","support","service","help","question","issue","problem","email","phone","number","message","know","want","need","like","please","file","files","uploaded","upload","image","images","attachment","call","agent","person","back","day","days","time","today","yesterday","week","month","year","still","already","really","actually","perpay","pay","per","franklin","assistant","address","name","information","provide","provided","verify","verified","check","checked","update","updated","confirm","confirmed","able","unable","sure","right","thing","something","anything","nothing","going","looking","look","think","thought","work","working","contact","contacted"]);
  const meaningful = words.filter(w => !fillers.has(w));
  if (meaningful.length < 1) return false;
  // Reject if phrase is just number words or date words
  const numWords = new Set(["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty","thirty","forty","fifty","sixty","seventy","eighty","ninety","hundred","thousand","first","second","third","fourth","fifth"]);
  if (words.every(w => numWords.has(w))) return false;
  // Reject if phrase contains the company name as the only meaningful word
  const withoutBrand = words.filter(w => w !== "perpay" && w !== "per" && w !== "pay" && w !== "franklin");
  const withoutBrandAndFillers = withoutBrand.filter(w => !fillers.has(w));
  if (withoutBrandAndFillers.length < 1) return false;
  return true;
}

// Filter out AI agent sentences from quotes
function isCustomerSentence(s) {
  // Reject sentences that are clearly from the AI agent, not the customer
  if (/\b(?:I'?m|I am)\s+(?:Franklin|the AI|an AI|a virtual|your virtual|your AI|here to help|happy to help|glad to help)/i.test(s)) return false;
  if (/\bAI assistant\b/i.test(s)) return false;
  if (/\b(?:I'?d recommend|I recommend|I suggest|I can help|I can assist|Let me help|Let me look|Let me check|I understand your|I apologize|I'?m sorry to hear)/i.test(s)) return false;
  if (/\b(?:Thank you for (?:contacting|reaching|calling|your patience)|Is there anything else|Can I help you with anything)/i.test(s)) return false;
  return true;
}

// Decide which product an n-gram + its conversations belong to
function inferProduct(ngram, convTexts) {
  const haystack = (ngram + " " + convTexts.join(" ")).toLowerCase();
  const score = { Marketplace: 0, Card: 0, "Perpay+": 0, Core: 0 };
  for (const [product, kws] of Object.entries(PRODUCT_KEYWORDS)) {
    for (const kw of kws) {
      const re = new RegExp("\\b" + kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "gi");
      const matches = haystack.match(re);
      if (matches) score[product] += matches.length * (ngram.toLowerCase().includes(kw) ? 3 : 1);
    }
  }
  let best = "Core", bestScore = 0;
  for (const [p, s] of Object.entries(score)) if (s > bestScore) { best = p; bestScore = s; }
  return best;
}

function titleCase(s) { return s.replace(/\b\w/g, c => c.toUpperCase()); }

function analyzeConversations(rows, headerMap) {
  const msgField = headerMap.message;
  const idField = headerMap.id;
  const dateField = headerMap.date;
  if (!msgField) return { error: "Could not find a message/conversation column. Please ensure your CSV has a column named 'message', 'conversation', 'text', 'content', 'body', or 'transcript'." };

  // ── Pass 1: extract per-conversation user text, sentences, and n-gram set ──
  const convs = [];
  rows.forEach((row, idx) => {
    const raw = row[msgField] || "";
    const userText = extractUserText(raw);
    if (!userText || userText.length < 20) return;
    const id = idField ? row[idField] : `conv-${idx + 1}`;
    const date = dateField ? row[dateField] : null;
    const sentences = userText
      .split(/(?<=[.!?])\s+|(?:\.\s)|(?:\?\s)|(?:!\s)/)
      .map(s => s.trim())
      .filter(s => s.length > 12 && s.length < 240 && /[a-zA-Z]/.test(s) && !/^[A-Z][a-z]+:\s/.test(s) && isCustomerSentence(s));
    const tokens = tokenize(userText);
    const phraseSet = new Set([...ngramsOf(tokens, 2), ...ngramsOf(tokens, 3)].filter(isMeaningfulPhrase));
    convs.push({ id, date, userText, sentences, phraseSet });
  });

  if (convs.length === 0) return { error: "No customer text could be extracted from this CSV." };

  // ── Pass 2: document frequency for every candidate phrase ──
  const df = new Map(); // phrase -> Set of conv indexes
  convs.forEach((c, i) => c.phraseSet.forEach(p => {
    if (!df.has(p)) df.set(p, new Set());
    df.get(p).add(i);
  }));

  // Keep phrases that appear in >=3 conversations and <=60% of corpus (not ubiquitous)
  const minDF = Math.max(3, Math.ceil(convs.length * 0.02));
  const maxDF = Math.max(minDF + 1, Math.floor(convs.length * 0.6));
  const candidates = [...df.entries()]
    .filter(([_, s]) => s.size >= minDF && s.size <= maxDF)
    .sort((a, b) => b[1].size - a[1].size);

  // ── Pass 3: greedy dedupe — drop phrases whose conv set is mostly a subset of an already-picked theme ──
  const picked = []; // { phrase, convs: Set, words: Set }
  for (const [phrase, convSet] of candidates) {
    const words = new Set(phrase.split(" "));
    let isDup = false;
    for (const p of picked) {
      // word overlap (longer phrase containing same key noun)
      const wordOverlap = [...words].filter(w => p.words.has(w)).length;
      if (wordOverlap >= Math.min(words.size, p.words.size)) { isDup = true; break; }
      // conversation overlap > 70% of the smaller set
      const inter = [...convSet].filter(c => p.convs.has(c)).length;
      const smaller = Math.min(convSet.size, p.convs.size);
      if (smaller > 0 && inter / smaller > 0.7) { isDup = true; break; }
    }
    if (!isDup) picked.push({ phrase, convs: convSet, words });
    if (picked.length >= 25) break;
  }

  // ── Pass 4: build themes ──
  const totalRelevant = new Set();
  const themes = picked.map(({ phrase, convs: convSet }) => {
    const convList = [...convSet].map(i => convs[i]);
    convList.forEach(c => totalRelevant.add(c.id));
    const product = inferProduct(phrase, convList.map(c => c.userText));
    const phraseWords = phrase.split(" ");
    const phraseRe = new RegExp("\\b" + phraseWords.join("\\W+") + "\\b", "i");

    // Quotes: sentences containing the phrase. Rank for first-person + length.
    const candidateSentences = new Set();
    convList.forEach(c => c.sentences.forEach(s => {
      if (phraseRe.test(s)) {
        // Clean quote: strip URLs, UUIDs, long hex, and email addresses
        const cleaned = s.replace(/https?:\/\/[^\s"')]+/gi, "").replace(/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/gi, "").replace(/[a-f0-9]{24,}/gi, "").replace(/\S+@\S+\.\S+/g, "").replace(/\s+/g, " ").trim();
        if (cleaned.length > 15) candidateSentences.add(cleaned);
      }
    }));
    const rankedQuotes = [...candidateSentences].filter(isCustomerSentence).map(q => {
      let score = 0;
      const len = q.length;
      if (len >= 30 && len <= 160) score += 5;
      else if (len < 30) score += 1;
      else score -= Math.floor((len - 160) / 30);
      if (/\b(I|my|me|i'?m|i'?ve|i'?d)\b/i.test(q)) score += 4;
      if (/\?\s*$/.test(q)) score += 1;
      if (/['"][a-z_]+['"]\s*:/i.test(q)) score -= 10;
      if (/external_id|created_at|conversation_id|\bid':/i.test(q)) score -= 10;
      if (/^Subject:/i.test(q)) score -= 5;
      return { q, score };
    }).filter(x => x.score > -3).sort((a, b) => b.score - a.score).slice(0, 3).map(x => x.q);

    const count = convSet.size;
    const frequency = count >= 10 ? "High" : count >= 4 ? "Medium" : "Low";
    const themeName = titleCase(phrase);
    const recommendation = `Customers raised concerns about "${phrase}" in ${count} conversation${count === 1 ? "" : "s"}. Investigate root cause within ${product}, surface clearer in-product messaging, and consider a flow improvement that proactively addresses this scenario.`;

    return {
      id: phrase.replace(/\s+/g, "-"),
      product, theme: themeName,
      patternPhrase: phrase,
      conversations: convList.map(c => ({ id: c.id, date: c.date, excerpt: c.userText.slice(0, 280) })),
      quotes: rankedQuotes,
      recommendation,
      count, frequency,
      severity: count >= 10 ? 4 : count >= 6 ? 3 : count >= 3 ? 2 : 1
    };
  }).filter(t => t.quotes.length > 0); // drop themes with no clean quote evidence

  const freqScore = { High: 3, Medium: 2, Low: 1 };
  themes.sort((a, b) => (b.severity * freqScore[b.frequency] * b.count) - (a.severity * freqScore[a.frequency] * a.count));
  const top5 = themes.slice(0, 5);

  const byProduct = {};
  PRODUCT_ORDER.forEach(p => byProduct[p] = []);
  themes.forEach(t => { if (byProduct[t.product]) byProduct[t.product].push(t); });

  return {
    total: rows.length,
    relevant: totalRelevant.size,
    filtered: rows.length - totalRelevant.size,
    themes, byProduct, top5,
    analysisDate: new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
  };
}

// ─── UI components ───
const freqColors = { High: "#DC2626", Medium: "#F59E0B", Low: "#6B7280" };

function Badge({ label, color, bg }) {
  return <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, color, background: bg, whiteSpace: "nowrap" }}>{label}</span>;
}

function ThemeCard({ theme, rank }) {
  const [expanded, setExpanded] = useState(false);
  const c = productColors[theme.product];

  return (
    <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", borderLeft: `4px solid ${c.border}`, marginBottom: 12, padding: "16px 20px", boxShadow: "0 1px 2px rgba(0,0,0,0.04)" }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 250 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
            {rank && <Badge label={`#${rank} CRITICAL`} color="#fff" bg="#DC2626" />}
            <Badge label={theme.frequency} color="#fff" bg={freqColors[theme.frequency]} />
            <span style={{ fontSize: 11, color: "#6B7280", fontWeight: 500 }}>{theme.count} conversation{theme.count !== 1 ? "s" : ""}</span>
          </div>
          <h4 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#111827", lineHeight: 1.35 }}>{theme.theme}</h4>
        </div>
      </div>

      {theme.quotes.length > 0 && (
        <div style={{ marginTop: 10 }}>
          {theme.quotes.map((q, i) => (
            <div key={i} style={{ background: c.bg, borderLeft: `3px solid ${c.border}`, padding: "6px 12px", marginBottom: 4, borderRadius: "0 6px 6px 0", fontSize: 12, color: "#374151", fontStyle: "italic", lineHeight: 1.5 }}>
              "{q}"
            </div>
          ))}
        </div>
      )}

      <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 6, padding: "8px 12px", marginTop: 10 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: "#166534", marginBottom: 2, textTransform: "uppercase", letterSpacing: 0.5 }}>Recommendation</div>
        <div style={{ fontSize: 12, color: "#15803D", lineHeight: 1.5 }}>{theme.recommendation}</div>
      </div>

      <button onClick={() => setExpanded(!expanded)} style={{ marginTop: 10, background: "none", border: `1px solid ${c.border}44`, borderRadius: 6, padding: "3px 10px", fontSize: 11, color: c.text, cursor: "pointer", fontWeight: 500 }}>
        {expanded ? "Hide" : "View"} {theme.count} source conversation{theme.count !== 1 ? "s" : ""}
      </button>

      {expanded && (
        <div style={{ marginTop: 10, maxHeight: 280, overflowY: "auto", border: "1px solid #E5E7EB", borderRadius: 6 }}>
          {theme.conversations.map((conv, i) => (
            <div key={i} style={{ padding: "8px 12px", borderBottom: i < theme.conversations.length - 1 ? "1px solid #F3F4F6" : "none", fontSize: 12, color: "#374151", lineHeight: 1.5 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                <span style={{ fontWeight: 600, color: "#111827", fontSize: 11 }}>ID: {conv.id}</span>
                {conv.date && <span style={{ fontSize: 10, color: "#9CA3AF" }}>{conv.date}</span>}
              </div>
              <div>{conv.excerpt}{conv.text.length > 280 ? "..." : ""}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ProductSection({ product, themes }) {
  const c = productColors[product];
  if (themes.length === 0) {
    return (
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, paddingBottom: 8, borderBottom: `2px solid ${c.border}33` }}>
          <span style={{ fontSize: 22 }}>{c.icon}</span>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: c.text }}>{product}</h3>
          <Badge label="0 themes" color="#fff" bg="#9CA3AF" />
        </div>
        <div style={{ fontSize: 12, color: "#9CA3AF", padding: "8px 0" }}>No actionable themes detected in this batch.</div>
      </div>
    );
  }

  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, paddingBottom: 10, borderBottom: `2px solid ${c.border}55` }}>
        <span style={{ fontSize: 22 }}>{c.icon}</span>
        <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: c.text }}>{product}</h3>
        <Badge label={`${themes.length} theme${themes.length !== 1 ? "s" : ""}`} color="#fff" bg={c.badge} />
        <span style={{ fontSize: 12, color: "#6B7280", marginLeft: "auto" }}>
          {themes.reduce((s, t) => s + t.count, 0)} conversations
        </span>
      </div>
      {themes.map((t, i) => <ThemeCard key={t.id} theme={t} />)}
    </div>
  );
}

// ─── Upload Tab ───
function UploadTab({ onAnalyze, isAnalyzing }) {
  const fileRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState(null);
  const [error, setError] = useState(null);
  const [weekLabel, setWeekLabel] = useState(() => {
    const d = new Date();
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    return `Week of ${weekStart.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
  });

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a CSV file."); return; }
    setFileName(file.name);
    setError(null);

    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (results) => {
        if (results.errors.length > 0 && results.data.length === 0) { setError("Failed to parse CSV."); return; }
        const headers = results.meta.fields || [];
        const headerMap = {};
        headers.forEach(h => {
          const lower = h.toLowerCase().replace(/[^a-z0-9]/g, "_");
          if (["message", "conversation", "text", "content", "body", "transcript", "messages", "conversation_text"].includes(lower)) headerMap.message = h;
          if (["id", "conversation_id", "ticket_id", "case_id", "case_number"].includes(lower)) headerMap.id = h;
          if (["date", "created_at", "timestamp", "created", "date_created", "created_date"].includes(lower)) headerMap.date = h;
        });
        onAnalyze(results.data, headerMap, weekLabel, file.name);
      },
      error: () => setError("Failed to read file. Please try again.")
    });
  }, [onAnalyze, weekLabel]);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  }, [handleFile]);

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#111827", margin: 0 }}>Upload Conversations</h2>
        <p style={{ color: "#6B7280", fontSize: 14, marginTop: 8 }}>Upload your Decagon AI support conversation CSV to generate product-specific insights.</p>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 6 }}>Week Label</label>
        <input type="text" value={weekLabel} onChange={(e) => setWeekLabel(e.target.value)}
          style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 14, color: "#111827", boxSizing: "border-box", outline: "none" }} />
      </div>

      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
        onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragOver ? "#6366F1" : "#D1D5DB"}`, borderRadius: 12, padding: "48px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? "#EEF2FF" : "#FAFAFA", transition: "all 0.2s" }}>
        <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files[0])} />
        <div style={{ fontSize: 40, marginBottom: 12 }}>{fileName ? "\u2705" : "\uD83D\uDCC1"}</div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "#374151" }}>{fileName || "Drop your CSV here or click to browse"}</div>
        <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 6 }}>Supports .csv exported from Decagon</div>
      </div>

      {error && <div style={{ marginTop: 16, padding: "12px 16px", background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 8, color: "#DC2626", fontSize: 13 }}>{error}</div>}

      {isAnalyzing && (
        <div style={{ marginTop: 24, textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 24, height: 24, border: "3px solid #E5E7EB", borderTop: "3px solid #6366F1", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ marginTop: 8, fontSize: 14, color: "#6366F1", fontWeight: 500 }}>Analyzing conversations...</div>
        </div>
      )}

      <div style={{ marginTop: 32, padding: "20px 24px", background: "#F9FAFB", borderRadius: 10, border: "1px solid #E5E7EB" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 8 }}>How matching works</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.6 }}>
          Each conversation is matched against a catalog of specific product issues (e.g., "card declined unexpectedly", "credit score not reporting"). A theme only appears if the conversation contains language evidencing that specific problem. Quotes shown under a theme come from sentences that directly match its patterns.
        </div>
      </div>
    </div>
  );
}

// ─── Insights Tab ───
function InsightsTab({ analysis, onSaveToArchive }) {
  const [filter, setFilter] = useState("All");
  const [saved, setSaved] = useState(false);

  if (!analysis) {
    return (
      <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>{"\uD83D\uDCCA"}</div>
        <div style={{ fontSize: 16, fontWeight: 500 }}>No analysis yet</div>
        <div style={{ fontSize: 14, marginTop: 4 }}>Upload a CSV in the Upload tab.</div>
      </div>
    );
  }

  const handleSave = () => {
    onSaveToArchive();
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const filters = ["All", ...PRODUCT_ORDER];

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Product Insights Report</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{analysis.analysisDate} &middot; {analysis.total} total &middot; {analysis.relevant} actionable &middot; {analysis.themes.length} themes</p>
        </div>
        <button onClick={handleSave} style={{ background: saved ? "#10B981" : "#6366F1", color: "#fff", border: "none", borderRadius: 8, padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          {saved ? "\u2713 Saved to Archive" : "Save to Archive"}
        </button>
      </div>

      {/* Top 5 critical */}
      {analysis.top5.length > 0 && (
        <div style={{ background: "#FEF2F2", borderRadius: 12, padding: "18px 22px", marginBottom: 28, border: "1px solid #FECACA" }}>
          <h3 style={{ margin: "0 0 14px", fontSize: 16, fontWeight: 800, color: "#991B1B" }}>{"\uD83D\uDEA8"} Top 5 Most Critical Insights</h3>
          {analysis.top5.map((theme, i) => <ThemeCard key={theme.id} theme={theme} rank={i + 1} />)}
        </div>
      )}

      {/* Product filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {filters.map(p => {
          const count = p === "All" ? analysis.themes.length : (analysis.byProduct[p]?.length || 0);
          return (
            <button key={p} onClick={() => setFilter(p)}
              style={{ padding: "6px 14px", borderRadius: 20, border: filter === p ? "none" : "1px solid #D1D5DB",
                background: filter === p ? (productColors[p]?.badge || "#6366F1") : "#fff",
                color: filter === p ? "#fff" : "#374151", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
              {p} ({count})
            </button>
          );
        })}
      </div>

      {/* Product-first breakdown */}
      <h3 style={{ fontSize: 16, fontWeight: 700, color: "#111827", marginBottom: 16 }}>Themes by Product</h3>
      {PRODUCT_ORDER.filter(p => filter === "All" || filter === p).map(p => (
        <ProductSection key={p} product={p} themes={analysis.byProduct[p] || []} />
      ))}
    </div>
  );
}

// ─── Archive Tab ───
function ArchiveTab({ archives, onDelete }) {
  const [expandedIdx, setExpandedIdx] = useState(null);

  const downloadReport = (archive) => {
    const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    const freqColor = (f) => f === "High" ? "#DC2626" : f === "Medium" ? "#D97706" : "#059669";
    const freqBg = (f) => f === "High" ? "#FEE2E2" : f === "Medium" ? "#FEF3C7" : "#D1FAE5";

    const themeCardHTML = (t, rank) => {
      const c = productColors[t.product] || productColors["Core"];
      const quotesHTML = (t.quotes || []).map(q => `
        <div style="background:#F9FAFB;border-left:3px solid ${c.border};padding:10px 14px;margin:8px 0;border-radius:4px;font-style:italic;color:#374151;font-size:13px;line-height:1.5;">
          &ldquo;${esc(q)}&rdquo;
        </div>`).join("");
      return `
      <div style="background:#fff;border:1px solid #E5E7EB;border-left:4px solid ${c.border};border-radius:10px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,0.04);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
          <div style="flex:1;min-width:260px;">
            ${rank ? `<div style="font-size:11px;font-weight:700;color:#6366F1;margin-bottom:4px;">#${rank} CRITICAL</div>` : ""}
            <div style="font-size:16px;font-weight:700;color:#111827;line-height:1.3;">${esc(t.theme)}</div>
            <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;">
              <span style="display:inline-block;background:${c.badge};color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;">${c.icon} ${esc(t.product)}</span>
              <span style="display:inline-block;background:${freqBg(t.frequency)};color:${freqColor(t.frequency)};font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;">${esc(t.frequency)} Frequency</span>
              <span style="display:inline-block;background:#F3F4F6;color:#4B5563;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;">${t.count} conversation${t.count === 1 ? "" : "s"}</span>
            </div>
          </div>
        </div>
        ${quotesHTML ? `<div style="margin-top:10px;"><div style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">Customer Signals</div>${quotesHTML}</div>` : ""}
        <div style="margin-top:12px;background:${c.bg};border-radius:6px;padding:10px 14px;">
          <div style="font-size:11px;font-weight:700;color:${c.text};text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">Recommendation</div>
          <div style="font-size:13px;color:${c.text};line-height:1.5;">${esc(t.recommendation)}</div>
        </div>
      </div>`;
    };

    const top5HTML = archive.analysis.top5.map((t, i) => themeCardHTML(t, i + 1)).join("");
    const productSectionsHTML = PRODUCT_ORDER.map(product => {
      const themes = archive.analysis.byProduct[product] || [];
      if (themes.length === 0) return "";
      const c = productColors[product];
      const totalCount = themes.reduce((s, t) => s + t.count, 0);
      return `
      <section style="margin-top:36px;">
        <div style="display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid ${c.border};margin-bottom:16px;">
          <div style="font-size:22px;">${c.icon}</div>
          <h2 style="margin:0;font-size:20px;font-weight:700;color:${c.text};">${esc(product)}</h2>
          <span style="background:${c.badge};color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;">${themes.length} theme${themes.length === 1 ? "" : "s"} · ${totalCount} convs</span>
        </div>
        ${themes.map(t => themeCardHTML(t)).join("")}
      </section>`;
    }).join("");

    const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Perpay Product Insights — ${esc(archive.weekLabel)}</title>
<style>
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#F9FAFB; color:#111827; }
  @media print { body { background:#fff; } .no-print { display:none; } }
</style></head>
<body>
<div style="max-width:960px;margin:0 auto;padding:32px 24px;">
  <header style="background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;border-radius:14px;padding:28px 32px;margin-bottom:28px;">
    <div style="font-size:12px;font-weight:600;opacity:0.85;letter-spacing:0.1em;text-transform:uppercase;">Perpay Product Insights Report</div>
    <h1 style="margin:6px 0 0;font-size:28px;font-weight:700;">${esc(archive.weekLabel)}</h1>
    <div style="margin-top:8px;font-size:13px;opacity:0.9;">Generated ${esc(archive.analysis.analysisDate)}</div>
    <div style="display:flex;gap:24px;margin-top:20px;flex-wrap:wrap;">
      <div><div style="font-size:24px;font-weight:700;">${archive.analysis.total}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.05em;">Total conversations</div></div>
      <div><div style="font-size:24px;font-weight:700;">${archive.analysis.relevant}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.05em;">Actionable</div></div>
      <div><div style="font-size:24px;font-weight:700;">${archive.analysis.themes.length}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.05em;">Themes surfaced</div></div>
    </div>
  </header>

  <section>
    <h2 style="margin:0 0 14px;font-size:20px;font-weight:700;color:#111827;">Top 5 Most Critical Insights</h2>
    ${top5HTML || '<div style="color:#6B7280;font-size:14px;">No critical insights this period.</div>'}
  </section>

  ${productSectionsHTML}

  <footer style="margin-top:40px;padding-top:20px;border-top:1px solid #E5E7EB;color:#9CA3AF;font-size:11px;text-align:center;">
    Generated by Decagon Insights · Perpay Product Team
  </footer>
</div>
</body></html>`;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g, "-").toLowerCase()}.html`;
    a.click(); URL.revokeObjectURL(url);
  };

  const downloadCSV = (archive) => {
    const rows = archive.analysis.themes.map(t => ({
      "Product": t.product, "Theme": t.theme, "Frequency": t.frequency, "Conversations": t.count,
      "Quote 1": t.quotes[0] || "", "Quote 2": t.quotes[1] || "",
      "Recommendation": t.recommendation
    }));
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g, "-").toLowerCase()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  if (archives.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>{"\uD83D\uDDC3\uFE0F"}</div>
        <div style={{ fontSize: 16, fontWeight: 500 }}>Archive is empty</div>
        <div style={{ fontSize: 14, marginTop: 4 }}>Save an analysis from the Insights tab to start the archive.</div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Insights Archive</h2>
        <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{archives.length} saved report{archives.length !== 1 ? "s" : ""} for week-over-week review</p>
      </div>

      {archives.length >= 2 && (
        <div style={{ background: "#EEF2FF", borderRadius: 12, padding: "18px 22px", marginBottom: 24, border: "1px solid #C7D2FE" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: "#4338CA" }}>Week-over-Week Trend</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
            {archives.slice(0, 4).map((a, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 8, padding: "12px 14px", border: "1px solid #E5E7EB" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#6366F1", marginBottom: 6 }}>{a.weekLabel}</div>
                {PRODUCT_ORDER.map(p => {
                  const count = (a.analysis.byProduct[p] || []).reduce((s, t) => s + t.count, 0);
                  return <div key={p} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#374151", marginBottom: 2 }}><span>{p}</span><strong>{count}</strong></div>;
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      {archives.map((archive, idx) => (
        <div key={idx} style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", marginBottom: 10, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", flexWrap: "wrap", gap: 8 }} onClick={() => setExpandedIdx(expandedIdx === idx ? null : idx)}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#111827" }}>{archive.weekLabel}</div>
              <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{archive.fileName} &middot; {archive.analysis.total} conversations &middot; {archive.analysis.themes.length} themes &middot; Saved {archive.savedDate}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={(e) => { e.stopPropagation(); downloadReport(archive); }} style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download Report</button>
              <button onClick={(e) => { e.stopPropagation(); downloadCSV(archive); }} style={{ background: "#10B981", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download CSV</button>
              <button onClick={(e) => { e.stopPropagation(); onDelete(idx); }} style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
          {expandedIdx === idx && (
            <div style={{ padding: "0 20px 16px", borderTop: "1px solid #F3F4F6" }}>
              <div style={{ marginTop: 12, fontSize: 12, fontWeight: 700, color: "#991B1B", marginBottom: 6 }}>Top 5 Critical</div>
              {archive.analysis.top5.map((t, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid #F3F4F6", fontSize: 12 }}>
                  <Badge label={`#${i + 1}`} color="#fff" bg="#DC2626" />
                  <Badge label={t.product} color="#fff" bg={productColors[t.product].badge} />
                  <span style={{ color: "#374151" }}>{t.theme}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── Main App ───
function DecagonInsights() {
  const [tab, setTab] = useState("upload");
  const [analysis, setAnalysis] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [archives, setArchives] = useState([]);
  const [currentWeekLabel, setCurrentWeekLabel] = useState("");
  const [currentFileName, setCurrentFileName] = useState("");

  const handleAnalyze = useCallback((data, headerMap, weekLabel, fileName) => {
    setIsAnalyzing(true);
    setCurrentWeekLabel(weekLabel);
    setCurrentFileName(fileName);
    setTimeout(() => {
      const result = analyzeConversations(data, headerMap);
      if (result.error) { alert(result.error); setIsAnalyzing(false); return; }
      setAnalysis(result);
      setIsAnalyzing(false);
      setTab("insights");
    }, 600);
  }, []);

  const handleSaveToArchive = useCallback(() => {
    if (!analysis) return;
    setArchives(prev => [{
      weekLabel: currentWeekLabel, fileName: currentFileName, analysis: { ...analysis },
      savedDate: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" })
    }, ...prev]);
  }, [analysis, currentWeekLabel, currentFileName]);

  const handleDeleteArchive = useCallback((idx) => {
    setArchives(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const tabs = [
    { id: "upload", label: "Upload", icon: "\uD83D\uDCC1" },
    { id: "insights", label: "Insights", icon: "\uD83D\uDCCA", badge: analysis ? analysis.themes.length : null },
    { id: "archive", label: "Archive", icon: "\uD83D\uDDC3\uFE0F", badge: archives.length > 0 ? archives.length : null }
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#F9FAFB", fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB", padding: "0 24px" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366F1, #8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 700 }}>P</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#111827", lineHeight: 1.2 }}>Decagon Insights</div>
              <div style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1 }}>Perpay Product Intelligence</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: tab === t.id ? "#EEF2FF" : "transparent",
                  color: tab === t.id ? "#6366F1" : "#6B7280", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6 }}>
                <span>{t.icon}</span>{t.label}
                {t.badge && <span style={{ background: tab === t.id ? "#6366F1" : "#D1D5DB", color: "#fff", borderRadius: 10, padding: "0 6px", fontSize: 11, fontWeight: 700, minWidth: 18, textAlign: "center" }}>{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        {tab === "upload" && <UploadTab onAnalyze={handleAnalyze} isAnalyzing={isAnalyzing} />}
        {tab === "insights" && <InsightsTab analysis={analysis} onSaveToArchive={handleSaveToArchive} />}
        {tab === "archive" && <ArchiveTab archives={archives} onDelete={handleDeleteArchive} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<DecagonInsights />);
</script></body></html>
