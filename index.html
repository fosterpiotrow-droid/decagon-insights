// ─── Customer text extractor ───
// Decagon CSV exports often store the conversation as a stringified list of
// {role, text} events. We extract ONLY the customer (USER) text so quotes
// are real customer words — not AI replies or JSON metadata.
function extractUserText(raw) {
  if (!raw || typeof raw !== "string") return "";

  // Detect structured event data (Python/JSON-style with role + text fields)
  if (/['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/i.test(raw) || /['"]text['"]\s*:\s*['"]/.test(raw)) {
    const userTexts = [];

    // Match role:USER followed by text:... within ~600 chars (text first or role first)
    const re1 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'/gi;
    const re2 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"/gi;
    const re3 = /['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    const re4 = /['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    let m;
    [re1, re2, re3, re4].forEach(re => { while ((m = re.exec(raw)) !== null) userTexts.push(m[1]); });

    if (userTexts.length > 0) {
      return userTexts
        .map(t => t
          .replace(/\\n/g, " ")
          .replace(/\\r/g, " ")
          .replace(/\\t/g, " ")
          .replace(/\\u200b|\\ufeff/gi, "")
          .replace(/\\'/g, "'")
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, "\\")
          // Strip email subject lines, signatures, addresses
          .replace(/^Subject:\s*[^\n.]*[\n.]?/i, "")
          .replace(/\b\d{1,5}\s+\w+\s+(?:Street|St|Avenue|Ave|Suite|Ste|Road|Rd)\b[^.]*\.?/gi, "")
          .replace(/\bUnsubscribe\b[^.]*$/i, "")
          .replace(/\s+/g, " ")
          .trim())
        .filter(t => t.length > 5)
        .join(" ");
    }
  }

  // Plain text fallback — strip obvious metadata
  return raw
    .replace(/\\n/g, " ")
    .replace(/\\u200b|\\ufeff/gi, "")
    .replace(/\s+/g, " ")
    .trim();
}

// ─── Analysis Engine ───

// Filter out AI agent sentences from quotes
function isCustomerSentence(s) {
  if (/\b(?:I'?m|I am)\s+(?:Franklin|the AI|an AI|a virtual|your virtual|your AI|here to help|happy to help|glad to help)/i.test(s)) return false;
  if (/\bAI assistant\b/i.test(s)) return false;
  if (/\b(?:I'?d recommend|I recommend|I suggest|I can help|I can assist|Let me help|Let me look|Let me check|I understand your|I apologize|I'?m sorry to hear)/i.test(s)) return false;
  if (/\b(?:Thank you for (?:contacting|reaching|calling|your patience)|Is there anything else|Can I help you with anything)/i.test(s)) return false;
  return true;
}

function analyzeConversations(rows, headerMap) {
  const msgField = headerMap.message;
  const idField = headerMap.id;
  const dateField = headerMap.date;

  if (!msgField) return { error: "Could not find a message/conversation column. Please ensure your CSV has a column named 'message', 'conversation', 'text', 'content', 'body', or 'transcript'." };

  const themeMap = {};
  let totalRelevant = 0;

  rows.forEach((row, idx) => {
    const raw = row[msgField] || "";
    const userText = extractUserText(raw);
    if (!userText || userText.length < 15) return;

    const id = idField ? row[idField] : `conv-${idx + 1}`;
    const date = dateField ? row[dateField] : null;

    // Split into clean sentences for quote extraction — filter out AI agent text
    const sentences = userText
      .split(/(?<=[.!?])\s+|(?:\.\s)|(?:\?\s)|(?:!\s)/)
      .map(s => s.trim())
      .filter(s => s.length > 10 && s.length < 220 && /[a-zA-Z]/.test(s) && !/^[A-Z][a-z]+:\s/.test(s) && isCustomerSentence(s));

    // Test each issue in the catalog
    let matched = false;
    for (const issue of ISSUE_CATALOG) {
      const isMatch = issue.patterns.some(p => p.test(userText));
      if (!isMatch) continue;
      matched = true;

      // Quotes: sentences from THIS conversation that match THIS issue's patterns
      const matchingQuotes = sentences.filter(s => issue.patterns.some(p => p.test(s)));

      if (!themeMap[issue.id]) {
        themeMap[issue.id] = { ...issue, conversations: [], quotes: new Set() };
      }
      themeMap[issue.id].conversations.push({ id, date, text: userText, excerpt: userText.slice(0, 280) });
      matchingQuotes.forEach(q => {
        // Clean quote: strip URLs, UUIDs, and email addresses
        const cleaned = q.replace(/https?:\/\/[^\s"')]+/gi, "").replace(/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/gi, "").replace(/[a-f0-9]{24,}/gi, "").replace(/\S+@\S+\.\S+/g, "").replace(/\s+/g, " ").trim();
        if (cleaned.length > 15) themeMap[issue.id].quotes.add(cleaned);
      });
    }
    if (matched) totalRelevant++;
  });

  // Convert sets to arrays, rank quotes, compute frequency
  const themes = Object.values(themeMap).map(t => {
    const count = t.conversations.length;
    const frequency = count >= 8 ? "High" : count >= 3 ? "Medium" : "Low";

    const rankedQuotes = Array.from(t.quotes)
      .filter(isCustomerSentence)
      .map(q => {
        let score = 0;
        const len = q.length;
        if (len >= 30 && len <= 140) score += 5;
        else if (len < 30) score += 1;
        else score -= Math.floor((len - 140) / 30);
        if (/\b(I|my|me|i'?m|i'?ve|i'?d)\b/i.test(q)) score += 3;
        if (/\?\s*$/.test(q)) score += 1;
        if (/['"][a-z_]+['"]\s*:/i.test(q)) score -= 10;
        if (/external_id|created_at|conversation_id|\bid':/i.test(q)) score -= 10;
        if (/^Subject:/i.test(q)) score -= 5;
        return { q, score };
      })
      .filter(x => x.score > -5)
      .sort((a, b) => b.score - a.score)
      .slice(0, 3)
      .map(x => x.q);

    return { ...t, quotes: rankedQuotes, count, frequency };
  });

  const freqScore = { High: 3, Medium: 2, Low: 1 };
  themes.sort((a, b) => (b.severity * freqScore[b.frequency] * b.count) - (a.severity * freqScore[a.frequency] * a.count));

  const top5 = themes.slice(0, 5);

  const byProduct = {};
  PRODUCT_ORDER.forEach(p => byProduct[p] = []);
  themes.forEach(t => { if (byProduct[t.product]) byProduct[t.product].push(t); });

  return {
    total: rows.length,
    relevant: totalRelevant,
    filtered: rows.length - totalRelevant,
    themes, byProduct, top5,
    analysisDate: new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
  };
}

// ─── Upload Tab ───
function UploadTab({ onAnalyze, isAnalyzing }) {
  const fileRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState(null);
  const [error, setError] = useState(null);
  const [weekLabel, setWeekLabel] = useState(() => {
    const d = new Date();
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    return `Week of ${weekStart.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
  });

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a CSV file."); return; }
    setFileName(file.name);
    setError(null);

    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (results) => {
        if (results.errors.length > 0 && results.data.length === 0) { setError("Failed to parse CSV."); return; }
        const headers = results.meta.fields || [];
        const headerMap = {};
        headers.forEach(h => {
          const lower = h.toLowerCase().replace(/[^a-z0-9]/g, "_");
          if (["message", "conversation", "text", "content", "body", "transcript", "messages", "conversation_text"].includes(lower)) headerMap.message = h;
          if (["id", "conversation_id", "ticket_id", "case_id", "case_number"].includes(lower)) headerMap.id = h;
          if (["date", "created_at", "timestamp", "created", "date_created", "created_date"].includes(lower)) headerMap.date = h;
        });
        onAnalyze(results.data, headerMap, weekLabel, file.name);
      },
      error: () => setError("Failed to read file. Please try again.")
    });
  }, [onAnalyze, weekLabel]);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  }, [handleFile]);

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#111827", margin: 0 }}>Upload Conversations</h2>
        <p style={{ color: "#6B7280", fontSize: 14, marginTop: 8 }}>Upload your Decagon AI support conversation CSV to generate product-specific insights.</p>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 6 }}>Week Label</label>
        <input type="text" value={weekLabel} onChange={(e) => setWeekLabel(e.target.value)}
          style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 14, color: "#111827", boxSizing: "border-box", outline: "none" }} />
      </div>

      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
        onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragOver ? "#6366F1" : "#D1D5DB"}`, borderRadius: 12, padding: "48px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? "#EEF2FF" : "#FAFAFA", transition: "all 0.2s" }}>
        <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files[0])} />
        <div style={{ fontSize: 40, marginBottom: 12 }}>{fileName ? "\u2705" : "\uD83D\uDCC1"}</div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "#374151" }}>{fileName || "Drop your CSV here or click to browse"}</div>
        <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 6 }}>Supports .csv exported from Decagon</div>
      </div>

      {error && <div style={{ marginTop: 16, padding: "12px 16px", background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 8, color: "#DC2626", fontSize: 13 }}>{error}</div>}

      {isAnalyzing && (
        <div style={{ marginTop: 24, textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 24, height: 24, border: "3px solid #E5E7EB", borderTop: "3px solid #6366F1", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ marginTop: 8, fontSize: 14, color: "#6366F1", fontWeight: 500 }}>Analyzing conversations...</div>
        </div>
      )}

      <div style={{ marginTop: 32, padding: "20px 24px", background: "#F9FAFB", borderRadius: 10, border: "1px solid #E5E7EB" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 8 }}>How matching works</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.6 }}>
          Each conversation is matched against a catalog of specific product issues (e.g., "card declined unexpectedly", "credit score not reporting"). A theme only appears if the conversation contains language evidencing that specific problem. Quotes shown under a theme come from sentences that directly match its patterns.
        </div>
      </div>
    </div>
  );
}

    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Insights Archive</h2>
        <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{archives.length} saved report{archives.length !== 1 ? "s" : ""} for week-over-week review</p>
      </div>

      {archives.length >= 2 && (
        <div style={{ background: "#EEF2FF", borderRadius: 12, padding: "18px 22px", marginBottom: 24, border: "1px solid #C7D2FE" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: "#4338CA" }}>Week-over-Week Trend</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
            {archives.slice(0, 4).map((a, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 8, padding: "12px 14px", border: "1px solid #E5E7EB" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#6366F1", marginBottom: 6 }}>{a.weekLabel}</div>
                {PRODUCT_ORDER.map(p => {
                  const count = (a.analysis.byProduct[p] || []).reduce((s, t) => s + t.count, 0);
                  return <div key={p} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#374151", marginBottom: 2 }}><span>{p}</span><strong>{count}</strong></div>;
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      {archives.map((archive, idx) => (
        <div key={idx} style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", marginBottom: 10, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", flexWrap: "wrap", gap: 8 }} onClick={() => setExpandedIdx(expandedIdx === idx ? null : idx)}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#111827" }}>{archive.weekLabel}</div>
              <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{archive.fileName} &middot; {archive.analysis.total} conversations &middot; {archive.analysis.themes.length} themes &middot; Saved {archive.savedDate}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={(e) => { e.stopPropagation(); downloadReport(archive); }} style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download Report</button>
              <button onClick={(e) => { e.stopPropagation(); downloadCSV(archive); }} style={{ background: "#10B981", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download CSV</button>
              <button onClick={(e) => { e.stopPropagation(); onDelete(idx); }} style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
          {expandedIdx === idx && (
            <div style={{ padding: "0 20px 16px", borderTop: "1px solid #F3F4F6" }}>
              <div style={{ marginTop: 12, fontSize: 12, fontWeight: 700, color: "#991B1B", marginBottom: 6 }}>Top 5 Critical</div>
              {archive.analysis.top5.map((t, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid #F3F4F6", fontSize: 12 }}>
                  <Badge label={`#${i + 1}`} color="#fff" bg="#DC2626" />
                  <Badge label={t.product} color="#fff" bg={productColors[t.product].badge} />
                  <span style={{ color: "#374151" }}>{t.theme}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── Main App ───
function DecagonInsights() {
  const [tab, setTab] = useState("upload");
  const [analysis, setAnalysis] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [archives, setArchives] = useState([]);
  const [currentWeekLabel, setCurrentWeekLabel] = useState("");
  const [currentFileName, setCurrentFileName] = useState("");

  const handleAnalyze = useCallback((data, headerMap, weekLabel, fileName) => {
    setIsAnalyzing(true);
    setCurrentWeekLabel(weekLabel);
    setCurrentFileName(fileName);
    setTimeout(() => {
      const result = analyzeConversations(data, headerMap);
      if (result.error) { alert(result.error); setIsAnalyzing(false); return; }
      setAnalysis(result);
      setIsAnalyzing(false);
      setTab("insights");
    }, 600);
  }, []);

  const handleSaveToArchive = useCallback(() => {
    if (!analysis) return;
    setArchives(prev => [{
      weekLabel: currentWeekLabel, fileName: currentFileName, analysis: { ...analysis },
      savedDate: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" })
    }, ...prev]);
  }, [analysis, currentWeekLabel, currentFileName]);

  const handleDeleteArchive = useCallback((idx) => {
    setArchives(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const tabs = [
    { id: "upload", label: "Upload", icon: "\uD83D\uDCC1" },
    { id: "insights", label: "Insights", icon: "\uD83D\uDCCA", badge: analysis ? analysis.themes.length : null },
    { id: "archive", label: "Archive", icon: "\uD83D\uDDC3\uFE0F", badge: archives.length > 0 ? archives.length : null }
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#F9FAFB", fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB", padding: "0 24px" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366F1, #8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 700 }}>P</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#111827", lineHeight: 1.2 }}>Decagon Insights</div>
              <div style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1 }}>Perpay Product Intelligence</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: tab === t.id ? "#EEF2FF" : "transparent",
                  color: tab === t.id ? "#6366F1" : "#6B7280", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6 }}>
                <span>{t.icon}</span>{t.label}
                {t.badge && <span style={{ background: tab === t.id ? "#6366F1" : "#D1D5DB", color: "#fff", borderRadius: 10, padding: "0 6px", fontSize: 11, fontWeight: 700, minWidth: 18, textAlign: "center" }}>{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        {tab === "upload" && <UploadTab onAnalyze={handleAnalyze} isAnalyzing={isAnalyzing} />}
        {tab === "insights" && <InsightsTab analysis={analysis} onSaveToArchive={handleSaveToArchive} />}
        {tab === "archive" && <ArchiveTab archives={archives} onDelete={handleDeleteArchive} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<DecagonInsights />);
</script></body></html>
