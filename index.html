d back about my cancellation request"},{"id":"intercom-215473987680824","date":"2026-04-20T09:54:13.348169+00:00","excerpt":"I'd like to cancel two of the orders I set by mistake"},{"id":"intercom-215473988613783","date":"2026-04-20T11:40:50.878599+00:00","excerpt":"I was wanting to know how can I cancel an order — it is not giving me the option"},{"id":"intercom-215473989084459","date":"2026-04-20T12:27:38.079840+00:00","excerpt":"I just want you to cancel my account please"},{"id":"intercom-215473991105201","date":"2026-04-20T14:36:45.973416+00:00","excerpt":"Please cancel this order"},{"id":"6122044d","date":"2026-04-20T14:45:11.400981+00:00","excerpt":"Need help canceling my latest order"},{"id":"intercom-215473992340384","date":"2026-04-20T16:11:51.485851+00:00","excerpt":"I am trying to cancel an order but it will not let me in the app"},{"id":"61a5ee95","date":"2026-04-20T16:12:15.476260+00:00","excerpt":"Can I cancel my order?"},{"id":"intercom-215473992901051","date":"2026-04-20T16:58:08.806571+00:00","excerpt":"I want to cancel the order that was just placed"},{"id":"intercom-215473993507715","date":"2026-04-20T17:44:56.962240+00:00","excerpt":"Hello I want to cancel my order"}]},{"id":"card-fraud-unauthorized","product":"Card","theme":"Unauthorized or Fraudulent Card Charges","summary":"Customers see charges they didn't make and need to report fraud, freeze their card, and get their money back. The process requires contacting support — no self-service options exist. Investigation timelines are unclear and customers feel exposed while waiting.","whyItMatters":"Fraud is the highest-urgency trust emergency. Every minute without a card freeze means more potential fraudulent charges. Slow resolution leads to chargebacks, account closure, and permanent customer loss.","rootCause":"No instant card freeze/lock is available in-app — customers must call support during business hours. Dispute filing requires a full support conversation. Investigation timelines are not communicated upfront.","recommendation":"Immediate: Add instant card freeze/lock toggle in-app (available 24/7). One-tap dispute filing form with automatic provisional credit within 24 hours per Reg E. Medium-term: Show investigation timeline tracker. Add real-time transaction alerts.","severity":4,"quotes":["I would like to speak with a representative regarding an unauthorized charge on my account","There's a fraudulent transaction on my credit card","I need to get a new card — an unauthorized charge attempted to come out of my account"],"count":9,"frequency":"High","conversations":[{"id":"857d8590","date":"2026-04-20T12:49:03.601330+00:00","excerpt":"Dispute. Unauthorized transaction."},{"id":"intercom-215473990116323","date":"2026-04-20T13:38:11.914141+00:00","excerpt":"I would like to speak to a representative regarding unauthorized charge on my account"},{"id":"750bb373","date":"2026-04-20T14:16:36.180736+00:00","excerpt":"My card was stolen"},{"id":"aca8211a","date":"2026-04-20T15:19:53.880469+00:00","excerpt":"I have some fraudulent activity on my card — no one has reached out to me"},{"id":"9a614aac","date":"2026-04-20T16:28:43.144558+00:00","excerpt":"I need a new card number for fraudulent activity"},{"id":"fbd02ba6","date":"2026-04-20T17:55:50.215512+00:00","excerpt":"My issue is regarding an unauthorized transaction"},{"id":"867e5211","date":"2026-04-20T19:42:42.077746+00:00","excerpt":"I need to get a new card, an unauthorized charge attempted to come out of my account"}]},{"id":"core-verification","product":"Core","theme":"Identity or Account Verification Difficulties","summary":"Customers struggle to complete identity or account verification. The process fails repeatedly, gets stuck with no progress indicator, or requires documents they don't have. Some report submitting documents multiple times with no feedback on what was wrong.","whyItMatters":"Verification friction blocks onboarding and feature access — every customer who can't verify never experiences the product's value. Customers who fail multiple times rarely retry, resulting in permanent acquisition loss.","rootCause":"Verification flow has unclear document requirements upfront. Failures show generic error messages without specifying what was wrong. No progress indicator exists.","recommendation":"Immediate: Show clear document requirements upfront with real-time validation feedback. Add specific failure reasons. Medium-term: Build a verification progress tracker. Add fallback verification methods for edge cases.","severity":2,"quotes":["I can't get a security code to verify my identity","I need a live agent to help verify my identity — it keeps failing","I've been approved for a line of credit and I'm trying to make a purchase but it says it can't verify my identity"],"count":16,"frequency":"High","conversations":[{"id":"intercom-215473988036949","date":"2026-04-20T10:27:09.290186+00:00","excerpt":"I'm trying to get verified and when I put in my SSN it says unable to verify"},{"id":"intercom-215473992030983","date":"2026-04-20T15:50:44.227899+00:00","excerpt":"I am trying to get set up with an account but it says it can't verify my identity"},{"id":"intercom-215473992477405","date":"2026-04-20T16:24:07.140994+00:00","excerpt":"I'm trying to verify my identity — can't verify identity, please contact customer support"},{"id":"intercom-215473992854886","date":"2026-04-20T16:54:53.492366+00:00","excerpt":"I'm trying to get in touch with you guys to verify my identity"},{"id":"intercom-215473995049170","date":"2026-04-20T19:14:47.235097+00:00","excerpt":"It doesn't want to verify me or my account"}]},{"id":"core-account-locked","product":"Core","theme":"Account Locked or Access Restricted","summary":"Customers are locked out of their accounts or find their accounts frozen/suspended. They don't understand why or how to regain access.","whyItMatters":"Account lockouts block all product engagement. Without access, customers can't make payments, check balances, or use any Perpay service — creating immediate churn risk.","rootCause":"Security triggers lock accounts but don't communicate the specific reason or unlock path to the customer.","recommendation":"Display specific lock reasons with a self-service unlock flow (identity re-verification, password reset). Add proactive notification when an account is about to be locked.","severity":4,"quotes":["Why is my account suspended? I have direct deposit set up and have been making payments on time","I just went online to apply for the card, but it says my account is suspended","I signed up before but now it's stating that it cannot verify me — I can't get back in"],"count":8,"frequency":"High","conversations":[{"id":"9161794a","date":"2026-04-20T11:57:01.384171+00:00","excerpt":"Why is my account suspended?"},{"id":"ec1d4dad","date":"2026-04-20T15:38:47.446863+00:00","excerpt":"Why is my account suspended?"},{"id":"80e3f0f4","date":"2026-04-20T17:32:29.677594+00:00","excerpt":"I see my account is locked — I want to make sure it's only locked because of nonpayment"},{"id":"intercom-215473995221351","date":"2026-04-20T19:19:55.507527+00:00","excerpt":"How do I unsuspend my account so that I can use the credit card feature?"}]},{"id":"mp-return-refund","product":"Marketplace","theme":"Refund Not Processed or Return Blocked","summary":"Customers are waiting on refunds that haven't posted days or weeks after being promised, or can't initiate returns at all. They have no visibility into refund status or timeline.","whyItMatters":"Refund delays are a top driver of chargebacks and BBB complaints. Customers who can't get timely refunds lose confidence and are unlikely to make future purchases.","rootCause":"Refund processing is manual with no SLA enforcement. No real-time status tracking exists — customers must contact support repeatedly to check.","recommendation":"Immediate: Add refund status tracker (Requested → Processing → Completed) with estimated date. Medium-term: Enforce 3-business-day refund SLA. Auto-send refund confirmation email when funds are released.","severity":3,"quotes":["How do I cancel this order, or if it has shipped, how do I return it?","If it cannot be cancelled, how do I return the item?","Payments are still being taken but there are no active orders — I want to know why and how to get a refund"],"count":7,"frequency":"Medium","conversations":[{"id":"d6979b46","date":"2026-04-20T14:02:39.689362+00:00","excerpt":"I received an order that was not what I ordered — how do I return this item?"},{"id":"intercom-215473992360892","date":"2026-04-20T16:13:33.545347+00:00","excerpt":"It said delivered but I never received it"},{"id":"intercom-215473993874288","date":"2026-04-20T18:04:13.965452+00:00","excerpt":"I am having an issue with the return form — it won't allow me to submit the photos"}]},{"id":"pp-cancel-subscription","product":"Perpay+","theme":"Wants to Cancel Perpay+ Subscription","summary":"Customers want to cancel their Perpay+ subscription but can't find how to do it in the app, or feel the process is unnecessarily difficult. Many are frustrated that cancellation requires contacting support rather than a simple toggle.","whyItMatters":"Cancellation friction creates outsized negative brand sentiment. 'Dark pattern' accusations around cancellation difficulty create regulatory and reputational risk.","rootCause":"No self-service cancellation option exists — customers must contact support, creating a mandatory retention conversation.","recommendation":"Immediate: Add one-click self-service cancellation in the app with a confirmation screen. Show personalized value summary at cancellation. Medium-term: Offer a 'pause subscription' option as an alternative.","severity":4,"quotes":["Please just cancel my subscription — I shouldn't have to call to do this","I would like to cancel my Perpay Plus","I finally found the cancel subscription button — it was way too hard to find"],"count":3,"frequency":"Medium","conversations": t.","whyItMatters":"CLI requests signal engaged, growing customers. Failing to provide a clear path loses interchange revenue and pushes customers to competitors. Unresolved CLI requests are a leading indicator of card abandonment.","rootCause":"No self-service CLI request flow exists. Eligibility criteria are not communicated anywhere. Review timelines are opaque.","recommendation":"Immediate: Add self-service CLI request button with clear eligibility criteria displayed. Show estimated review timeline upon submission.","severity":2,"quotes":["I only have a low limit — can I request a credit limit increase?","Am I able to apply for a card with a higher credit limit?","I want the higher credit limit but when I try to apply it just sends me to the dashboard"],"count":3,"frequency":"Medium","conversations":[{"id":"71fa9609","date":"2026-04-20T16:34:16.952297+00:00","excerpt":"Can I request a credit limit increase?"},{"id":"1f7c1c39","date":"2026-04-20T16:40:46.724023+00:00","excerpt":"I want to apply but it just gives me information and sends me back to the dashboard"},{"id":"80ea11ef","date":"2026-04-20T17:56:24.951578+00:00","excerpt":"Am I able to apply for a card with a higher credit limit?"}]},{"id":"card-declined","product":"Card","theme":"Card Declined at Point of Sale / No Explanation","summary":"Customers report their Perpay credit card being declined at merchants despite believing they have available balance. They receive no real-time explanation for the decline.","whyItMatters":"Public declines are the single most embarrassing product experience. Each decline erodes card usage permanently and directly impacts interchange revenue.","rootCause":"Multiple decline triggers all surface as the same generic 'declined' message. No real-time push notification explains the specific reason.","recommendation":"Immediate: Map processor decline codes to customer-facing push notifications with specific reason + resolution action.","severity":4,"quotes":["What is the reason // ─── PII Stripper ───
function stripPII(text) {
  let t = text;
  // Unicode BOM, zero-width, and invisible characters — strip first so downstream regexes see clean text
  t = t.replace(/[﻿​‌‍­]/g, '');
  // Emoji — strip early so name-at-end detection isn't blocked by trailing emoji
  t = t.replace(/[\u{1F000}-\u{1FFFF}]/gu, '');
  t = t.replace(/[\u{2600}-\u{27BF}]/gu, '');
  t = t.replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
  t = t.replace(/[\u{1F600}-\u{1F64F}]/gu, '');
  t = t.replace(/[❤♥✔✓★☆♡♥]/gu, ''); // hearts/stars/checks
  // Email thread subject prefixes: "Re: [subject]" or "Fwd: [subject]"
  // Strip the whole prefix up to where the actual message starts
  t = t.replace(/^(?:Re|Fwd|FW|RE|FWD):\s*[^\n.!?]{0,120}?(?=\s+(?:Hi|Hello|Hey|Good\s+(?:morning|afternoon|evening)|I\s|My\s|It\s|This\s|The\s|Please|Can\s|I've|I'm|I'd|I'll))/gi, '');
  // Any remaining Re:/Fwd: prefix at start
  t = t.replace(/^(?:Re|Fwd|FW|RE|FWD):\s*/gi, '');
  // Bare subject line (no Re:) directly before a greeting — e.g. "Email &phone number update Hello..."
  // or "Can't pay my bill Hello..." — any short content (≤65 chars) that does NOT start with "I "/"I'"
  // and precedes a greeting word. Guards against stripping actual first-person opening sentences.
  t = t.replace(/^(?![Ii]\s|[Ii]')[^.!?\n]{5,65}\s+(?=(?:Hi|Hello|Hey|Good\s+(?:morning|afternoon|evening))\b)/i, '');
  // Clean up empty parentheses/brackets left after PII removal
  t = t.replace(/[\(\[]\s*[\/|•\s]*\s*[\)\]]/g, '');
  // Email footer / signature patterns (company addresses, taglines, etc.)
  t = t.replace(/\b[A-Z][a-z]+(?: [A-Z][a-z]+)?,\s+[A-Z]{2}\b[^.!?]*/g, ''); // City, State
  t = t.replace(/\b(?:committed to (?:providing|delivering|offering)|caring counts)\b[^.!?]*/gi, '');
  t = t.replace(/\[Image\][^.!?]*/gi, '');
  t = t.replace(/[®™©]\s*[^.!?]{0,60}/g, ''); // Trademark symbols + following text
  // Phone numbers (digit format)
  t = t.replace(/\(?\b\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4}\b/g, '');
  // SSN patterns
  t = t.replace(/\b\d{3}[\s\-]?\d{2}[\s\-]?\d{4}\b/g, '');
  // Email addresses — full (user@domain.tld) and partial without TLD (user@gmail, user@yahoo, etc.)
  t = t.replace(/\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b/g, '');
  t = t.replace(/\b[A-Za-z0-9._%+\-]{3,}@(?:gmail|yahoo|hotmail|outlook|icloud|aol|comcast|att|verizon|msn)\b/gi, '');
  // Anything in parentheses or brackets that contains an @ sign (partial email in parens)
  t = t.replace(/[\(\[]\s*[^\)\]]*@[^\)\]]*[\)\]]/g, '');
  // "My name is X Y"
  t = t.replace(/\bmy name(?:\s+is)?\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]+)?/gi, '');
  // "I'm X Y" / "I am X Y" name introductions
  t = t.replace(/\b(?:Hi|Hello|Hey),?\s+I(?:'m| am)\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]+)?[,.\s]/gi, '');
  // "Subject: FirstName LastName" in email subjects
  t = t.replace(/^Subject:\s*[A-Z][a-z]+(?:\s+[A-Z][a-z]+)?\s*$/im, '');
  t = t.replace(/^Subject:\s*[A-Z][a-z]+\s+[A-Z][a-z]+\s+/im, 'Subject: ');
  // Name signatures at END of message — "-- Firstname Lastname", "- Firstname Lastname", "Firstname Lastname" alone
  // Covers: email sign-offs, SMS sign-offs, voice transcript names
  t = t.replace(/\s*[-–—]{1,2}\s*[A-Z][a-z]{1,20}(?:\s+[A-Z][a-z]{1,20}){1,2}\s*$/g, '');
  t = t.replace(/(?<=\.\s{0,3}|\?\s{0,3}|!\s{0,3}|thank\s+you\.?\s*)[A-Z][a-z]{1,20}(?:\s+[A-Z][a-z]{1,20}){1,2}\s*$/gi, '');
  // #: or ORDER#: artifacts at start of quote
  t = t.replace(/^[#\s]*:\s*/g, '');
  // Unicode escape sequences appearing as literal text: |u200b, ​, ’, etc.
  t = t.replace(/[|\\]u[0-9a-fA-F]{4}/g, '');
  // Actual zero-width and invisible Unicode characters
  t = t.replace(/[​‌‍‎‏­⁠﻿]/g, '');
  // (Emoji already stripped at top of function)
  // DOB / date of birth
  t = t.replace(/\b(?:date of birth|dob|born(?:\s+on)?)[,:\s]+[^.!?;]{0,60}/gi, '');
  // Spoken number sequences (voice transcripts — 7+ digit words)
  t = t.replace(/\b(?:zero|one|two|three|four|five|six|seven|eight|nine)(?:\s+(?:zero|one|two|three|four|five|six|seven|eight|nine)){6,}\b/gi, '');
  // Social/SSN in voice transcripts
  t = t.replace(/\b(?:social(?:\s+security)?|my\s+social|last\s+four)[,:\s]+[^.!?;]{0,30}/gi, '');
  // Perpay order numbers
  t = t.replace(/\b[Pp]0\d{7,}\b/g, '');
  t = t.replace(/\bOrder\s+#?\s*[A-Z]?\d{6,}\b/gi, '');
  // UUIDs
  t = t.replace(/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/gi, '');
  // Addresses
  t = t.replace(/\b\d{1,5}\s+[A-Za-z][a-zA-Z\s]{2,30}(?:Street|St|Avenue|Ave|Road|Rd|Drive|Dr|Blvd|Boulevard|Lane|Ln|Court|Ct|Circle|Way|Place|Pl)\.?\b[^.!?]*/gi, '');
  // ZIP codes
  t = t.replace(/\b\d{5}(?:-\d{4})?\b/g, '');
  // "Sent from" device/email client signatures
  t = t.replace(/\bSent from\s+(?:my\s+)?[^\n.]{0,40}(?:\n|\.|\s*$)/gi, '');
  t = t.replace(/\b(?:Yahoo Mail|Gmail|Outlook)[:\s—]+[^\n.]{0,40}/gi, '');
  // Perpay repayment/order detail format "Repayment • $X.XX • Date • (Product)"
  t = t.replace(/(?:Repayment|Awaiting Payment|Payment)\s*[•\-]\s*\$[\d.,]+\s*[•\-][^.!?\n]*/gi, '');
  // "Uploaded file: URL"
  t = t.replace(/Uploaded file:\s*https?:\/\/\S+/gi, '');
  // Raw URLs
  t = t.replace(/https?:\/\/[^\s"')]+/gi, '');
  // Long hex/token strings
  t = t.replace(/[a-f0-9]{20,}/gi, '');
  // Clean up
  // Final pass: clean up empty parentheses/brackets left after PII removal, dangling punctuation
  t = t.replace(/[\(\[]\s*[\)\]]/g, '');          // () or []
  t = t.replace(/[\(\[]\s*[\/|•\-,\s]+\s*[\)\]]/g, ''); // (/) (|) (•) etc.
  t = t.replace(/\s{2,}/g, ' ');
  t = t.replace(/\s+([\/|•,])/g, '$1');           // spaces before punctuation
  t = t.replace(/\s+/g, ' ').replace(/^\s*[,;.•·\-\/|]\s*/, '').trim();
  return t;
}

// ─── Customer text extractor ─ returns single concatenated string for pattern-matching ───
function extractUserText(raw) {
  if (!raw || typeof raw !== "string") return "";
  if (/['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/i.test(raw) || /['"]text['"]\s*:\s*['"]/.test(raw)) {
    const userTexts = [];
    const re1 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'/gi;
    const re2 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"/gi;
    const re3 = /['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    const re4 = /['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    let m;
    [re1, re2, re3, re4].forEach(re => { while ((m = re.exec(raw)) !== null) userTexts.push(m[1]); });
    if (userTexts.length > 0) {
      return userTexts.map(t => t.replace(/\\n/g, " ").replace(/\\r/g, " ").replace(/\\t/g, " ").replace(/\\'/g, "'").replace(/\\"/g, '"').replace(/\\\\/g, "\\").replace(/\s+/g, " ").trim()).filter(t => t.length > 5).join(" ");
    }
  }
  return raw.replace(/\\n/g, " ").replace(/\s+/g, " ").trim();
}

// ─── Extract individual customer turns (for quotes) ─ returns array of cleaned strings ───
function extractUserTurns(raw) {
  if (!raw || typeof raw !== "string") return [];
  const decode = t => t.replace(/\\n/g, " ").replace(/\\r/g, "").replace(/\\t/g, " ")
                       .replace(/\\'/g, "'").replace(/\\"/g, '"').replace(/\\\\/g, "\\")
                       .replace(/\s+/g, " ").trim();
  if (/['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/i.test(raw) || /['"]text['"]\s*:\s*['"]/.test(raw)) {
    const turns = [];
    const re1 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'/gi;
    const re2 = /['"]role['"]\s*:\s*['"](?:USER|user|customer)['"][^}]{0,600}?['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"/gi;
    const re3 = /['"]text['"]\s*:\s*'((?:[^'\\]|\\.)*)'[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    const re4 = /['"]text['"]\s*:\s*"((?:[^"\\]|\\.)*)"[^}]{0,600}?['"]role['"]\s*:\s*['"](?:USER|user|customer)['"]/gi;
    let m;
    [re1, re2, re3, re4].forEach(re => { while ((m = re.exec(raw)) !== null) turns.push(decode(m[1])); });
    if (turns.length > 0) return turns.filter(t => t.length > 8);
  }
  // Fallback: entire raw field as one turn
  return [decode(raw)].filter(t => t.length > 8);
}

// ─── Strict PII detector — returns true if text still contains identifiable PII ───
function containsPII(text) {
  if (/\(?\b\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4}\b/.test(text)) return true;   // phone
  if (/\b\d{3}[\s\-]?\d{2}[\s\-]?\d{4}\b/.test(text)) return true;             // SSN
  if (/\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9\-]{4,}(?:\.[A-Za-z]{2,})?\b/.test(text)) return true; // email (domain ≥4 chars, TLD optional)
  if (/\b[Pp]0\d{7,}\b/.test(text)) return true;                                // Perpay order #
  if (/\bOrder\s+#?\s*[A-Z]?\d{6,}\b/i.test(text)) return true;                // generic order #
  if (/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}/i.test(text)) return true; // UUID
  if (/\b\d{9,}\b/.test(text)) return true;                                     // any 9+ digit number
  if (/\bmy name(?:\s+is)?\s+[A-Z][a-z]/i.test(text)) return true;             // name introduction
  if (/\b(?:Hi|Hello),?\s+I(?:'m| am)\s+[A-Z][a-z]/i.test(text)) return true; // "Hi I'm Name"
  return false;
}

function isCustomerSentence(s) {
  if (/\b(?:I'?m|I am)\s+(?:Franklin|the AI|an AI|a virtual|your virtual|your AI)\b/i.test(s)) return false;
  if (/\bAI assistant\b/i.test(s)) return false;
  if (/\b(?:I'?d recommend|I recommend|I suggest|Let me help|Let me look|Let me check|I understand your|I apologize|I'?m sorry to hear)\b/i.test(s)) return false;
  if (/\b(?:Thank you for (?:contacting|reaching|calling|your patience)|Is there anything else|Can I help you with anything)\b/i.test(s)) return false;
  if (/\b(?:Please let me know|Don'?t hesitate|Feel free to|Have a (?:great|good|wonderful|nice) day|Glad I could|Happy to assist)\b/i.test(s)) return false;
  if (/\b(?:transferred to|escalated to|assigned to|routing to|representative will|team will)\b/i.test(s)) return false;
  if (/^(?:Hi|Hello|Hey|Good (?:morning|afternoon|evening)|Thanks|Thank you|Ok|Okay|Sure|Yes|No|Alright)\s*[.!,]?\s*$/i.test(s)) return false;
  if (s.length < 15 && /^(?:ok|yes|no|sure|thanks|thank you|got it|alright|okay|fine|yep|nope|right)\b/i.test(s)) return false;
  // Email footers / signatures / company boilerplate
  if (/\bwww\.[a-z0-9\-]+\.[a-z]{2,}\b/i.test(s)) return false; // contains a website URL
  if (/\b[A-Z][a-z]+(?: [A-Z][a-z]+)?,\s+[A-Z]{2}\b/.test(s)) return false; // City, ST pattern
  if (/\bcommitted to (?:providing|delivering|offering)\b/i.test(s)) return false;
  if (/\bcaring counts\b/i.test(s)) return false;
  if (/\[Image\]/i.test(s)) return false; // image placeholder from email client
  if (/[®™©]/.test(s)) return false; // trademark symbols → likely company content
  if (/\b(?:BOX\s+\d+|P\.?O\.?\s*Box)\b/i.test(s)) return false; // PO Box address lines
  if (/\bEmail:\s*\[/i.test(s)) return false; // "Email: [Image]" signature block
  return true;
}

// ─── Quote cleaner (uses stripPII) ───
function cleanQuote(q) {
  // First strip all PII
  let cleaned = stripPII(q);
  // Additional noise removal
  cleaned = cleaned
    .replace(/^Subject:\s*/i, '')
    .replace(/\b(?:Yes|Ok|Okay|Sure|Thanks|Thank you)\s+Sent from\b[^.!?]*/gi, '')
    .replace(/\bSent from\s+\w+\s+Mail(?:\s+for\s+\w+)?\b/gi, '')
    .replace(/['"][a-z_]+['"]\s*:/gi, '')
    .replace(/\s+/g, ' ')
    .replace(/^[,;.\s]+/, '')
    .replace(/[,;.\s]+$/, '')
    .trim();
  return cleaned;
}

// ─── Detect positive experience highlight ───
function detectPositiveHighlight(rows, headerMap) {
  const msgField = headerMap.message;
  if (!msgField) return null;
  let bestQuote = null;
  let bestScore = 0;
  rows.forEach(row => {
    const raw = row[msgField] || '';
    const userText = extractUserText(raw);
    if (!userText || userText.length < 10) return;
    if (!POSITIVE_PATTERNS.some(p => p.test(userText))) return;
    const sentences = userText.split(/(?<=[.!?])\s+|(?:\.\s)|(?:\?\s)|(?:!\s)/).map(s => s.trim()).filter(s => s.length > 15 && s.length < 300);
    for (const sentence of sentences) {
      if (!POSITIVE_PATTERNS.some(p => p.test(sentence))) continue;
      // Reject email footers / company boilerplate — these are never customer quotes
      if (!isCustomerSentence(sentence)) continue;
      // Must sound like a genuine first-person customer voice
      if (!/\b(?:I|my|me|we|our)\b/i.test(sentence)) continue;
      let score = 0;
      if (/\b(?:love|loved|amazing|wonderful|fantastic|excellent|outstanding)\b/i.test(sentence)) score += 8;
      if (/\bREALLY\s+APPRECIATE\b/i.test(sentence)) score += 12;
      if (/\b(?:helped|changed|transformed|improved|saved)\s+(?:my|me)\b/i.test(sentence)) score += 9;
      if (/\bcredit\s+(?:score|report|building)\b/i.test(sentence)) score += 6;
      if (/\b(?:so\s+happy|very\s+happy|so\s+grateful|very\s+grateful)\b/i.test(sentence)) score += 7;
      if (/[!]{2,}/.test(sentence)) score += 3;
      const len = sentence.length;
      if (len >= 30 && len <= 180) score += 4;
      if (/^(?:thank you|thanks)\s*[.!]?\s*$/i.test(sentence)) score -= 12;
      if (sentence.split(' ').length < 5) score -= 6;
      if (score > bestScore) {
        const stripped = stripPII(sentence);
        if (stripped.length > 15) { bestScore = score; bestQuote = stripped; }
      }
    }
  });
  return bestQuote ? { quote: bestQuote } : null;
}

// ─── Analysis Engine ───
function analyzeConversations(rows, headerMap) {
  const msgField = headerMap.message;
  const idField = headerMap.id;
  const dateField = headerMap.date;
  if (!msgField) return { error: "Could not find a message/conversation column. Please ensure your CSV has a column named 'message', 'conversation', 'text', 'content', 'body', or 'transcript'." };
  const themeMap = {};
  let totalRelevant = 0;
  rows.forEach((row, idx) => {
    const raw = row[msgField] || "";
    const userText = extractUserText(raw);
    if (!userText || userText.length < 15) return;
    const id = idField ? row[idField] : `conv-${idx + 1}`;
    const date = dateField ? row[dateField] : null;
    const sentences = userText.split(/(?<=[.!?])\s+|(?:\.\s)|(?:\?\s)|(?:!\s)/).map(s => s.trim()).filter(s => s.length > 10 && s.length < 400 && /[a-zA-Z]/.test(s) && isCustomerSentence(s));
    const mentionsCard = /\b(?:credit\s+card|perpay\s+card|my\s+card|the\s+card|card\s+(?:was|got|keeps?|didn|won|isn))\b/i.test(userText);
    const mentionsMarketplace = /\b(?:marketplace|my\s+order|item|shipping|tracking|delivery|checkout|cart)\b/i.test(userText);
    const mentionsPerpayPlus = /\b(?:perpay\s*\+|perpay\s+plus|subscription|membership|credit\s+(?:building|report|bureau|score)|experian|transunion|equifax)\b/i.test(userText);
    const mentionsCore = /\b(?:direct\s+deposit|autopay|auto\s*pay|paycheck|payroll|deduction|log\s*in|password|verify\s+(?:my\s+)?(?:identity|account))\b/i.test(userText);
    let matched = false;
    for (const issue of ISSUE_CATALOG) {
      const isMatch = issue.patterns.some(p => p.test(userText));
      if (!isMatch) continue;
      const issueProduct = issue.product;
      let productMismatch = false;
      if (issueProduct === "Marketplace" && !mentionsMarketplace && (mentionsCard || mentionsPerpayPlus)) productMismatch = true;
      if (issueProduct === "Card" && !mentionsCard && mentionsMarketplace) productMismatch = true;
      if (issueProduct === "Perpay+" && !mentionsPerpayPlus && (mentionsCard || mentionsMarketplace)) productMismatch = true;
      if (issueProduct === "Core" && !mentionsCore && (mentionsCard || mentionsMarketplace || mentionsPerpayPlus)) productMismatch = true;
      if (productMismatch) continue;
      matched = true;
      if (!themeMap[issue.id]) {
        themeMap[issue.id] = { ...issue, conversations: [], quotes: new Set() };
      }
      themeMap[issue.id].conversations.push({ id, date, text: userText, excerpt: userText.slice(0, 280) });

      // ── Quote selection: use whole customer turns, not sentence fragments ──
      // Strip PII from each turn FIRST, then check pattern match.
      const turns = extractUserTurns(raw);
      turns.forEach(rawTurn => {
        // Step 1: strip PII from the raw turn before any other processing
        const cleanedTurn = stripPII(rawTurn);
        if (!cleanedTurn || cleanedTurn.length < 20) return;
        // Step 2: hard-reject if PII survived stripping
        if (containsPII(cleanedTurn)) return;
        // Step 3: must be actual customer speech
        if (!isCustomerSentence(cleanedTurn)) return;
        // Step 4: must have first-person voice
        if (!/\b(I|my|me|I'm|I've|I'd|I'll|we|our)\b/i.test(cleanedTurn)) return;
        // Step 5: must be substantive (≥7 words)
        if (cleanedTurn.split(/\s+/).length < 7) return;

        // Step 6: does this turn (or any sentence within it) match the issue?
        if (issue.patterns.some(p => p.test(cleanedTurn))) {
          // Turn is short enough to use whole (≤320 chars) — ideal, cleanest quote
          if (cleanedTurn.length <= 320) {
            const q = cleanQuote(cleanedTurn);
            if (q.length > 25 && !containsPII(q)) themeMap[issue.id].quotes.add(q);
          } else {
            // Turn is long (e.g. email body) — extract the most relevant sentence from it
            const sents = cleanedTurn.split(/(?<=[.!?])\s+/).map(s => s.trim()).filter(s => s.length > 20 && s.length < 320);
            for (const s of sents) {
              if (!issue.patterns.some(p => p.test(s))) continue;
              if (!/\b(I|my|me|I'm|I've|I'd|I'll)\b/i.test(s)) continue;
              if (s.split(/\s+/).length < 7) continue;
              if (containsPII(s)) continue;
              if (!isCustomerSentence(s)) continue;
              const q = cleanQuote(s);
              if (q.length > 25 && !containsPII(q)) themeMap[issue.id].quotes.add(q);
            }
          }
        }
      });
    }
    if (matched) totalRelevant++;
  });

  const freqScore = { High: 3, Medium: 2, Low: 1 };
  const themes = Object.values(themeMap).map(t => {
    const count = t.conversations.length;
    const frequency = count >= 8 ? "High" : count >= 3 ? "Medium" : "Low";
    const rankedQuotes = Array.from(t.quotes).filter(q => isCustomerSentence(q) && !containsPII(q)).map(q => {
      let score = 0;
      const len = q.length;
      // Hard reject — these should never reach here, but catch any stragglers
      if (/Repayment\s*[•]/.test(q)) score -= 20;
      // Hard reject: pure command with no context
      if (/^(?:please\s+)?(?:cancel|refund|return|fix|stop|help)\s*[.!]?\s*$/i.test(q)) score -= 25;
      if (/^(?:Yes|No|Ok|Sure|Thanks)[,.\s]*$/i.test(q)) score -= 25;
      // Simple "I want to X" with no complaint substance
      if (/^I\s+(?:want|need|would\s+like)\s+to\s+\w+/i.test(q) && len < 60 && !/\b(but|because|since|however|still|yet|already|keep|can'?t|won'?t|won't|doesn'?t|didn'?t|not\s+working|not\s+letting|not\s+giving)\b/i.test(q)) score -= 18;
      // Ideal length
      if (len >= 40 && len <= 200) score += 6;
      else if (len >= 25 && len <= 280) score += 3;
      else if (len < 25) score -= 4;
      // First-person
      if (/\b(I|my|me|I'?m|I'?ve|I'?d|I'?ll)\b/.test(q)) score += 4;
      // High value: frustration signals
      if (/\b(frustrated|ridiculous|unacceptable|terrible|horrible|awful|scam|rip\s*off|waste\s+of|useless|makes?\s+no\s+sense)\b/i.test(q)) score += 10;
      if (/\b(angry|furious|upset|disappointed|annoyed|fed\s+up|tired\s+of|done\s+with|had\s+enough|worst\s+experience)\b/i.test(q)) score += 8;
      // Broken process
      if (/\b(can'?t\s+believe|don'?t\s+understand|no\s+one\s+(?:can|will|helps?)|been\s+trying|keeps?\s+happening|every\s+time|still\s+(?:not|no|haven'?t|waiting)|nobody\s+(?:can|will|helps?))\b/i.test(q)) score += 7;
      if (/\b(no\s+(?:explanation|reason|answer|response|update|help)|without\s+(?:explanation|reason|warning|notice)|never\s+(?:told|informed|notified|explained))\b/i.test(q)) score += 7;
      // Retention risk
      if (/\b(cancel(?:ling)?\s+(?:my|the)|clos(?:e|ing)\s+(?:my|the)\s+account|switch(?:ing)?\s+to|leav(?:e|ing)\s+perpay|never\s+(?:again|using|ordering))\b/i.test(q)) score += 9;
      if (/\b(report(?:ing)?\s+(?:to|with)\s+(?:BBB|CFPB|attorney\s+general|better\s+business)|file?\s+(?:a\s+)?complaint|legal\s+action)\b/i.test(q)) score += 10;
      // Specific product/process problems
      if (/\b(won'?t\s+(?:let|allow)\s+me|denied\s+(?:with\s+)?no\s+(?:reason|explanation)|blocked\s+(?:from|without)|locked\s+(?:out|me\s+out))\b/i.test(q)) score += 6;
      if (/\b(still\s+(?:being\s+)?charged?|double\s+charged?|overcharged?|wrong\s+amount|not\s+(?:showing|reporting|reflecting|updating|posting|working))\b/i.test(q)) score += 6;
      // Financial harm
      if (/\b(overdraft|nsf|late\s+fee|can'?t\s+pay|need\s+(?:my|that|the)\s+money|paycheck\s+to\s+paycheck)\b/i.test(q)) score += 8;
      // Penalize metadata/noise
      if (/['"][a-z_]+['"]\s*:/i.test(q)) score -= 20;
      if (/^(?:hi|hello|hey|thanks|thank you|ok|okay|yes|no|sure|got it)\b/i.test(q) && len < 35) score -= 15;
      return { q, score };
    }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 3).map(x => x.q);
    return { ...t, quotes: rankedQuotes, count, frequency };
  });
  themes.sort((a, b) => (b.severity * freqScore[b.frequency] * b.count) - (a.severity * freqScore[a.frequency] * a.count));
  const top5 = themes.slice(0, 5);
  const byProduct = {};
  PRODUCT_ORDER.forEach(p => byProduct[p] = []);
  themes.forEach(t => { if (byProduct[t.product]) byProduct[t.product].push(t); });
  const positiveHighlight = detectPositiveHighlight(rows, headerMap);
  return {
    total: rows.length, relevant: totalRelevant, filtered: rows.length - totalRelevant,
    themes, byProduct, top5, positiveHighlight,
    analysisDate: new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
  };
}

// ─── Clean quotes in loaded archive (applies PII stripping retroactively) ───
function cleanArchiveQuotes(archives) {
  const cleanTheme = (t) => ({
    ...t,
    quotes: (t.quotes || []).map(q => { const c = cleanQuote(q); return c.length > 20 ? c : null; }).filter(Boolean).slice(0, 3)
  });
  return archives.map(archive => {
    const cleanByProduct = {};
    Object.keys(archive.analysis.byProduct || {}).forEach(p => {
      cleanByProduct[p] = (archive.analysis.byProduct[p] || []).map(cleanTheme);
    });
    return {
      ...archive,
      analysis: {
        ...archive.analysis,
        themes: (archive.analysis.themes || []).map(cleanTheme),
        byProduct: cleanByProduct,
        top5: (archive.analysis.top5 || []).map(cleanTheme),
      }
    };
  });
}

// ─── Upload Tab ───
function UploadTab({ onAnalyze, isAnalyzing }) {
  const fileRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState(null);
  const [error, setError] = useState(null);
  const [weekLabel, setWeekLabel] = useState(() => {
    const d = new Date();
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    return `Week of ${weekStart.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
  });
  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a CSV file."); return; }
    setFileName(file.name);
    setError(null);
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (results) => {
        if (results.errors.length > 0 && results.data.length === 0) { setError("Failed to parse CSV."); return; }
        const headers = results.meta.fields || [];
        const headerMap = {};
        headers.forEach(h => {
          const lower = h.toLowerCase().replace(/[^a-z0-9]/g, "_");
          if (["message","conversation","text","content","body","transcript","messages","conversation_text"].includes(lower)) headerMap.message = h;
          if (["id","conversation_id","ticket_id","case_id","case_number"].includes(lower)) headerMap.id = h;
          if (["date","created_at","timestamp","created","date_created","created_date"].includes(lower)) headerMap.date = h;
        });
        onAnalyze(results.data, headerMap, weekLabel, file.name);
      },
      error: () => setError("Failed to read file. Please try again.")
    });
  }, [onAnalyze, weekLabel]);
  const handleDrop = useCallback((e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }, [handleFile]);
  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#111827", margin: 0 }}>Upload Conversations</h2>
        <p style={{ color: "#6B7280", fontSize: 14, marginTop: 8 }}>Upload your Decagon AI support conversation CSV to generate product-specific insights.</p>
      </div>
      <div style={{ marginBottom: 20 }}>
        <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 6 }}>Week Label</label>
        <input type="text" value={weekLabel} onChange={(e) => setWeekLabel(e.target.value)} style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 14, color: "#111827", boxSizing: "border-box", outline: "none" }} />
      </div>
      <div onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={handleDrop} onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragOver ? "#6366F1" : "#D1D5DB"}`, borderRadius: 12, padding: "48px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? "#EEF2FF" : "#FAFAFA" }}>
        <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files[0])} />
        <div style={{ fontSize: 40, marginBottom: 12 }}>{fileName ? "✅" : "📁"}</div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "#374151" }}>{fileName || "Drop your CSV here or click to browse"}</div>
        <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 6 }}>Supports .csv exported from Decagon</div>
      </div>
      {error && <div style={{ marginTop: 16, padding: "12px 16px", background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 8, color: "#DC2626", fontSize: 13 }}>{error}</div>}
      {isAnalyzing && (
        <div style={{ marginTop: 24, textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 24, height: 24, border: "3px solid #E5E7EB", borderTop: "3px solid #6366F1", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ marginTop: 8, fontSize: 14, color: "#6366F1", fontWeight: 500 }}>Analyzing conversations...</div>
        </div>
      )}
      <div style={{ marginTop: 32, padding: "20px 24px", background: "#F9FAFB", borderRadius: 10, border: "1px solid #E5E7EB" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 8 }}>How it works</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.6 }}>Each conversation is matched against a catalog of specific product issues. Quotes shown under a theme come only from sentences that directly match that issue's patterns — with all personal information automatically removed before display.</div>
      </div>
    </div>
  );
}

// ─── Insights Tab ───
function InsightsTab({ analysis, onSaveToArchive }) {
  const [filter, setFilter] = useState("All");
  const [saved, setSaved] = useState(false);
  if (!analysis) {
    return (
      <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>{"📊"}</div>
        <div style={{ fontSize: 16, fontWeight: 500 }}>No analysis yet</div>
        <div style={{ fontSize: 14, marginTop: 4 }}>Upload a CSV in the Upload tab.</div>
      </div>

  const handleSave = () => { onSaveToArchive(); setSaved(true); setTimeout(() => setSaved(false), 3000); };

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Product Insights Report</h2>

        </div>
        <button onClick={handleSave} style={{ background: saved ? "#10B981" : "#6366F1", color: "#fff", border: "none", borderRadius: 8, padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          {saved ? "✓ Saved to Archive" : "Save to Archive"}

          <h3 style={{ margin: "0 0 14px", fontSize: 16, fontWeight: 800, color: "#991B1B" }}>{"🚨"} Top 5 Most Critical Insights</h3>
          {analysis.top5.map((theme, i) => <ThemeCard key={theme.id} theme={theme} rank={i + 1} totalConvs={analysis.total} />)}
        </div>
      )}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {filters.map(p => {
          const count = p === "All" ? analysis.themes.length : (analysis.byProduct[p]?.length || 0);
          return (
            <button key={p} onClick={() => setFilter(p)} style={{ padding: "6px 14px", borderRadius: 20, border: filter === p ? "none" : "1px solid #D1D5DB", background: filter === p ? (productColors[p]?.badge || "#6366F1") : "#fff", color: filter === p ? "#fff" : "#374151", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
              {p} ({count})

      {PRODUCT_ORDER.filter(p => filter === "All" || filter === p).map(p => (
        <ProductSection key={p} product={p} themes={analysis.byProduct[p] || []} totalConvs={analysis.total} />
      ))}
    </div>
  );
}

// ─── Archive Tab ───
function ArchiveTab({ archives, onDelete, onClearAll, onExportSite }) {
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [selectedWeekTab, setSelectedWeekTab] = useState({});
  const [confirmClear, setConfirmClear] = useState(false);

  const downloadReport = (archive) => {
    const esc = (s) => String(s == null ? "" : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const total = archive.analysis.total || 1;
    const themeCardHTML = (t, rank) => {
      const c = productColors[t.product] || productColors["Core"];
      const pct = ((t.count / total) * 100).toFixed(1);
      const quotesHTML = (t.quotes || []).map(q => `<div style="background:#F9FAFB;border-left:3px solid ${c.border};padding:10px 14px;margin:8px 0;border-radius:4px;font-style:italic;color:#374151;font-size:13px;">&ldquo;${esc(q)}&rdquo;</div>`).join("");
      return `<div style="background:#fff;border:1px solid #E5E7EB;border-left:4px solid ${c.border};border-radius:10px;padding:20px 24px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <div><span style="background:${c.badge};color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;">${esc(t.product)}</span>${rank?`<span style="background:#DC2626;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;margin-left:4px;">#${rank} CRITICAL</span>`:""}<div style="font-size:17px;font-weight:700;color:#111827;margin-top:8px;">${esc(t.theme)}</div></div>
          <div style="text-align:right;"><div style="font-size:13px;font-weight:700;">${t.count} convos · ${pct}%</div></div>
        </div>
        ${t.summary?`<div style="font-size:13px;color:#374151;margin-bottom:12px;">${esc(t.summary)}</div>`:""}
        ${quotesHTML?`<div style="margin-bottom:12px;">${quotesHTML}</div>`:""}
        <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;"><div style="font-size:10px;font-weight:700;color:#1E40AF;margin-bottom:3px;">RECOMMENDATION</div><div style="font-size:13px;color:#1E3A5F;">${esc(t.recommendation)}</div></div>
      </div>`;
    };
    const positiveHTML = archive.positiveHighlight ? `<div style="background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border:1px solid #6EE7B7;border-radius:12px;padding:20px 24px;margin-bottom:24px;"><div style="font-size:11px;font-weight:700;color:#065F46;text-transform:uppercase;margin-bottom:8px;">💚 Customer Love</div><div style="font-size:15px;font-style:italic;color:#1F2937;">&ldquo;${esc(archive.positiveHighlight.quote)}&rdquo;</div></div>` : "";
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Perpay Insights — ${esc(archive.weekLabel)}</title></head><body style="margin:0;font-family:-apple-system,sans-serif;background:#F9FAFB;"><div style="max-width:960px;margin:0 auto;padding:32px 24px;"><header style="background:linear-gradient(135deg,#6366F1,#4338CA);color:#fff;border-radius:14px;padding:28px 32px;margin-bottom:28px;"><div style="font-size:12px;opacity:0.85;text-transform:uppercase;letter-spacing:0.1em;">Perpay Product Insights</div><h1 style="margin:6px 0 0;font-size:28px;">${esc(archive.weekLabel)}</h1><div style="margin-top:8px;font-size:13px;opacity:0.9;">Generated ${esc(archive.analysis.analysisDate)}</div><div style="display:flex;gap:24px;margin-top:20px;"><div><div style="font-size:24px;font-weight:700;">${archive.analysis.total}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;">Total conversations</div></div><div><div style="font-size:24px;font-weight:700;">${archive.analysis.themes.length}</div><div style="font-size:11px;opacity:0.85;text-transform:uppercase;">Themes surfaced</div></div></div></header>${positiveHTML}<section><h2>Top 5 Most Critical Insights</h2>${archive.analysis.top5.map((t,i)=>themeCardHTML(t,i+1)).join("")}</section>${PRODUCT_ORDER.map(p=>{const themes=archive.analysis.byProduct[p]||[];if(!themes.length)return"";const clr=productColors[p];return`<section style="margin-top:36px;"><div style="border-bottom:2px solid ${clr.border};margin-bottom:16px;padding-bottom:10px;"><h2 style="margin:0;color:${clr.text};">${esc(p)}</h2></div>${themes.map(t=>themeCardHTML(t)).join("")}</section>`;}).join("")}</div></body></html>`;
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g,"-").toLowerCase()}.html`;
    a.click(); URL.revokeObjectURL(url);
  };

  const downloadCSV = (archive) => {
    const rows = archive.analysis.themes.map(t => ({ "Product": t.product, "Theme": t.theme, "Frequency": t.frequency, "Conversations": t.count, "Quote 1": t.quotes[0]||"", "Quote 2": t.quotes[1]||"", "Recommendation": t.recommendation }));
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g,"-").toLowerCase()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  if (archives.length === 0) {
    return <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}><div style={{ fontSize: 48, marginBottom: 16 }}>{"🗃️"}</div><div style={{ fontSize: 16, fontWeight: 500 }}>Archive is empty</div><div style={{ fontSize: 14, marginTop: 4 }}>Save an analysis from the Insights tab to start the archive.</div></div>;
  }

  const getWeekTab = (idx) => selectedWeekTab[idx] || "top5";
  const renderArchiveInsights = (archive, idx) => {
    const currentTab = getWeekTab(idx);
    const analysis = archive.analysis;
    const tabOptions = [{ id: "top5", label: "Top 5 Critical" }, ...PRODUCT_ORDER.filter(p => (analysis.byProduct[p]||[]).length > 0).map(p => ({ id: p, label: p }))];
    return (
      <div style={{ padding: "16px 20px", borderTop: "1px solid #F3F4F6" }}>
        {archive.positiveHighlight && <PositiveHighlight highlight={archive.positiveHighlight} />}
        <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
          {tabOptions.map(t => (
            <button key={t.id} onClick={(e) => { e.stopPropagation(); setSelectedWeekTab(prev => ({ ...prev, [idx]: t.id })); }}
              style={{ padding: "5px 14px", borderRadius: 16, border: currentTab === t.id ? "none" : "1px solid #D1D5DB", background: currentTab === t.id ? (productColors[t.id]?.badge || "#DC2626") : "#fff", color: currentTab === t.id ? "#fff" : "#374151", fontSize: 12, fontWeight: currentTab === t.id ? 600 : 400, cursor: "pointer" }}>
              {t.label}{t.id === "top5" ? ` (${analysis.top5.length})` : ` (${(analysis.byProduct[t.id]||[]).length})`}
            </button>
          ))}
        </div>
        {currentTab === "top5" && <div style={{ background: "#FEF2F2", borderRadius: 12, padding: "18px 22px", border: "1px solid #FECACA" }}><h3 style={{ margin: "0 0 14px", fontSize: 16, fontWeight: 800, color: "#991B1B" }}>{"🚨"} Top 5 Most Critical Insights</h3>{analysis.top5.map((theme, i) => <ThemeCard key={theme.id} theme={theme} rank={i + 1} totalConvs={analysis.total} />)}</div>}
        {currentTab !== "top5" && <ProductSection product={currentTab} themes={analysis.byProduct[currentTab]||[]} totalConvs={analysis.total} />}
      </div>
    );
  };

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Insights Archive</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{archives.length} saved report{archives.length !== 1 ? "s" : ""}</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <button onClick={onExportSite} style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>⬇️ Export Site for Sharing</button>
          {!confirmClear ? (
            <button onClick={() => setConfirmClear(true)} style={{ background: "#FEF2F2", color: "#DC2626", border: "1px solid #FECACA", borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Clear All Data</button>
          ) : (
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#DC2626", fontWeight: 600 }}>Are you sure?</span>
              <button onClick={() => { onClearAll(); setConfirmClear(false); }} style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Yes, clear all</button>
              <button onClick={() => setConfirmClear(false)} style={{ background: "#fff", color: "#374151", border: "1px solid #D1D5DB", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>Cancel</button>
            </div>
          )}
        </div>
      </div>
      {archives.length >= 2 && (
        <div style={{ background: "#EEF2FF", borderRadius: 12, padding: "18px 22px", marginBottom: 24, border: "1px solid #C7D2FE" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: "#4338CA" }}>Week-over-Week Trend</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
            {archives.slice(0, 4).map((a, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 8, padding: "12px 14px", border: "1px solid #E5E7EB" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#6366F1", marginBottom: 6 }}>{a.weekLabel}</div>
                {PRODUCT_ORDER.map(p => { const count = (a.analysis.byProduct[p]||[]).reduce((s,t) => s+t.count, 0); return <div key={p} style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#374151", marginBottom:2 }}><span>{p}</span><strong>{count}</strong></div>; })}
              </div>
            ))}
          </div>
        </div>
      )}
      {archives.map((archive, idx) => (
        <div key={idx} style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", marginBottom: 10, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", flexWrap: "wrap", gap: 8 }} onClick={() => setExpandedIdx(expandedIdx === idx ? null : idx)}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#111827" }}>{archive.weekLabel}</div>
              <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{archive.fileName} · {archive.analysis.total} conversations · {archive.analysis.themes.length} themes · Saved {archive.savedDate}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={(e) => { e.stopPropagation(); downloadReport(archive); }} style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download Report</button>
              <button onClick={(e) => { e.stopPropagation(); downloadCSV(archive); }} style={{ background: "#10B981", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download CSV</button>
              <button onClick={(e) => { e.stopPropagation(); onDelete(idx); }} style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
          {expandedIdx === idx && renderArchiveInsights(archive, idx)}
        </div>
      ))}
    </div>
  );
}

// ─── Main App ───
function DecagonInsights() {
  const [tab, setTab] = useState("archive");
  const [analysis, setAnalysis] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [archives, setArchives] = useState(function() {
    try {
      if (window.__DECAGON_EMBEDDED_ARCHIVES__ && window.__DECAGON_EMBEDDED_ARCHIVES__.length > 0) {
        return cleanArchiveQuotes(window.__DECAGON_EMBEDDED_ARCHIVES__);
      }
      var saved = localStorage.getItem("decagon-archives");
      return saved ? cleanArchiveQuotes(JSON.parse(saved)) : [];
    } catch (e) { return []; }
  });
  const [currentWeekLabel, setCurrentWeekLabel] = useState("");
  const [currentFileName, setCurrentFileName] = useState("");

  useEffect(function() {
    try { localStorage.setItem("decagon-archives", JSON.stringify(archives)); } catch (e) {}
  }, [archives]);

  const handleAnalyze = useCallback((data, headerMap, weekLabel, fileName) => {
    setIsAnalyzing(true);
    setCurrentWeekLabel(weekLabel);
    setCurrentFileName(fileName);
    setTimeout(() => {
      const result = analyzeConversations(data, headerMap);
      if (result.error) { alert(result.error); setIsAnalyzing(false); return; }
      setAnalysis(result);
      setIsAnalyzing(false);
      setTab("insights");
    }, 600);
  }, []);

  const handleSaveToArchive = useCallback(function() {
    if (!analysis) return;
    var cleanThemes = analysis.themes.map(function(t) {
      return { id: t.id, product: t.product, theme: t.theme, summary: t.summary, whyItMatters: t.whyItMatters, rootCause: t.rootCause, recommendation: t.recommendation, severity: t.severity, quotes: t.quotes || [], count: t.count, frequency: t.frequency,
        conversations: (t.conversations || []).map(function(c) { return { id: c.id, date: c.date, excerpt: c.excerpt }; }) };
    });
    var cleanByProduct = {};
    PRODUCT_ORDER.forEach(function(p) { cleanByProduct[p] = cleanThemes.filter(function(t) { return t.product === p; }); });
    setArchives(function(prev) { return [{ weekLabel: currentWeekLabel, fileName: currentFileName, analysis: { total: analysis.total, relevant: analysis.relevant, filtered: analysis.filtered, analysisDate: analysis.analysisDate, themes: cleanThemes, byProduct: cleanByProduct, top5: cleanThemes.slice(0,5) }, positiveHighlight: analysis.positiveHighlight || null, savedDate: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" }) }].concat(prev); });
  }, [analysis, currentWeekLabel, currentFileName]);

  const handleDeleteArchive = useCallback((idx) => { setArchives(prev => prev.filter((_, i) => i !== idx)); }, []);
  const handleClearAll = useCallback(() => { setArchives([]); try { localStorage.removeItem("decagon-archives"); } catch (e) {} }, []);

  const handleExportSite = useCallback(function() {
    fetch(window.location.href.split('?')[0]).then(function(res) { return res.text(); }).then(function(originalHTML) {
      var embedScript = '<script>window.__DECAGON_EMBEDDED_ARCHIVES__ = ' + JSON.stringify(archives) + ';<\/script>';
      var injected = originalHTML.replace('<div id="root"></div>', '<div id="root"></div>\n' + embedScript);
      var blob = new Blob([injected], { type: "text/html" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a"); a.href = url; a.download = "index.html"; a.click(); URL.revokeObjectURL(url);
    }).catch(function(err) { alert("Export failed: " + err.message); });
  }, [archives]);

  const tabs = [
    { id: "upload", label: "Upload", icon: "📁" },
    { id: "insights", label: "Insights", icon: "📊", badge: analysis ? analysis.themes.length : null },
    { id: "archive", label: "Archive", icon: "🗃️", badge: archives.length > 0 ? archives.length : null }
  ];
  return (
    <div style={{ minHeight: "100vh", background: "#F9FAFB", fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB", padding: "0 24px" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366F1, #8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 700 }}>P</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#111827", lineHeight: 1.2 }}>Decagon Insights</div>
              <div style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1 }}>Perpay Product Intelligence</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: tab === t.id ? "#EEF2FF" : "transparent", color: tab === t.id ? "#6366F1" : "#6B7280", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                <span>{t.icon}</span>{t.label}
                {t.badge && <span style={{ background: tab === t.id ? "#6366F1" : "#D1D5DB", color: "#fff", borderRadius: 10, padding: "0 6px", fontSize: 11, fontWeight: 700, minWidth: 18, textAlign: "center" }}>{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        {tab === "upload" && <UploadTab onAnalyze={handleAnalyze} isAnalyzing={isAnalyzing} />}
        {tab === "insights" && <InsightsTab analysis={analysis} onSaveToArchive={handleSaveToArchive} />}
        {tab === "archive" && <ArchiveTab archives={archives} onDelete={handleDeleteArchive} onClearAll={handleClearAll} onExportSite={handleExportSite} />}
      </div>
    </div>
  );
}
