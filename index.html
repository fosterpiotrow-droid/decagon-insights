// ─── Specific issue catalog ───
// Each issue is a concrete, actionable theme (NOT generic "frustration").
// A conversation matches an issue only if at least one of its patterns is
// present in the message text. Quotes are pulled from sentences that contain
// at least one of the same patterns — guaranteeing quote-to-theme fidelity.

  // ─── MARKETPLACE ───

    id: "mp-approval-denied",
    product: "Marketplace",
    theme: "Order approval denied without clear reason",

    severity: 5
  },
  {
    id: "mp-spending-limit-low",
    product: "Marketplace",
    theme: "Spending limit lower than customer expected",
    patterns: [/\bspending\s+limit\b/i, /\blimit\s+(?:is\s+)?(?:too\s+)?low\b/i, /\bwhy.*\blimit\b/i, /\bonly\s+\$?\d+\s+(?:limit|spend)/i, /\bincrease\s+(?:my\s+)?limit\b/i],

  {
    id: "card-declined",
    product: "Card",
    theme: "Card declined unexpectedly at checkout",
    patterns: [/\bcard\s+(?:was\s+)?declined\b/i, /\bdeclined.*(?:purchase|transaction|checkout)/i, /\bwhy.*declined\b/i, /\bkeeps\s+getting\s+declined\b/i],
    recommendation: "In real-time push notifications on decline, include the specific reason (available credit, merchant category, fraud flag) and a direct in-app action to resolve it.",
    severity: 5
  },
  {
    id: "card-available-credit-wrong",
    product: "Card",
    theme: "Available credit doesn't match customer's expectation",
    patterns: [/\bavailable\s+credit\b/i, /\bcredit.*(?:wrong|less|missing)/i, /\bshould\s+have\s+more.*credit\b/i, /\bpending.*credit\b/i, /\blimit.*doesn'?t\s+match/i],

    patterns: [/\bpayment\s+(?:not|hasn'?t)\s+(?:post|reflect|show)/i, /\bmade\s+(?:a\s+)?payment.*(?:still|not)/i, /\bpayment.*(?:disappeared|missing)/i, /\bautopay.*not/i],

const PRODUCT_ORDER = ["Marketplace", "Core", "Perpay+", "Card"];

const productColors = {
  "Marketplace": { bg: "#ECFDF5", border: "#10B981", text: "#065F46", badge: "#10B981", icon: "\uD83D\uDED2" },
  "Core":        { bg: "#EFF6FF", border: "#3B82F6", text: "#1E40AF", badge: "#3B82F6", icon: "\uD83D\uDCB3" },
  "Perpay+":     { bg: "#EEF2FF", border: "#6366F1", text: "#4338CA", badge: "#6366F1", icon: "\uD83D\uDCC8" },
  "Card":        { bg: "#FFF7ED", border: "#F59E0B", text: "#92400E", badge: "#F59E0B", icon: "\uD83D\uDCB3" }
};

// ─── Analysis Engine ───
function analyzeConversations(rows, headerMap) {
  const msgField = headerMap.message;
  const idField = headerMap.id;
  const dateField = headerMap.date;

  if (!msgField) return { error: "Could not find a message/conversation column. Please ensure your CSV has a column named 'message', 'conversation', 'text', 'content', 'body', or 'transcript'." };

  const themeMap = {};
  let totalRelevant = 0;

  rows.forEach((row, idx) => {
    const text = row[msgField] || "";
    if (!text || text.length < 20) return;

    const id = idField ? row[idField] : `conv-${idx + 1}`;
    const date = dateField ? row[dateField] : null;

    // Split into sentences for targeted quote extraction
    const sentences = text.split(/(?<=[.!?])\s+|\n+/).map(s => s.trim()).filter(s => s.length > 10 && s.length < 300);

    // Test each issue
    let matched = false;
    for (const issue of ISSUE_CATALOG) {
      const isMatch = issue.patterns.some(p => p.test(text));
      if (!isMatch) continue;
      matched = true;

      // Extract quotes: sentences that match the issue's own patterns (guaranteed on-theme)
      const quotes = sentences.filter(s => issue.patterns.some(p => p.test(s))).slice(0, 2);

      if (!themeMap[issue.id]) {
        themeMap[issue.id] = {
          ...issue,
          conversations: [],
          quotes: new Set()
        };
      }
      themeMap[issue.id].conversations.push({ id, date, text, excerpt: text.slice(0, 280) });
      quotes.forEach(q => themeMap[issue.id].quotes.add(q));
    }
    if (matched) totalRelevant++;
  });

  // Convert sets to arrays, compute frequency
  const themes = Object.values(themeMap).map(t => {
    const count = t.conversations.length;
    const frequency = count >= 8 ? "High" : count >= 3 ? "Medium" : "Low";
    return {
      ...t,
      quotes: Array.from(t.quotes).slice(0, 3),
      count,
      frequency
    };
  });

  // Sort within each product by severity × frequency
  const freqScore = { High: 3, Medium: 2, Low: 1 };
  themes.sort((a, b) => (b.severity * freqScore[b.frequency] * b.count) - (a.severity * freqScore[a.frequency] * a.count));

  const top5 = themes.slice(0, 5);

  // Group by product
  const byProduct = {};
  PRODUCT_ORDER.forEach(p => byProduct[p] = []);
  themes.forEach(t => { if (byProduct[t.product]) byProduct[t.product].push(t); });

  return {
    total: rows.length,
    relevant: totalRelevant,
    filtered: rows.length - totalRelevant,
    themes,
    byProduct,
    top5,
    analysisDate: new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
  };
}

// ─── UI components ───
const freqColors = { High: "#DC2626", Medium: "#F59E0B", Low: "#6B7280" };

function Badge({ label, color, bg }) {
  return <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, color, background: bg, whiteSpace: "nowrap" }}>{label}</span>;
}

function ThemeCard({ theme, rank }) {
  const [expanded, setExpanded] = useState(false);
  const c = productColors[theme.product];

  return (
    <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", borderLeft: `4px solid ${c.border}`, marginBottom: 12, padding: "16px 20px", boxShadow: "0 1px 2px rgba(0,0,0,0.04)" }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 250 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
            {rank && <Badge label={`#${rank} CRITICAL`} color="#fff" bg="#DC2626" />}
            <Badge label={theme.frequency} color="#fff" bg={freqColors[theme.frequency]} />
            <span style={{ fontSize: 11, color: "#6B7280", fontWeight: 500 }}>{theme.count} conversation{theme.count !== 1 ? "s" : ""}</span>
          </div>
          <h4 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#111827", lineHeight: 1.35 }}>{theme.theme}</h4>
        </div>
      </div>

      {theme.quotes.length > 0 && (
        <div style={{ marginTop: 10 }}>
          {theme.quotes.map((q, i) => (
            <div key={i} style={{ background: c.bg, borderLeft: `3px solid ${c.border}`, padding: "6px 12px", marginBottom: 4, borderRadius: "0 6px 6px 0", fontSize: 12, color: "#374151", fontStyle: "italic", lineHeight: 1.5 }}>
              "{q}"
            </div>
          ))}
        </div>
      )}

      <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 6, padding: "8px 12px", marginTop: 10 }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: "#166534", marginBottom: 2, textTransform: "uppercase", letterSpacing: 0.5 }}>Recommendation</div>
        <div style={{ fontSize: 12, color: "#15803D", lineHeight: 1.5 }}>{theme.recommendation}</div>
      </div>

      <button onClick={() => setExpanded(!expanded)} style={{ marginTop: 10, background: "none", border: `1px solid ${c.border}44`, borderRadius: 6, padding: "3px 10px", fontSize: 11, color: c.text, cursor: "pointer", fontWeight: 500 }}>
        {expanded ? "Hide" : "View"} {theme.count} source conversation{theme.count !== 1 ? "s" : ""}
      </button>

      {expanded && (
        <div style={{ marginTop: 10, maxHeight: 280, overflowY: "auto", border: "1px solid #E5E7EB", borderRadius: 6 }}>
          {theme.conversations.map((conv, i) => (
            <div key={i} style={{ padding: "8px 12px", borderBottom: i < theme.conversations.length - 1 ? "1px solid #F3F4F6" : "none", fontSize: 12, color: "#374151", lineHeight: 1.5 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                <span style={{ fontWeight: 600, color: "#111827", fontSize: 11 }}>ID: {conv.id}</span>
                {conv.date && <span style={{ fontSize: 10, color: "#9CA3AF" }}>{conv.date}</span>}
              </div>
              <div>{conv.excerpt}{conv.text.length > 280 ? "..." : ""}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ProductSection({ product, themes }) {
  const c = productColors[product];
  if (themes.length === 0) {
    return (
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, paddingBottom: 8, borderBottom: `2px solid ${c.border}33` }}>
          <span style={{ fontSize: 22 }}>{c.icon}</span>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: c.text }}>{product}</h3>
          <Badge label="0 themes" color="#fff" bg="#9CA3AF" />
        </div>
        <div style={{ fontSize: 12, color: "#9CA3AF", padding: "8px 0" }}>No actionable themes detected in this batch.</div>
      </div>
    );
  }

  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, paddingBottom: 10, borderBottom: `2px solid ${c.border}55` }}>
        <span style={{ fontSize: 22 }}>{c.icon}</span>
        <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: c.text }}>{product}</h3>
        <Badge label={`${themes.length} theme${themes.length !== 1 ? "s" : ""}`} color="#fff" bg={c.badge} />
        <span style={{ fontSize: 12, color: "#6B7280", marginLeft: "auto" }}>
          {themes.reduce((s, t) => s + t.count, 0)} conversations
        </span>
      </div>
      {themes.map((t, i) => <ThemeCard key={t.id} theme={t} />)}
    </div>
  );
}

// ─── Upload Tab ───
function UploadTab({ onAnalyze, isAnalyzing }) {
  const fileRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [fileName, setFileName] = useState(null);
  const [error, setError] = useState(null);
  const [weekLabel, setWeekLabel] = useState(() => {
    const d = new Date();
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    return `Week of ${weekStart.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
  });

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a CSV file."); return; }
    setFileName(file.name);
    setError(null);

    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (results) => {
        if (results.errors.length > 0 && results.data.length === 0) { setError("Failed to parse CSV."); return; }
        const headers = results.meta.fields || [];
        const headerMap = {};
        headers.forEach(h => {
          const lower = h.toLowerCase().replace(/[^a-z0-9]/g, "_");
          if (["message", "conversation", "text", "content", "body", "transcript", "messages", "conversation_text"].includes(lower)) headerMap.message = h;
          if (["id", "conversation_id", "ticket_id", "case_id", "case_number"].includes(lower)) headerMap.id = h;
          if (["date", "created_at", "timestamp", "created", "date_created", "created_date"].includes(lower)) headerMap.date = h;
        });
        onAnalyze(results.data, headerMap, weekLabel, file.name);
      },
      error: () => setError("Failed to read file. Please try again.")
    });
  }, [onAnalyze, weekLabel]);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  }, [handleFile]);

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 20px" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#111827", margin: 0 }}>Upload Conversations</h2>
        <p style={{ color: "#6B7280", fontSize: 14, marginTop: 8 }}>Upload your Decagon AI support conversation CSV to generate product-specific insights.</p>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 6 }}>Week Label</label>
        <input type="text" value={weekLabel} onChange={(e) => setWeekLabel(e.target.value)}
          style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 14, color: "#111827", boxSizing: "border-box", outline: "none" }} />
      </div>

      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
        onClick={() => fileRef.current?.click()}
        style={{ border: `2px dashed ${dragOver ? "#6366F1" : "#D1D5DB"}`, borderRadius: 12, padding: "48px 24px", textAlign: "center", cursor: "pointer", background: dragOver ? "#EEF2FF" : "#FAFAFA", transition: "all 0.2s" }}>
        <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files[0])} />
        <div style={{ fontSize: 40, marginBottom: 12 }}>{fileName ? "\u2705" : "\uD83D\uDCC1"}</div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "#374151" }}>{fileName || "Drop your CSV here or click to browse"}</div>
        <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 6 }}>Supports .csv exported from Decagon</div>
      </div>

      {error && <div style={{ marginTop: 16, padding: "12px 16px", background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 8, color: "#DC2626", fontSize: 13 }}>{error}</div>}

      {isAnalyzing && (
        <div style={{ marginTop: 24, textAlign: "center" }}>
          <div style={{ display: "inline-block", width: 24, height: 24, border: "3px solid #E5E7EB", borderTop: "3px solid #6366F1", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <div style={{ marginTop: 8, fontSize: 14, color: "#6366F1", fontWeight: 500 }}>Analyzing conversations...</div>
        </div>
      )}

      <div style={{ marginTop: 32, padding: "20px 24px", background: "#F9FAFB", borderRadius: 10, border: "1px solid #E5E7EB" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 8 }}>How matching works</div>
        <div style={{ fontSize: 12, color: "#6B7280", lineHeight: 1.6 }}>
          Each conversation is matched against a catalog of specific product issues (e.g., "card declined unexpectedly", "credit score not reporting"). A theme only appears if the conversation contains language evidencing that specific problem. Quotes shown under a theme come from sentences that directly match its patterns.
        </div>
      </div>
    </div>
  );
}

// ─── Insights Tab ───
function InsightsTab({ analysis, onSaveToArchive }) {
  const [filter, setFilter] = useState("All");
  const [saved, setSaved] = useState(false);

  if (!analysis) {
    return (
      <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>{"\uD83D\uDCCA"}</div>
        <div style={{ fontSize: 16, fontWeight: 500 }}>No analysis yet</div>
        <div style={{ fontSize: 14, marginTop: 4 }}>Upload a CSV in the Upload tab.</div>
      </div>
    );
  }

  const handleSave = () => {
    onSaveToArchive();
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const filters = ["All", ...PRODUCT_ORDER];

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Product Insights Report</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{analysis.analysisDate} &middot; {analysis.total} total &middot; {analysis.relevant} actionable &middot; {analysis.themes.length} themes</p>
        </div>
        <button onClick={handleSave} style={{ background: saved ? "#10B981" : "#6366F1", color: "#fff", border: "none", borderRadius: 8, padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          {saved ? "\u2713 Saved to Archive" : "Save to Archive"}
        </button>
      </div>

      {/* Top 5 critical */}
      {analysis.top5.length > 0 && (
        <div style={{ background: "#FEF2F2", borderRadius: 12, padding: "18px 22px", marginBottom: 28, border: "1px solid #FECACA" }}>
          <h3 style={{ margin: "0 0 14px", fontSize: 16, fontWeight: 800, color: "#991B1B" }}>{"\uD83D\uDEA8"} Top 5 Most Critical Insights</h3>
          {analysis.top5.map((theme, i) => <ThemeCard key={theme.id} theme={theme} rank={i + 1} />)}
        </div>
      )}

      {/* Product filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {filters.map(p => {
          const count = p === "All" ? analysis.themes.length : (analysis.byProduct[p]?.length || 0);
          return (
            <button key={p} onClick={() => setFilter(p)}
              style={{ padding: "6px 14px", borderRadius: 20, border: filter === p ? "none" : "1px solid #D1D5DB",
                background: filter === p ? (productColors[p]?.badge || "#6366F1") : "#fff",
                color: filter === p ? "#fff" : "#374151", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
              {p} ({count})
            </button>
          );
        })}
      </div>

      {/* Product-first breakdown */}
      <h3 style={{ fontSize: 16, fontWeight: 700, color: "#111827", marginBottom: 16 }}>Themes by Product</h3>
      {PRODUCT_ORDER.filter(p => filter === "All" || filter === p).map(p => (
        <ProductSection key={p} product={p} themes={analysis.byProduct[p] || []} />
      ))}
    </div>
  );
}

// ─── Archive Tab ───
function ArchiveTab({ archives, onDelete }) {
  const [expandedIdx, setExpandedIdx] = useState(null);

  const downloadReport = (archive) => {
    const lines = [];
    lines.push(`PERPAY PRODUCT INSIGHTS REPORT`);
    lines.push(`${archive.weekLabel}`);
    lines.push(`Generated: ${archive.analysis.analysisDate}`);
    lines.push("=".repeat(60));
    lines.push(`SUMMARY: ${archive.analysis.total} total | ${archive.analysis.relevant} actionable | ${archive.analysis.themes.length} themes`);
    lines.push("");
    lines.push("=".repeat(60));
    lines.push("TOP 5 MOST CRITICAL INSIGHTS");
    lines.push("=".repeat(60));
    archive.analysis.top5.forEach((t, i) => {
      lines.push(`\n#${i + 1} [${t.product}] ${t.theme}`);
      lines.push(`Frequency: ${t.frequency} (${t.count} conversations)`);
      if (t.quotes.length > 0) { lines.push("Quotes:"); t.quotes.forEach(q => lines.push(`  > "${q}"`)); }
      lines.push(`Recommendation: ${t.recommendation}`);
    });

    PRODUCT_ORDER.forEach(product => {
      const themes = archive.analysis.byProduct[product] || [];
      if (themes.length === 0) return;
      lines.push("\n" + "=".repeat(60));
      lines.push(product.toUpperCase());
      lines.push("=".repeat(60));
      themes.forEach((t, i) => {
        lines.push(`\n${i + 1}. ${t.theme}`);
        lines.push(`Frequency: ${t.frequency} (${t.count} conversations)`);
        if (t.quotes.length > 0) { lines.push("Quotes:"); t.quotes.forEach(q => lines.push(`  > "${q}"`)); }
        lines.push(`Recommendation: ${t.recommendation}`);
      });
    });

    const blob = new Blob([lines.join("\n")], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g, "-").toLowerCase()}.txt`;
    a.click(); URL.revokeObjectURL(url);
  };

  const downloadCSV = (archive) => {
    const rows = archive.analysis.themes.map(t => ({
      "Product": t.product, "Theme": t.theme, "Frequency": t.frequency, "Conversations": t.count,
      "Quote 1": t.quotes[0] || "", "Quote 2": t.quotes[1] || "",
      "Recommendation": t.recommendation
    }));
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `perpay-insights-${archive.weekLabel.replace(/\s+/g, "-").toLowerCase()}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  if (archives.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "80px 20px", color: "#9CA3AF" }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>{"\uD83D\uDDC3\uFE0F"}</div>
        <div style={{ fontSize: 16, fontWeight: 500 }}>Archive is empty</div>
        <div style={{ fontSize: 14, marginTop: 4 }}>Save an analysis from the Insights tab to start the archive.</div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 20px" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#111827" }}>Insights Archive</h2>
        <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6B7280" }}>{archives.length} saved report{archives.length !== 1 ? "s" : ""} for week-over-week review</p>
      </div>

      {archives.length >= 2 && (
        <div style={{ background: "#EEF2FF", borderRadius: 12, padding: "18px 22px", marginBottom: 24, border: "1px solid #C7D2FE" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: "#4338CA" }}>Week-over-Week Trend</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
            {archives.slice(0, 4).map((a, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 8, padding: "12px 14px", border: "1px solid #E5E7EB" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#6366F1", marginBottom: 6 }}>{a.weekLabel}</div>
                {PRODUCT_ORDER.map(p => {
                  const count = (a.analysis.byProduct[p] || []).reduce((s, t) => s + t.count, 0);
                  return <div key={p} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#374151", marginBottom: 2 }}><span>{p}</span><strong>{count}</strong></div>;
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      {archives.map((archive, idx) => (
        <div key={idx} style={{ background: "#fff", borderRadius: 10, border: "1px solid #E5E7EB", marginBottom: 10, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", flexWrap: "wrap", gap: 8 }} onClick={() => setExpandedIdx(expandedIdx === idx ? null : idx)}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#111827" }}>{archive.weekLabel}</div>
              <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{archive.fileName} &middot; {archive.analysis.total} conversations &middot; {archive.analysis.themes.length} themes &middot; Saved {archive.savedDate}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={(e) => { e.stopPropagation(); downloadReport(archive); }} style={{ background: "#6366F1", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download Report</button>
              <button onClick={(e) => { e.stopPropagation(); downloadCSV(archive); }} style={{ background: "#10B981", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Download CSV</button>
              <button onClick={(e) => { e.stopPropagation(); onDelete(idx); }} style={{ background: "#EF4444", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
          {expandedIdx === idx && (
            <div style={{ padding: "0 20px 16px", borderTop: "1px solid #F3F4F6" }}>
              <div style={{ marginTop: 12, fontSize: 12, fontWeight: 700, color: "#991B1B", marginBottom: 6 }}>Top 5 Critical</div>
              {archive.analysis.top5.map((t, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid #F3F4F6", fontSize: 12 }}>
                  <Badge label={`#${i + 1}`} color="#fff" bg="#DC2626" />
                  <Badge label={t.product} color="#fff" bg={productColors[t.product].badge} />
                  <span style={{ color: "#374151" }}>{t.theme}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── Main App ───
function DecagonInsights() {
  const [tab, setTab] = useState("upload");
  const [analysis, setAnalysis] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [archives, setArchives] = useState([]);
  const [currentWeekLabel, setCurrentWeekLabel] = useState("");
  const [currentFileName, setCurrentFileName] = useState("");

  const handleAnalyze = useCallback((data, headerMap, weekLabel, fileName) => {
    setIsAnalyzing(true);
    setCurrentWeekLabel(weekLabel);
    setCurrentFileName(fileName);
    setTimeout(() => {
      const result = analyzeConversations(data, headerMap);
      if (result.error) { alert(result.error); setIsAnalyzing(false); return; }
      setAnalysis(result);
      setIsAnalyzing(false);
      setTab("insights");
    }, 600);
  }, []);

  const handleSaveToArchive = useCallback(() => {
    if (!analysis) return;
    setArchives(prev => [{
      weekLabel: currentWeekLabel, fileName: currentFileName, analysis: { ...analysis },
      savedDate: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" })
    }, ...prev]);
  }, [analysis, currentWeekLabel, currentFileName]);

  const handleDeleteArchive = useCallback((idx) => {
    setArchives(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const tabs = [
    { id: "upload", label: "Upload", icon: "\uD83D\uDCC1" },
    { id: "insights", label: "Insights", icon: "\uD83D\uDCCA", badge: analysis ? analysis.themes.length : null },
    { id: "archive", label: "Archive", icon: "\uD83D\uDDC3\uFE0F", badge: archives.length > 0 ? archives.length : null }
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#F9FAFB", fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB", padding: "0 24px" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #6366F1, #8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16, fontWeight: 700 }}>P</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#111827", lineHeight: 1.2 }}>Decagon Insights</div>
              <div style={{ fontSize: 11, color: "#9CA3AF", lineHeight: 1 }}>Perpay Product Intelligence</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: tab === t.id ? "#EEF2FF" : "transparent",
                  color: tab === t.id ? "#6366F1" : "#6B7280", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6 }}>
                <span>{t.icon}</span>{t.label}
                {t.badge && <span style={{ background: tab === t.id ? "#6366F1" : "#D1D5DB", color: "#fff", borderRadius: 10, padding: "0 6px", fontSize: 11, fontWeight: 700, minWidth: 18, textAlign: "center" }}>{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 960, margin: "0 auto" }}>
        {tab === "upload" && <UploadTab onAnalyze={handleAnalyze} isAnalyzing={isAnalyzing} />}
        {tab === "insights" && <InsightsTab analysis={analysis} onSaveToArchive={handleSaveToArchive} />}
        {tab === "archive" && <ArchiveTab archives={archives} onDelete={handleDeleteArchive} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<DecagonInsights />);
</script>
</body>
</html>
